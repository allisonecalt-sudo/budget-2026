<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget 2026</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f4f0;
  --surface: #fff;
  --surface2: #f0efeb;
  --surface3: #e8e7e2;
  --border: #dddbd4;
  --text: #1a1915;
  --muted: #6b6960;
  --dim: #a09e96;
  --accent: #2d6a4f;
  --abright: #40916c;
  --asoft: rgba(45,106,79,.10);
  --green: #2d6a4f;
  --gsoft: rgba(45,106,79,.12);
  --amber: #b5621a;
  --ambersoft: rgba(181,98,26,.12);
  --red: #c0392b;
  --rsoft: rgba(192,57,43,.12);
  --shadow: 0 2px 8px rgba(26,25,21,.08);
  --shadowlg: 0 8px 32px rgba(26,25,21,.12);
  --r: 10px;
  --rl: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; -webkit-font-smoothing: antialiased; }

/* Header */
.hdr { background: var(--surface); border-bottom: 1px solid var(--border); padding: .7rem 1.5rem; display: flex; align-items: center; gap: .5rem; flex-wrap: nowrap; overflow-x: auto; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow); }
.hdr h1 { font-size: .95rem; font-weight: 700; white-space: nowrap; flex-shrink: 0; }
.hdr-tabs { flex-shrink: 0; }
.hdr-actions { display: flex; gap: .1rem; flex-shrink: 0; }
.hdr-months { display: flex; align-items: center; min-width: 0; }
.ribbon-panel { position: sticky; top: 57px; z-index: 90; background: var(--surface); border-bottom: 2px solid var(--border); box-shadow: var(--shadow); overflow: hidden; }
.ribbon-drag-handle { height: 8px; cursor: ns-resize; display: flex; align-items: center; justify-content: center; }
.ribbon-drag-handle::after { content:''; display:block; width:36px; height:3px; border-radius:2px; background:var(--border); }
.ribbon-drag-handle:hover::after { background: var(--muted); }
.ribbon { display: flex; align-items: center; padding: .4rem 1.5rem; gap: 0; border-bottom: 1px solid var(--border); }
.ribbon-stat { flex: 1; text-align: center; padding: .25rem .5rem; border-right: 1px solid var(--border); }
.ribbon-stat:last-of-type { border-right: none; }
.ribbon-label { font-size: .58rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }
.ribbon-val { font-family: 'DM Mono', monospace; font-size: .9rem; font-weight: 600; line-height: 1.4; }
.ribbon-toggle { font-size: .65rem; color: var(--muted); cursor: pointer; padding: .2rem .5rem; border: 1px solid var(--border); border-radius: var(--r); background: none; white-space: nowrap; }
.ribbon-toggle:hover { background: var(--surface2); }
.ribbon-snapshot { padding: .75rem 1.5rem; border-bottom: 1px solid var(--border); max-height: 50vh; overflow-y: auto; }
.sub-ribbon { display: flex; align-items: center; gap: 0; padding: .35rem 1.5rem; overflow-x: auto; background: var(--surface2); }
.sub-ribbon-label { font-size: .6rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); padding-right: 1rem; border-right: 1px solid var(--border); margin-right: .5rem; white-space: nowrap; flex-shrink: 0; }
.sub-ribbon-cat { text-align: center; padding: .2rem .75rem; border-right: 1px solid var(--border); flex-shrink: 0; }
.sub-ribbon-cat:last-child { border-right: none; }
.sub-ribbon-nums { font-family: 'DM Mono', monospace; font-size: .75rem; display: flex; gap: .25rem; align-items: center; justify-content: center; margin-top: .1rem; }
.sub-spent { font-weight: 600; }
.sub-sep { color: var(--muted); }
.sub-budget { color: var(--muted); }
.sub-rem { font-weight: 700; font-size: .7rem; }
.month-tabs { display: flex; gap: .2rem; flex-wrap: wrap; }
.mtab { padding: .22rem .45rem; border: none; background: none; cursor: pointer; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: .77rem; font-weight: 500; color: var(--muted); transition: all .15s; }
.mtab:hover { background: var(--surface2); color: var(--text); }
.mtab.active { background: var(--asoft); color: var(--accent); font-weight: 600; }

/* Layout */
.main { padding: 0; max-width: 1080px; margin: 0 auto; }
.main-full { padding: 0 1rem; max-width: 100%; margin: 0; }
.page-layout { display: flex; align-items: flex-start; }
.side-nav { width: 195px; flex-shrink: 0; position: sticky; top: 150px; padding: 1.25rem .75rem 1rem 1rem; }
.sidenav-label { font-size: .6rem; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--dim); padding: 0 .5rem .4rem; }
.sidenav-select { width: 100%; font-size: .72rem; padding: .3rem .4rem; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); color: var(--text); cursor: pointer; margin-bottom: .5rem; }
.sidenav-divider { height: 1px; background: var(--border); margin: .4rem .5rem .5rem; }
.sidenav-item { display: block; padding: .35rem .55rem; font-size: .75rem; font-weight: 500; color: var(--muted); cursor: pointer; border-radius: 6px; border-left: 2px solid transparent; margin-bottom: .1rem; white-space: normal; }
.sidenav-item:hover { background: var(--surface2); color: var(--text); border-left-color: var(--border); }
.sidenav-item.active { color: var(--accent); border-left-color: var(--accent); background: var(--asoft); font-weight: 600; }
.sidenav-divider2 { height: 1px; background: var(--border); margin: .5rem .5rem .4rem; }
.sn-sum-row { display: flex; justify-content: space-between; align-items: center; padding: .15rem .55rem; font-size: .68rem; border-radius: 4px; cursor: pointer; }
.sn-sum-row:hover { background: var(--surface2); }
.sn-sum-label { color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 110px; }
.sn-sum-val { font-family: 'DM Mono', monospace; font-size: .68rem; font-weight: 600; }
.page-content { flex: 1; padding: 1.5rem; min-width: 0; }

/* Top stats */
.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: .75rem; margin-bottom: 1.25rem; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--rl); padding: 1.25rem; box-shadow: var(--shadow); }
.stat-label { font-size: .65rem; font-weight: 700; text-transform: uppercase; letter-spacing: .09em; color: var(--muted); margin-bottom: .5rem; }
.stat-val { font-family: 'DM Mono', monospace; font-size: 1.7rem; font-weight: 500; line-height: 1; }
.stat-val.green { color: var(--green); }
.stat-val.red { color: var(--red); }
.stat-sub { font-size: .68rem; color: var(--dim); margin-top: .4rem; }

/* Income card */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--rl); padding: 1.25rem 1.5rem; margin-bottom: 1rem; box-shadow: var(--shadow); }
.card-title { font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .09em; color: var(--muted); margin-bottom: 1rem; display: flex; align-items: center; justify-content: space-between; }
.income-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: .5rem; }
.income-row { display: flex; justify-content: space-between; align-items: center; padding: .5rem .75rem; background: var(--surface2); border-radius: 8px; }
.income-source { font-size: .82rem; font-weight: 500; }
.income-amt { font-family: 'DM Mono', monospace; font-size: .88rem; font-weight: 500; }
.income-input { font-family: 'DM Mono', monospace; font-size: .88rem; font-weight: 500; width: 110px; padding: .3rem .5rem; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); color: var(--text); text-align: right; outline: none; }
.income-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--asoft); }
.income-input.is-est { border-color: #e5c97a; color: var(--text); background: #fdfaf2; }
.est-pill { font-size: .6rem; font-weight: 600; letter-spacing: .05em; padding: .15rem .35rem; border-radius: 4px; border: none; cursor: pointer; transition: all .15s; flex-shrink: 0; }
.est-pill.est { background: #f5efd6; color: #9a7c3a; }
.est-pill.act { background: var(--surface2); color: var(--muted); }

/* Category bars */
.categories { display: flex; flex-direction: column; gap: .5rem; margin-bottom: 1rem; }
.cat-row { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: .85rem 1rem; box-shadow: var(--shadow); }
.cat-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: .5rem; cursor: pointer; }
.cat-name { font-size: .84rem; font-weight: 600; display: flex; align-items: center; gap: .5rem; }
.cat-emoji { font-size: 1rem; }
.sn-table { width:100%; border-collapse:collapse; font-size:.82rem; border:1px solid var(--border); }
.sn-table th { text-align:left; padding:.5rem .75rem; font-size:.7rem; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); border-bottom:2px solid var(--border); background:var(--surface2); border-right:1px solid var(--border); }
.sn-table th:last-child { border-right:none; }
.sn-table th:not(:first-child) { text-align:right; }
.sn-section td { font-weight:700; font-size:.7rem; text-transform:uppercase; letter-spacing:.08em; padding:.9rem .75rem .4rem; color:var(--muted); border-top:2px solid var(--border); }
.sn-group { cursor:pointer; }
.sn-group:hover td { background: var(--border); }
.sn-group td { font-weight:700; padding:.5rem .75rem; background:var(--surface2); border-top:1px solid var(--border); border-bottom:1px solid var(--border); border-right:1px solid var(--border); }
.sn-group td:last-child { border-right:none; }
.sn-cat td { padding:.4rem .75rem; border-bottom:1px solid var(--border); border-right:1px solid var(--border); }
.sn-cat td:last-child { border-right:none; }
.sn-cat:nth-child(odd) td { background: rgba(0,0,0,.018); }
.sn-cat.collapsed { display:none; }
.sn-table td:not(:first-child) { text-align:right; font-family:'DM Mono',monospace; }
.sn-ok { color: var(--accent); font-weight:600; }
.sn-over { color: #dc2626; font-weight:600; }
@media print { #snapshot-modal { position:static!important; background:none!important; backdrop-filter:none!important; padding:0!important; } #snapshot-modal > div { box-shadow:none!important; max-width:100%!important; } button { display:none!important; } }
.budget-items-list { border-top:1px solid var(--border); padding:.5rem 0; margin-bottom:.25rem; }
.budget-items-header { display:flex; align-items:center; gap:.4rem; padding:.1rem .5rem .3rem; font-size:.65rem; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; }
.budget-items-header span:first-child { flex:1; }
.budget-items-header span:nth-child(2) { width:70px; text-align:right; }
.budget-item-row { display:flex; align-items:center; gap:.4rem; padding:.2rem .5rem; }
input.bi-label { flex:1; font-size:.8rem; background:transparent !important; border:none !important; border-bottom:1px dashed var(--border) !important; padding:.15rem .2rem !important; color:var(--text) !important; outline:none; width:auto !important; border-radius:0 !important; }
input.bi-label:focus { background:var(--surface) !important; box-shadow:0 0 0 1.5px var(--accent); border-bottom-color:var(--accent) !important; }
input.bi-amount { width:80px !important; flex-shrink:0; font-size:.8rem; font-family:'DM Mono',monospace; background:transparent !important; border:none !important; border-bottom:1px dashed var(--border) !important; padding:.15rem .2rem !important; text-align:right; color:var(--text) !important; outline:none; -moz-appearance:textfield; border-radius:0 !important; }
input.bi-amount::-webkit-outer-spin-button,input.bi-amount::-webkit-inner-spin-button{-webkit-appearance:none}
input.bi-amount:focus { border-bottom-color:var(--accent) !important; }
.bi-del { background:none; border:none; color:var(--dim); cursor:pointer; font-size:1rem; padding:0 .2rem; line-height:1; }
.bi-del:hover { color:var(--red); }
.bi-default { background:none; border:none; color:var(--dim); cursor:pointer; font-size:.85rem; padding:0 .2rem; line-height:1; position:relative; }
.bi-default:hover { color:var(--amber); }
.bi-default.is-default { color:var(--amber); }
.bi-default::after { content: attr(data-tip); position:absolute; bottom:125%; right:0; background:var(--text); color:#fff; font-size:.65rem; white-space:nowrap; padding:.2rem .4rem; border-radius:4px; opacity:0; pointer-events:none; transition:opacity .15s; }
.bi-default:hover::after { opacity:1; }
.bi-add { background:none; border:none; font-size:.72rem; color:var(--accent); cursor:pointer; padding:.25rem .5rem; font-weight:600; }
.group-block { margin-bottom: 1rem; }
.group-block.collapsed .group-cats { display:none; }
.group-header { display:flex; justify-content:space-between; align-items:center; padding:.55rem .75rem; background:var(--surface2); border-radius:var(--r); margin-bottom:.35rem; font-size:.8rem; font-weight:700; color:var(--text); letter-spacing:.01em; cursor:pointer; user-select:none; border:1px solid var(--border); }
.group-header:hover { background:var(--border); }
.group-chevron { font-size:.65rem; color:var(--muted); margin-right:.4rem; transition:transform .2s; }
.group-block.collapsed .group-chevron { transform: rotate(-90deg); }
.group-totals { font-family:'DM Mono',monospace; font-size:.75rem; font-weight:400; display:flex; gap:.3rem; align-items:center; }
.group-rem { font-weight:600; }
.group-rem.ok { color: var(--accent); }
.group-rem.warn { color: #d97706; }
.group-rem.over { color: #dc2626; }
.cat-amounts { font-size: .75rem; color: var(--muted); font-family: 'DM Mono', monospace; display:flex; align-items:center; gap:2px; }
.budget-inline { font-size:.75rem; font-family:'DM Mono',monospace; color:var(--text); background:transparent; border:none; border-bottom:1px dashed var(--border); padding:0 2px; outline:none; -moz-appearance:textfield; cursor:text; }
.budget-inline::-webkit-outer-spin-button, .budget-inline::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }
.budget-inline:focus { border-bottom-color: var(--accent); background: var(--surface2); border-radius:3px; }
.cat-spent-bold { font-weight: 700; color: var(--text); }
.progress-bar { height: 6px; background: var(--surface3); border-radius: 99px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 99px; transition: width .3s ease; }
.progress-fill.ok { background: var(--green); }
.progress-fill.warn { background: var(--amber); }
.progress-fill.over { background: var(--red); }
.cat-remaining { font-size: .7rem; margin-top: .35rem; }
.cat-remaining.ok { color: var(--green); }
.cat-remaining.warn { color: var(--amber); }
.cat-remaining.over { color: var(--red); }

/* Transactions */
.tx-list { display: none; border-top: 1px solid var(--border); margin-top: .75rem; padding-top: .5rem; }
.cat-row.open .tx-list { display: block; }
.tx-header { display: grid; grid-template-columns: 105px 0.9fr 0.65fr 80px 22px; padding: .15rem .15rem .3rem; border-bottom: 1px solid var(--border); font-size: .62rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--dim); gap: .25rem; }
.tx-item { display: grid; grid-template-columns: 105px 0.9fr 0.65fr 80px 22px; align-items: center; padding: .22rem .15rem; border-bottom: 1px solid var(--border); gap: .25rem; }
.tx-item:last-child { border-bottom: none; }
.tx-date-col { font-size: .68rem; color: var(--muted); font-family: 'DM Mono', monospace; white-space: nowrap; overflow: hidden; }
.tx-edit { font-size: .79rem; background: transparent; border: none; border-bottom: 1px solid transparent; padding: .1rem .15rem; color: var(--text); outline: none; width: 100%; font-family: 'DM Sans', sans-serif; }
.tx-edit:hover { border-bottom-color: var(--border); }
.tx-edit:focus { border-bottom-color: var(--accent); background: var(--surface2); border-radius: 3px 3px 0 0; }
.tx-date-wrap { position: relative; display: flex; align-items: center; cursor: pointer; }
.tx-date-display { font-family: 'DM Mono', monospace; font-size: .72rem; color: var(--muted); border-bottom: 1px solid transparent; padding: .1rem .15rem; white-space: nowrap; pointer-events: none; }
.tx-date-wrap:hover .tx-date-display { border-bottom-color: var(--border); }
input.tx-edit-date { position: absolute; inset: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; border: none; background: transparent; padding: 0; }
input.tx-edit-date::-webkit-calendar-picker-indicator { opacity: 0.4; width: 12px; height: 12px; }
.tx-edit-amt { font-family: 'DM Mono', monospace; font-size: .79rem; font-weight: 500; text-align: right; -moz-appearance: textfield; }
.tx-edit-amt::-webkit-outer-spin-button, .tx-edit-amt::-webkit-inner-spin-button { -webkit-appearance: none; }
.tx-del { background: none; border: none; color: var(--dim); cursor: pointer; font-size: 1rem; padding: 0; line-height: 1; opacity: 0; transition: opacity .1s; }
.tx-item:hover .tx-del { opacity: 1; }
.tx-del:hover { color: var(--red); }
.tx-sort-bar { display: flex; align-items: center; gap: .3rem; padding-bottom: .35rem; }
.tx-sort-btn { background: none; border: 1px solid var(--border); border-radius: 4px; font-size: .64rem; padding: .1rem .3rem; cursor: pointer; color: var(--muted); font-family: 'DM Sans', sans-serif; }
.tx-sort-btn.active { background: var(--asoft); color: var(--accent); border-color: var(--accent); font-weight: 600; }
.no-tx { color: var(--dim); font-size: .78rem; padding: .5rem 0; }

/* Add transaction */
.add-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--rl); padding: 1.25rem 1.5rem; margin-bottom: 1rem; box-shadow: var(--shadow); }
.add-title { font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .09em; color: var(--muted); margin-bottom: 1rem; }
.form-row { display: flex; gap: .6rem; flex-wrap: wrap; align-items: flex-end; }
.fg { display: flex; flex-direction: column; gap: .3rem; flex: 1; min-width: 120px; }
.fg label { font-size: .68rem; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); }
select, input[type="text"], input[type="number"], input[type="date"] { padding: .55rem .8rem; border: 1px solid var(--border); border-radius: var(--r); font-family: 'DM Sans', sans-serif; font-size: .875rem; background: var(--surface2); color: var(--text); outline: none; transition: border-color .2s; width: 100%; }
select:focus, input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--asoft); }
.btn { padding: .6rem 1.2rem; border: none; border-radius: var(--r); cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: .84rem; transition: all .15s; white-space: nowrap; }
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: var(--abright); }
.btn:disabled { opacity: .4; cursor: not-allowed; }

/* Setup screen */
.setup { max-width: 500px; margin: 3rem auto; text-align: center; }
.setup h2 { font-size: 1.3rem; font-weight: 700; margin-bottom: .5rem; }
.setup p { color: var(--muted); margin-bottom: 1.5rem; font-size: .9rem; }
.setup-form { text-align: left; display: flex; flex-direction: column; gap: .75rem; }

/* Page tabs (Budget / Biz) */
.page-tabs { display: flex; gap: .25rem; background: var(--surface2); border-radius: 10px; padding: .25rem; }
.ptab { padding: .28rem .6rem; border: none; background: none; cursor: pointer; border-radius: 7px; font-family: 'DM Sans', sans-serif; font-size: .82rem; font-weight: 600; color: var(--muted); transition: all .15s; }
.ptab.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow); }

/* Biz tab */
.biz-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--rl); padding: 1.25rem 1.5rem; margin-bottom: 1rem; box-shadow: var(--shadow); }
.biz-section-title { font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .09em; color: var(--muted); margin-bottom: .75rem; }
.biz-row { display: flex; justify-content: space-between; align-items: center; padding: .5rem .75rem; background: var(--surface2); border-radius: 8px; margin-bottom: .4rem; }
.biz-row:last-child { margin-bottom: 0; }
.biz-label { font-size: .82rem; font-weight: 500; }
.biz-val { font-family: 'DM Mono', monospace; font-size: .88rem; font-weight: 500; }
.biz-val.green { color: var(--green); }
.biz-val.amber { color: var(--amber); }
.biz-input { font-family: 'DM Mono', monospace; font-size: .88rem; font-weight: 500; width: 110px; padding: .3rem .5rem; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); color: var(--text); text-align: right; outline: none; }
.biz-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--asoft); }
.biz-net { background: var(--gsoft); border: 1px solid var(--accent); border-radius: var(--r); padding: 1rem 1.25rem; display: flex; justify-content: space-between; align-items: center; margin-top: .75rem; }
.biz-net-label { font-size: .84rem; font-weight: 700; color: var(--accent); }
.biz-net-val { font-family: 'DM Mono', monospace; font-size: 1.4rem; font-weight: 600; color: var(--accent); }
.biz-session-item { display: flex; justify-content: space-between; align-items: center; padding: .35rem 0; border-bottom: 1px solid var(--border); font-size: .8rem; }
.biz-session-item:last-child { border-bottom: none; }
.biz-sync-btn { font-size: .7rem; font-weight: 600; color: var(--accent); background: var(--asoft); border: none; border-radius: 6px; padding: .25rem .6rem; cursor: pointer; margin-left: .5rem; }

/* Toast */
.toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: var(--text); color: var(--bg); padding: .65rem 1.25rem; border-radius: 99px; font-size: .82rem; font-weight: 500; z-index: 999; opacity: 0; transition: opacity .2s; pointer-events: none; }
.toast.show { opacity: 1; }

/* Loading */
.loading { text-align: center; padding: 3rem; color: var(--muted); font-size: .9rem; }

@media (max-width: 600px) {
  html, body { overflow-x: hidden; max-width: 100vw; }
  /* Header: 3 rows on mobile */
  .hdr { flex-wrap: wrap; overflow-x: visible; gap: .3rem; padding: .5rem .75rem; }
  .hdr h1 { order: 1; flex: 1; font-size: .9rem; }
  .hdr-actions { order: 2; }
  .hdr-tabs { order: 3; width: 100%; overflow-x: auto; padding: .05rem 0; }
  .hdr-tabs .page-tabs { flex-wrap: nowrap; }
  .hdr-months { order: 4; width: 100%; overflow-x: auto; padding: .05rem 0; }
  .hdr-months .month-tabs { flex-wrap: nowrap; width: max-content; }
  /* Bigger tap targets on mobile */
  .ptab { padding: .48rem .7rem !important; font-size: .82rem !important; }
  .mtab { padding: .4rem .55rem !important; font-size: .8rem !important; }
  .side-nav { display: none !important; }
  .page-layout { flex-direction: column !important; }
  .page-content { padding: .6rem .75rem; width: 100%; min-width: 0; }
  .stats-row { grid-template-columns: repeat(2, 1fr); gap: .5rem; }
  .stat-val { font-size: 1.2rem; }
  .stat-card { padding: .85rem; }
  .income-grid { grid-template-columns: 1fr; }
  .income-input { width: 90px; }
  /* Ribbon: 4-col grid on mobile — all 7 stats visible in 2 rows */
  .ribbon-panel { position: static !important; overflow-x: visible !important; }
  .ribbon { display: grid !important; grid-template-columns: repeat(4,1fr) !important; padding: .3rem .5rem !important; min-width: unset !important; gap: 0 !important; }
  .ribbon-stat { padding: .22rem .25rem !important; border-right: 1px solid var(--border) !important; border-left: none !important; margin: 0 !important; }
  .ribbon-label { font-size: .51rem !important; letter-spacing: .04em !important; }
  .ribbon-val { font-size: .78rem !important; }
  /* Buttons cell — hide "full view", keep ✕ */
  .ribbon > div:last-child { margin: 0 !important; padding: .2rem .25rem !important; display: flex !important; align-items: center !important; justify-content: center !important; border-left: 1px solid var(--border) !important; }
  .ribbon > div:last-child .ribbon-toggle:first-child { display: none !important; }
  .month-tabs { width: 100%; overflow-x: auto; flex-wrap: nowrap; padding-bottom: .25rem; }
  .tx-header, .tx-item { grid-template-columns: 70px 1fr 65px 22px; }
  .tx-header span:nth-child(2), .tx-item > *:nth-child(2) { display: none; }
  .form-row { flex-direction: column; gap: .4rem; }
  .fg { min-width: unset; }

  .add-section { padding: .85rem 1rem; }
  /* Inline add form: 2 rows of 3 on mobile */
  .inline-add-form { grid-template-columns: 1fr 1fr 1fr !important; gap: .4rem !important; padding: .5rem .25rem !important; }
  .inline-add-form input, .inline-add-form button { font-size: .88rem !important; padding: .5rem .5rem !important; min-height: 42px !important; border-radius: 6px !important; }
  /* Budget item rows — bigger on mobile */
  /* Leisure sub-ribbon: full-width label + 3-col grid for cats */
  .sub-ribbon { flex-wrap: wrap; overflow-x: visible !important; padding: .3rem .5rem; }
  .sub-ribbon-label { width: 100%; border-right: none; border-bottom: 1px solid var(--border); margin-right: 0; padding-right: 0; padding-bottom: .25rem; margin-bottom: .1rem; font-size: .7rem !important; white-space: normal; }
  .sub-ribbon-cat { width: 33.333%; flex-shrink: 0; padding: .25rem .3rem; }
  .sub-ribbon-nums { font-size: .72rem; }
  /* Budget item rows */
  .budget-item-row { padding: .4rem .5rem; gap: .5rem; }
  input.bi-label { font-size: .88rem !important; padding: .3rem .25rem !important; min-height: 36px !important; }
  input.bi-amount { font-size: .88rem !important; padding: .3rem .25rem !important; min-height: 36px !important; width: 85px !important; }
  .bi-del, .bi-default { font-size: 1.1rem !important; padding: .2rem .35rem !important; }
  .bi-add { font-size: .82rem; padding: .4rem .5rem; }
  select { font-size: .82rem; padding: .4rem .5rem; }
}

/* -- Year Snapshot Tab ------------------------------------------------ */

.year-summary { display: flex; gap: .6rem; flex-wrap: wrap; margin-bottom: 1.25rem; }
.year-sum-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: .6rem .9rem; min-width: 110px; flex: 1; }

.year-table th, .year-table td { padding: .28rem .5rem; border-right: 1px solid var(--border); white-space: nowrap; }
.year-table tr { border-bottom: 1px solid rgba(255,255,255,.07); }
.year-th-label { position: sticky; left: 0; background: var(--card); z-index: 4; text-align: left; min-width: 155px; font-size: .65rem; text-transform: uppercase; letter-spacing: .05em; border-right: 2px solid var(--border); }

  { label: 'Leisure & Lifestyle',emoji: '🎉', keys: ['takeout', 'eatingout', 'entertainment', 'retail', 'holiday', 'gifts'] },

const undoStack = [], redoStack = [];
function pushUndo(action) { undoStack.push(action); if (undoStack.length > 30) undoStack.shift(); redoStack.length = 0; updateUndoButtons(); }
function updateUndoButtons() { const u=document.getElementById('undo-btn'),r=document.getElementById('redo-btn'); if(u)u.disabled=undoStack.length===0; if(r)r.disabled=redoStack.length===0; }
async function doUndo() { const a=undoStack.pop(); if(!a)return; await a.undo(); redoStack.push(a); updateUndoButtons(); renderApp(); toast('Undone: '+a.label); }
async function doRedo() { const a=redoStack.pop(); if(!a)return; await a.redo(); undoStack.push(a); updateUndoButtons(); renderApp(); toast('Redone: '+a.label); }

let state = {
  months: [],
  currentMonthId: null,
  transactions: [],
  budgets: {},
  loading: true,
  activeTab: localStorage.getItem('activeTab') || 'budget',
  biz: null,           // biz_months row for current month
  ptClients: [],       // private tracker clients
  ptSessions: [],      // private tracker sessions
  incomeItems: [],     // flexible extra income items
  budgetItems: {},     // { catKey: [{id, label, amount}] }
  allRecurringItems: {}, // { month_id: [{id, label, amount, subcategory}] } for grid view
  recurringGridMode: localStorage.getItem('recurringGridMode') === 'true',
  allHousingItems: {},   // { month_id: [{id, label, amount, subcategory}] } for housing grid view
  housingGridMode: localStorage.getItem('housingGridMode') === 'true',
  allCatTxData: {},      // { catKey: [transactions] } for spending grids
  allCatBudgets: {},     // { catKey: { month_id: amount } } for spending grids
  spendingGridCats: JSON.parse(localStorage.getItem('spendingGridCats') || '[]'),
  txSort: localStorage.getItem('txSort') || 'newest',
  admin: { items: [], allocations: {}, payments: [], subItems: [] },
  travel: { items: [], allocations: {}, payments: [], subItems: [] },
  charity: { items: [], allocations: {}, payments: [], subItems: [] },
  openCats: new Set(JSON.parse(localStorage.getItem('openCats') || '[]')),
  yearData: null,
  inlineAddCat: null,
  allStores: [],
};

// ── Helpers ──────────────────────────────────────────────────────────
const fmt = n => '₪' + Number(n || 0).toLocaleString('he-IL', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const pct = (spent, budget) => budget > 0 ? Math.min((spent / budget) * 100, 100) : 0;
const status = (spent, budget) => {
  if (budget === 0) return 'ok';
  const rem = Math.round(budget - spent);
  if (rem < 0) return 'over';
  if (rem === 0) return 'ok';
  const p = spent / budget;
  if (p >= 0.85) return 'warn';
  return 'ok';
};

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function today() {
  return new Date().toISOString().split('T')[0];
}

// ── Data loading ──────────────────────────────────────────────────────
async function loadMonths() {
  const { data } = await sb.from('months').select('*').eq('year', 2026).order('month_num');
  state.months = data || [];
}

async function loadTransactions(monthId) {
  const { data } = await sb.from('transactions').select('*').eq('month_id', monthId).order('created_at', { ascending: false });
  state.transactions = data || [];
}

async function loadBudgets(monthId) {
  const { data } = await sb.from('budgets').select('*').eq('month_id', monthId);
  state.budgets = {};
  (data || []).forEach(b => state.budgets[b.category] = b.amount);
}

async function loadBudgetItems(monthId) {
  const { data } = await sb.from('budget_items').select('*').eq('month_id', monthId).order('sort_order');
  state.budgetItems = {};
  (data || []).forEach(item => {
    if (!state.budgetItems[item.category]) state.budgetItems[item.category] = [];
    state.budgetItems[item.category].push(item);
  });
}

async function loadAllRecurringItems() {
  const { data } = await sb.from('budget_items').select('*').eq('category', 'recurring').order('sort_order');
  state.allRecurringItems = {};
  (data || []).forEach(item => {
    if (!state.allRecurringItems[item.month_id]) state.allRecurringItems[item.month_id] = [];
    state.allRecurringItems[item.month_id].push(item);
  });
}

async function toggleRecurringGrid() {
  state.recurringGridMode = !state.recurringGridMode;
  localStorage.setItem('recurringGridMode', state.recurringGridMode);
  if (state.recurringGridMode && Object.keys(state.allRecurringItems).length === 0) {
    await loadAllRecurringItems();
  }
  renderApp();
}

async function saveRecurringFromMonth(label, fromMonthNum, newAmount, forward) {
  const num = parseFloat(newAmount) || 0;
  const targetMonths = forward
    ? state.months.filter(m => m.month_num >= fromMonthNum)
    : state.months.filter(m => m.month_num === fromMonthNum);

  // Find subcategory and sort_order from any existing item with this label
  let subcategory = '';
  let sort_order = 999;
  for (const items of Object.values(state.allRecurringItems)) {
    const ref = items.find(i => i.label === label);
    if (ref) { subcategory = ref.subcategory || ''; sort_order = ref.sort_order || 999; break; }
  }

  for (const month of targetMonths) {
    if (!state.allRecurringItems[month.id]) state.allRecurringItems[month.id] = [];
    const items = state.allRecurringItems[month.id];
    const item = items.find(i => i.label === label);
    if (item) {
      await sb.from('budget_items').update({ amount: num }).eq('id', item.id);
      item.amount = num;
    } else {
      // Item doesn't exist for this month — create it
      const { data: newItem } = await sb.from('budget_items').insert({
        month_id: month.id, category: 'recurring', label, amount: num, subcategory, sort_order
      }).select().single();
      if (newItem) items.push(newItem);
    }
  }
  // Also sync current month's budgetItems
  const currentMonth = state.months.find(m => m.id === state.currentMonthId);
  if (currentMonth && currentMonth.month_num >= fromMonthNum) {
    const cur = (state.budgetItems['recurring'] || []).find(i => i.label === label);
    if (cur) cur.amount = num;
  }
  renderApp();
  toast('Updated ✓');
}

function renderRecurringGrid() {
  const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const SUBCAT_ORDER = ['tashlumim','digital','insurance','bills','fitness'];
  const SUBCAT_LABELS = { tashlumim: 'תשלומים', digital: 'Digital', insurance: 'Insurance', bills: 'Bills', fitness: 'Fitness' };
  const today = new Date().getMonth() + 1; // current month num

  // Get all unique items with their subcategory (from any month that has them)
  const itemMap = {}; // label -> subcategory
  Object.values(state.allRecurringItems).forEach(items => {
    items.forEach(i => { if (!itemMap[i.label]) itemMap[i.label] = i.subcategory || ''; });
  });

  // Group items by subcategory
  const groups = {};
  const noSubcat = [];
  Object.entries(itemMap).forEach(([label, sc]) => {
    if (sc && SUBCAT_ORDER.includes(sc)) {
      if (!groups[sc]) groups[sc] = [];
      groups[sc].push(label);
    } else {
      noSubcat.push(label);
    }
  });

  // Build month columns — only show months that exist
  const existingMonths = state.months.slice().sort((a,b) => a.month_num - b.month_num);

  const headerCells = '<th style="text-align:left;padding:.3rem .5rem;font-size:.65rem;font-weight:700;color:var(--muted);position:sticky;left:0;background:var(--surface);z-index:2;min-width:130px;">Item</th>'
    + existingMonths.map(m => {
      const isCur = m.month_num === today;
      const isPast = m.month_num < today;
      return '<th style="text-align:right;padding:.3rem .4rem;font-size:.65rem;font-weight:700;color:'+(isCur?'var(--accent)':isPast?'var(--dim)':'var(--muted)')+';min-width:60px;">' + MONTH_NAMES[m.month_num-1] + '</th>';
    }).join('');

  const renderRow = (label) => {
    const cells = existingMonths.map(m => {
      const items = state.allRecurringItems[m.id] || [];
      const item = items.find(i => i.label === label);
      const val = item ? Number(item.amount) : null;
      const isCur = m.month_num === today;
      const isPast = m.month_num < today;
      const bgColor = isCur ? 'var(--gsoft)' : 'transparent';
      const txtColor = isPast ? 'var(--dim)' : (isCur ? 'var(--accent)' : 'var(--text)');
      const cellContent = val !== null ? fmt(val).replace('₪','') : '<span style="color:var(--dim)">—</span>';
      const escapedLabel = label.replace(/'/g,"\\'").replace(/"/g,'&quot;');
      return '<td style="text-align:right;padding:.25rem .4rem;font-size:.75rem;color:'+txtColor+';background:'+bgColor+';font-family:\'DM Mono\',monospace;cursor:pointer;" onclick="editRecurringCell(\''+escapedLabel+'\','+m.month_num+','+( val||0 )+')" title="Click to edit">'+cellContent+'</td>';
    }).join('');
    return '<tr><td style="padding:.25rem .5rem;font-size:.75rem;position:sticky;left:0;background:var(--surface);z-index:1;">'+label+'</td>'+cells+'</tr>';
  };

  // Sort tashlumim by base name then installment number
  const installSort = labels => labels.slice().sort((a, b) => {
    const baseA = a.replace(/\s*[\(]?\d+\/\d+[\)]?$/, '').trim();
    const baseB = b.replace(/\s*[\(]?\d+\/\d+[\)]?$/, '').trim();
    if (baseA !== baseB) return baseA.localeCompare(baseB);
    const numA = parseInt((a.match(/(\d+)\/\d+/) || [,'0'])[1]) || 0;
    const numB = parseInt((b.match(/(\d+)\/\d+/) || [,'0'])[1]) || 0;
    return numA - numB;
  });

  let rows = '';
  SUBCAT_ORDER.forEach(sc => {
    if (groups[sc] && groups[sc].length > 0) {
      const labels = sc === 'tashlumim' ? installSort(groups[sc]) : groups[sc];
      rows += '<tr><td colspan="'+(existingMonths.length+1)+'" style="padding:.3rem .5rem .1rem;font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--accent);background:var(--surface2);">'+SUBCAT_LABELS[sc]+'</td></tr>';
      rows += labels.map(renderRow).join('');
    }
  });
  if (noSubcat.length > 0) rows += noSubcat.map(renderRow).join('');

  // Totals row
  const totalCells = existingMonths.map(m => {
    const items = state.allRecurringItems[m.id] || [];
    const total = items.reduce((sum, i) => sum + Number(i.amount||0), 0);
    const isCur = m.month_num === today;
    const isPast = m.month_num < today;
    const txtColor = isPast ? 'var(--dim)' : isCur ? 'var(--accent)' : 'var(--text)';
    return '<td style="text-align:right;padding:.25rem .4rem;font-size:.75rem;font-weight:700;color:'+txtColor+';font-family:\'DM Mono\',monospace;">'+(total ? fmt(total).replace('₪','') : '—')+'</td>';
  }).join('');
  rows += '<tr style="border-top:2px solid var(--border);"><td style="padding:.3rem .5rem;font-size:.72rem;font-weight:700;position:sticky;left:0;background:var(--surface);z-index:1;color:var(--muted);">TOTAL</td>'+totalCells+'</tr>';

  const addLineBtn = '<div style="padding:.4rem .5rem;display:flex;gap:.75rem;align-items:center;">'
    + '<button onclick="event.stopPropagation();addBudgetItem(\'recurring\')" style="font-size:.72rem;font-weight:600;color:var(--accent);background:none;border:none;cursor:pointer;padding:0;">+ add line</button>'
    + '<button onclick="event.stopPropagation();addTashlum()" style="font-size:.72rem;font-weight:600;color:var(--muted);background:none;border:none;cursor:pointer;padding:0;">+ add תשלום</button>'
    + '</div>';
  return '<div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;font-size:.8rem;">'
    + '<thead><tr style="border-bottom:2px solid var(--border);">'+headerCells+'</tr></thead>'
    + '<tbody>'+rows+'</tbody>'
    + '</table></div>' + addLineBtn;
}

function editRecurringCell(label, monthNum, currentVal) {
  const month = state.months.find(m => m.month_num === monthNum);
  if (!month) return;

async function saveHousingFromMonth(label, fromMonthNum, newAmount, forward) {
  const num = parseFloat(newAmount) || 0;
  const targetMonths = forward
    ? state.months.filter(m => m.month_num >= fromMonthNum)
    : state.months.filter(m => m.month_num === fromMonthNum);

  let subcategory = '';
  let sort_order = 999;
  for (const items of Object.values(state.allHousingItems)) {
    const ref = items.find(i => i.label === label);
    if (ref) { subcategory = ref.subcategory || ''; sort_order = ref.sort_order || 999; break; }
  }

  for (const month of targetMonths) {
    if (!state.allHousingItems[month.id]) state.allHousingItems[month.id] = [];
    const items = state.allHousingItems[month.id];
    const item = items.find(i => i.label === label);
    if (item) {
      await sb.from('budget_items').update({ amount: num }).eq('id', item.id);
      item.amount = num;
    } else {
      const { data: newItem } = await sb.from('budget_items').insert({
        month_id: month.id, category: 'housing', label, amount: num, subcategory, sort_order
      }).select().single();
      if (newItem) items.push(newItem);
    }
  }
  const currentMonth = state.months.find(m => m.id === state.currentMonthId);
  if (currentMonth && currentMonth.month_num >= fromMonthNum) {
    const cur = (state.budgetItems['housing'] || []).find(i => i.label === label);
    if (cur) cur.amount = num;
  }
  renderApp();
  toast('Updated ✓');
}

  const raw = prompt(MNAMES[monthNum-1] + ' — ' + label + '\nAmount:', currentVal || '');
  if (raw === null || raw.trim() === '') return;
  const amount = raw.trim();
  const isFuture = monthNum >= (new Date().getMonth() + 1);
  const forward = isFuture && confirm('Apply ' + amount + ' to ' + MNAMES[monthNum-1] + ' and all future months?');
  saveHousingFromMonth(label, monthNum, amount, forward);
}

function renderHousingGrid() {
  const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const SUBCAT_ORDER = ['rent','utilities','bills','household'];
  const SUBCAT_LABELS = { rent: 'Rent', utilities: 'Utilities', bills: 'Bills', household: 'Household' };
  const today = new Date().getMonth() + 1;

  const itemMap = {};
  Object.values(state.allHousingItems).forEach(items => {
    items.forEach(i => { if (!itemMap[i.label]) itemMap[i.label] = i.subcategory || ''; });
  });

  const groups = {};
  const noSubcat = [];
  Object.entries(itemMap).forEach(([label, sc]) => {
    if (sc && SUBCAT_ORDER.includes(sc)) {
      if (!groups[sc]) groups[sc] = [];
      groups[sc].push(label);
    } else {
      noSubcat.push(label);
    }
  });

  const existingMonths = state.months.slice().sort((a,b) => a.month_num - b.month_num);
  const headerCells = '<th style="text-align:left;padding:.25rem .5rem;font-size:.7rem;position:sticky;left:0;background:var(--surface2);z-index:2;">Item</th>'
    + existingMonths.map(m => '<th style="text-align:right;padding:.25rem .4rem;font-size:.7rem;min-width:52px;color:'+(m.month_num===today?'var(--accent)':'inherit')+'">' + MONTH_NAMES[m.month_num-1] + '</th>').join('');

  const renderRow = label => {
    const cells = existingMonths.map(m => {
      const items = state.allHousingItems[m.id] || [];
      const item = items.find(i => i.label === label);
      const val = item ? item.amount : null;
      const isPast = m.month_num < today;
      const isCur = m.month_num === today;
      const bgColor = isCur ? 'var(--asoft)' : 'transparent';
      const txtColor = isPast ? 'var(--dim)' : 'var(--text)';
      const cellContent = val != null ? Number(val).toLocaleString('en-IL',{minimumFractionDigits:0,maximumFractionDigits:0}) : '<span style="color:var(--border)">—</span>';
      return '<td style="text-align:right;padding:.25rem .4rem;font-size:.75rem;color:'+txtColor+';background:'+bgColor+';font-family:\'DM Mono\',monospace;cursor:pointer;" onclick="editHousingCell(\''+label.replace(/'/g,"\\'").replace(/"/g,'&quot;')+'\','+m.month_num+','+(val||0)+')" title="Click to edit">'+cellContent+'</td>';

  let rows = '';
  SUBCAT_ORDER.forEach(sc => {

      rows += groups[sc].map(renderRow).join('');

  const addLineBtn = '<div style="padding:.4rem .5rem;"><button onclick="event.stopPropagation();addBudgetItem(\'housing\')" style="font-size:.72rem;font-weight:600;color:var(--accent);background:none;border:none;cursor:pointer;padding:0;">+ add line</button></div>';

    + '<thead><tr style="border-bottom:2px solid var(--border);">'+headerCells+'</tr></thead>'
    + '<tbody>'+rows+'</tbody>'

function budgetItemsTotal(catKey) {
  const items = state.budgetItems[catKey];
  if (!items || items.length === 0) return null; // null = use manual budget
  return items.reduce((sum, i) => sum + (Number(i.amount) || 0), 0);
}

function catBudget(catKey) {
  // For linked categories (e.g. Household → Housing line item), use the parent line item amount
  const catDef = CATEGORIES.find(c => c.key === catKey);
  if (catDef && catDef.linkedLine) {
    const parentItems = state.budgetItems[catDef.linkedLine.parent] || [];
    const linked = parentItems.find(i => i.label.toLowerCase() === catDef.linkedLine.label.toLowerCase());
    if (linked) return Number(linked.amount) || 0;
  }
  const fromItems = budgetItemsTotal(catKey);
  return fromItems !== null ? fromItems : (state.budgets[catKey] || 0);
}

async function addTashlum() {
  const name = prompt('שם התשלום (e.g. Mattress):');
  if (!name?.trim()) return;
  const amount = parseFloat(prompt('סכום לחודש (₪):'));
  if (!amount) return;
  const total = parseInt(prompt('כמה תשלומים?'));
  if (!total || total < 1) return;
  const startMonth = parseInt(prompt('חודש התחלה (1=Jan, 3=Mar, ...):'));
  if (!startMonth || startMonth < 1 || startMonth > 12) return;
  const MNAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const targetMonths = state.months.filter(m => m.month_num >= startMonth)
    .sort((a,b) => a.month_num - b.month_num).slice(0, total);
  const endIdx = startMonth - 1 + total - 1;
  const endLabel = endIdx < 12 ? MNAMES[endIdx] : MNAMES[11] + '+';
  if (!confirm(`Create ${total} payments of ₪${amount} for "${name.trim()}", from ${MNAMES[startMonth-1]} → ends ${endLabel}. OK?`)) return;
  for (let i = 0; i < targetMonths.length; i++) {
    const month = targetMonths[i];
    const label = `${name.trim()} ${i+1}/${total}`;
    const { data } = await sb.from('budget_items').insert({
      month_id: month.id, category: 'recurring', label, amount, subcategory: 'tashlumim', sort_order: 999
    }).select().single();
    if (data) {
      if (!state.allRecurringItems[month.id]) state.allRecurringItems[month.id] = [];
      state.allRecurringItems[month.id].push(data);
      if (month.id === state.currentMonthId) {
        if (!state.budgetItems['recurring']) state.budgetItems['recurring'] = [];
        state.budgetItems['recurring'].push(data);
      }
    }
  }
  renderApp();
  toast('תשלומים נוספו ✓');
}

async function addBudgetItem(catKey) {
  const labelInput = prompt('Item name:');
  if (!labelInput?.trim()) return;
  const label = labelInput.trim();
  const sortOrder = (state.budgetItems[catKey] || []).length;
  // Add to this month
  const { data } = await sb.from('budget_items').insert({
    month_id: state.currentMonthId, category: catKey, label, amount: 0, sort_order: sortOrder
  }).select().single();
  if (!state.budgetItems[catKey]) state.budgetItems[catKey] = [];
  state.budgetItems[catKey].push(data);
  // Also add to allRecurringItems / allHousingItems so grid propagation works immediately
  if (catKey === 'recurring') {
    if (!state.allRecurringItems[state.currentMonthId]) state.allRecurringItems[state.currentMonthId] = [];
    state.allRecurringItems[state.currentMonthId].push(data);
  } else if (catKey === 'housing') {
    if (!state.allHousingItems[state.currentMonthId]) state.allHousingItems[state.currentMonthId] = [];
    state.allHousingItems[state.currentMonthId].push(data);
  }
  // Also save to template
  await sb.from('budget_item_templates').insert({ category: catKey, label: 'New item', amount: 0, sort_order: sortOrder });
  renderApp();
}

async function saveBudgetItem(id, field, value) {
  const catKey = Object.keys(state.budgetItems).find(k => state.budgetItems[k].find(i => i.id === id));
  const item = (state.budgetItems[catKey] || []).find(i => i.id === id);
  if (!item) return;
  const numericFields = ['amount'];
  const val = numericFields.includes(field) ? (parseFloat(value) || 0) : value;
  await sb.from('budget_items').update({ [field]: val }).eq('id', id);
  item[field] = val;
  // Subcategory: propagate to all months with same label+category
  if (field === 'subcategory') {
    await sb.from('budget_items').update({ subcategory: val }).eq('category', catKey).eq('label', item.label);
    // Update allRecurringItems and allHousingItems in state
    const allItems = catKey === 'recurring' ? state.allRecurringItems : catKey === 'housing' ? state.allHousingItems : null;
    if (allItems) Object.values(allItems).forEach(arr => arr.forEach(i => { if (i.label === item.label) i.subcategory = val; }));
  }
  // Sync label changes to template
  if (field === 'label') {
    await sb.from('budget_item_templates').update({ label: val }).eq('category', catKey).eq('label', item.label).eq('sort_order', item.sort_order);
  }
  renderApp();
}

async function deleteBudgetItem(id) {
  const catKey = Object.keys(state.budgetItems).find(k => state.budgetItems[k].find(i => i.id === id));
  const item = (state.budgetItems[catKey] || []).find(i => i.id === id);
  await sb.from('budget_items').delete().eq('id', id);
  if (item) await sb.from('budget_item_templates').delete().eq('category', catKey).eq('sort_order', item.sort_order);
  for (const k of Object.keys(state.budgetItems)) {
    state.budgetItems[k] = state.budgetItems[k].filter(i => i.id !== id);
  }
  renderApp();
}

async function setItemAsDefault(id) {
  const catKey = Object.keys(state.budgetItems).find(k => state.budgetItems[k].find(i => i.id === id));
  const item = (state.budgetItems[catKey] || []).find(i => i.id === id);
  if (!item) return;
  // Update template row matching this category + sort_order with the current amount + label
  await sb.from('budget_item_templates')
    .update({ amount: item.amount, label: item.label })
    .eq('category', catKey).eq('sort_order', item.sort_order);
  // Visual feedback — briefly mark as default
  item.is_default = true;
  renderApp();
  setTimeout(() => { item.is_default = false; renderApp(); }, 1500);
}

async function seedBudgetItemsFromTemplate(monthId) {
  const linesCats = CATEGORIES.filter(c => c.hasLines).map(c => c.key);

    if (state.budgetItems[catKey] && state.budgetItems[catKey].length > 0) continue;
    const { data: tmpl } = await sb.from('budget_item_templates').select('*').eq('category', catKey).order('sort_order');
    if (!tmpl || tmpl.length === 0) continue;
    const inserts = tmpl.map(t => ({ month_id: monthId, category: catKey, label: t.label, amount: t.amount, sort_order: t.sort_order }));
    const { data: newItems } = await sb.from('budget_items').insert(inserts).select();
    state.budgetItems[catKey] = newItems || [];
  }
}

async function switchMonth(monthId) {
  state.currentMonthId = monthId;
  localStorage.setItem('activeMonthId', monthId);
  state.loading = true;
  renderApp();
  const loads = [loadTransactions(monthId), loadBudgets(monthId), loadIncomeItems(monthId), loadBudgetItems(monthId).then(() => seedBudgetItemsFromTemplate(monthId))];
  // Load year-level data in background, re-render when done
  Promise.all([loadAdminData(), loadTravelData(), loadCharityData()]).then(() => renderApp());
  if (state.activeTab === 'biz') loads.push(loadBizData());
  try {
    await Promise.all(loads);
  } finally {
    state.loading = false;
    renderApp();
  }
}

// ── Spent per category ────────────────────────────────────────────────
function spentByCategory() {
  const totals = {};
  CATEGORIES.forEach(c => totals[c.key] = 0);
  state.transactions.forEach(tx => {
    if (totals[tx.category] !== undefined) totals[tx.category] += Number(tx.amount);
  });
  // For hasLines categories (fixed committed expenses like housing/recurring bills),
  // treat the budget items total as minimum committed spend
  CATEGORIES.filter(c => c.hasLines).forEach(c => {
    const committed = budgetItemsTotal(c.key) || 0;
    if (totals[c.key] < committed) totals[c.key] = committed;
  });
  // Sync tab-specific payments (admin, travel, charity) into the main budget
  const currentMonth = state.months.find(m => m.id === state.currentMonthId);
  if (currentMonth) {
    const mn = currentMonth.month_num;
    totals['travel'] += (state.travel.payments || []).filter(p => p.month_num === mn).reduce((s, p) => s + Number(p.amount), 0);
    totals['admin'] += (state.admin.payments || []).filter(p => p.month_num === mn).reduce((s, p) => s + Number(p.amount), 0);
    totals['charity'] += (state.charity.payments || []).filter(p => p.month_num === mn).reduce((s, p) => s + Number(p.amount), 0);
  }
  return totals;
}

async function loadIncomeItems(monthId) {
  const { data } = await sb.from('income_items').select('*').eq('month_id', monthId).order('created_at');
  state.incomeItems = data || [];
}

// Est/Act state stored in localStorage per month
function getIncomeEst(monthId) {
  try { return JSON.parse(localStorage.getItem('incomeEst_' + monthId)) || {}; } catch { return {}; }
}
function setIncomeEst(monthId, obj) {
  localStorage.setItem('incomeEst_' + monthId, JSON.stringify(obj));
}
function toggleIncomeEst(source, itemId) {
  const mid = state.currentMonthId;
  const est = getIncomeEst(mid);
  const key = itemId || source;
  est[key] = !est[key];
  setIncomeEst(mid, est);
  renderApp();
}
function isAnyEstimated(monthId) {
  const est = getIncomeEst(monthId);
  return Object.values(est).some(Boolean);
}

function totalIncome(month) {
  const extras = state.incomeItems.reduce((sum, i) => sum + (Number(i.amount) || 0), 0);
  return (Number(month.income_petachya) || 0)
    + (Number(month.income_clalit) || 0)
    + (Number(month.income_private) || 0)
    + extras;
}

// ── Add transaction ───────────────────────────────────────────────────
async function addTransaction() {
  const cat = document.getElementById('tx-cat').value;
  const store = document.getElementById('tx-store').value.trim();
  const item = document.getElementById('tx-item').value.trim();
  const amount = parseFloat(document.getElementById('tx-amount').value);
  const date = document.getElementById('tx-date').value;

  if (!cat || !amount || isNaN(amount)) { toast('Fill in category and amount'); return; }

  const btn = document.getElementById('tx-btn');
  btn.disabled = true;

  const { data: txData, error } = await sb.from('transactions').insert({
    month_id: state.currentMonthId,
    category: cat,
    store: store || null,
    item: item || null,
    amount,
    date: date || null,
  }).select().single();

  if (error) { toast('Error saving — try again'); btn.disabled = false; return; }
  pushUndo({ label: 'add transaction', undo: async()=>{ await sb.from('transactions').delete().eq('id',txData.id); await loadTransactions(state.currentMonthId); }, redo: async()=>{ await sb.from('transactions').insert(txData); await loadTransactions(state.currentMonthId); } });

  // Clear form
  document.getElementById('tx-store').value = '';
  document.getElementById('tx-item').value = '';
  document.getElementById('tx-amount').value = '';
  document.getElementById('tx-date').value = today();
  btn.disabled = false;

  await loadTransactions(state.currentMonthId);
  renderApp();
  toast('Transaction saved ✓');
}

async function addTransactionSidebar() {
  const cat = document.getElementById('sb-cat').value;
  const store = document.getElementById('sb-store').value.trim();
  const item = document.getElementById('sb-item').value.trim();
  const amount = parseFloat(document.getElementById('sb-amount').value);
  const date = document.getElementById('sb-date').value;

  if (!cat || !amount || isNaN(amount)) { toast('Fill in category and amount'); return; }

  const btn = document.getElementById('sb-btn');
  btn.disabled = true;
  btn.textContent = '…';

  const { data: txData, error } = await sb.from('transactions').insert({
    month_id: state.currentMonthId,
    category: cat,
    store: store || null,
    item: item || null,
    amount,
    date: date || null,
  }).select().single();

  if (error) { toast('Error saving — try again'); btn.disabled = false; btn.textContent = 'Save →'; return; }

  document.getElementById('sb-store').value = '';
  document.getElementById('sb-item').value = '';
  document.getElementById('sb-amount').value = '';
  document.getElementById('sb-date').value = '';
  btn.disabled = false;
  btn.textContent = 'Save →';

  await loadTransactions(state.currentMonthId);
  renderApp();
  toast('Transaction saved ✓');
}

async function deleteTransaction(id) {
  const tx = state.transactions.find(t => t.id === id);
  if (!tx) return;
  const snap = {...tx};
  await sb.from('transactions').delete().eq('id', id);
  state.transactions = state.transactions.filter(t => t.id !== id);
  pushUndo({ label: 'delete transaction', undo: async()=>{ await sb.from('transactions').insert(snap); await loadTransactions(state.currentMonthId); }, redo: async()=>{ await sb.from('transactions').delete().eq('id',snap.id); await loadTransactions(state.currentMonthId); } });
  renderApp();
  toast('Deleted ✓');
}

async function updateTx(id, field, value) {
  const tx = state.transactions.find(t => t.id === id);
  if (!tx) return;
  const oldVal = tx[field];
  const val = field === 'amount' ? (parseFloat(value) || 0) : (value.trim() || null);
  await sb.from('transactions').update({ [field]: val }).eq('id', id);
  tx[field] = val;
  pushUndo({ label: 'edit '+field, undo: async()=>{ await sb.from('transactions').update({[field]:oldVal}).eq('id',id); const t=state.transactions.find(t=>t.id===id); if(t)t[field]=oldVal; }, redo: async()=>{ await sb.from('transactions').update({[field]:val}).eq('id',id); const t=state.transactions.find(t=>t.id===id); if(t)t[field]=val; } });
  renderApp();
}

function setTxSort(sort) {
  state.txSort = sort;
  localStorage.setItem('txSort', sort);
  // Sync open cats from DOM before re-render so sort doesn't close categories
  document.querySelectorAll('.cat-row.open').forEach(el => {
    const key = el.id.replace('cat-', '');
    if (key) state.openCats.add(key);
  });
  renderApp();
}

// ── Setup: create month ───────────────────────────────────────────────
async function createMonth(num) {
  const { data, error } = await sb.from('months').insert({
    month_name: MONTHS[num - 1],
    month_num: num,
    year: 2026,
  }).select().single();
  if (error) { toast('Error creating month'); return; }
  state.months.push(data);
  state.months.sort((a, b) => a.month_num - b.month_num);
  await switchMonth(data.id);
}

async function saveSavingsField(field, value) {

async function saveBudget(catKey, amount) {
  const num = parseFloat(amount) || 0;
  const old = state.budgets[catKey] || 0;
  const monthId = state.currentMonthId;
  // Upsert — try update first, then insert
  const { data: existing } = await sb.from('budgets').select('id').eq('month_id', monthId).eq('category', catKey).single();
  if (existing) {
    await sb.from('budgets').update({ amount: num }).eq('id', existing.id);
  } else {
    await sb.from('budgets').insert({ month_id: monthId, category: catKey, amount: num });
  }
  state.budgets[catKey] = num;
  // Keep tab allocations in sync when budget tab is edited
  const month = state.months.find(m => m.id === monthId);
  if (month) {
    if (catKey === 'admin') {
      const { data } = await sb.from('admin_allocations').upsert({ year: 2026, month_num: month.month_num, amount: num }, { onConflict: 'year,month_num' }).select().single();
      if (data) state.admin.allocations[month.month_num] = data;
    } else if (catKey === 'travel') {
      const existingAlloc = state.travel.allocations[month.month_num];
      if (existingAlloc) {
        existingAlloc.amount = num;
      } else {
        state.travel.allocations[month.month_num] = { month_id: monthId, amount: num };
      }
    } else if (catKey === 'charity') {
      const existingAlloc = state.charity.allocations[month.month_num];
      if (existingAlloc) {
        existingAlloc.amount = num;
      } else {
        state.charity.allocations[month.month_num] = { month_id: monthId, amount: num };
      }
    }
  }
  pushUndo({ label: 'budget '+catKey, undo: async()=>{ await saveBudget(catKey, old); }, redo: async()=>{ await saveBudget(catKey, num); } });
  renderApp();
  toast('Budget saved ✓');
}

// ── Biz data loading ──────────────────────────────────────────────────
async function loadBizData() {
  const current = state.months.find(m => m.id === state.currentMonthId);
  if (!current) return;

  // Load or create biz_months row
  const { data: bizRows } = await sb.from('biz_months').select('*').eq('month_id', state.currentMonthId);
  if (bizRows && bizRows.length > 0) {
    state.biz = bizRows[0];
  } else {
    const { data: newBiz } = await sb.from('biz_months').insert({ month_id: state.currentMonthId, accountant_fee: 0, spending: 0, confirmed_amount: 0 }).select().single();
    state.biz = newBiz;
  }

  // Load clients from private tracker
  const { data: clients } = await pt.from('clients').select('*');
  state.ptClients = clients || [];

  // All sessions from previous month (happened + scheduled)
  const prevMonthNum = current.month_num - 1;
  const prevYear = prevMonthNum === 0 ? 2025 : 2026;
  const actualPrevMonthNum = prevMonthNum === 0 ? 12 : prevMonthNum;
  const monthStart = `${prevYear}-${String(actualPrevMonthNum).padStart(2,'0')}-01`;
  const monthEnd = `${current.year}-${String(current.month_num).padStart(2,'0')}-01`;

  const { data: prevSessions } = await pt.from('sessions').select('*').gte('date', monthStart).lt('date', monthEnd);
  const earned = (prevSessions || []).filter(s => s.status === 'happened');
  const scheduled = (prevSessions || []).filter(s => s.status === 'scheduled');

  state.ptSessions = { earned, scheduled };

  // Load all biz_months for accountant fee tracking
  const monthIds = state.months.map(m => m.id);
  const { data: allBiz } = await sb.from('biz_months').select('*').in('month_id', monthIds);
  state.allBiz = allBiz || [];
}

function renderTravelTab() {
  const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const items = state.travel.items || [];
  const allocs = state.travel.allocations || {};
  const currentMonthObj = state.months.find(m => m.id === state.currentMonthId);
  const currentMonthNum = currentMonthObj ? currentMonthObj.month_num : null;
  const payments = state.travel.payments || [];

  const budget = items.reduce((s, i) => s + Number(i.projected_amount), 0);
  const totalAlloc = Object.values(allocs).reduce((s, a) => s + Number(a.amount), 0);
  const gap = budget - totalAlloc;
  const totalSpent = payments.reduce((s, p) => s + Number(p.amount), 0);
  const remaining = budget - totalSpent;

  const fmtA = n => '₪' + Number(n||0).toLocaleString('he-IL',{minimumFractionDigits:2,maximumFractionDigits:2});
  const esc = s => (s||'').replace(/"/g,'&quot;');

  const tvSort = localStorage.getItem('travelItemSort') || 'created';
  const sortedItems = [...items].sort((a,b) => {
    if (tvSort==='alpha') return (a.label||'').localeCompare(b.label||'');
    if (tvSort==='alpha-desc') return (b.label||'').localeCompare(a.label||'');
    if (tvSort==='amount-high') return Number(b.projected_amount)-Number(a.projected_amount);
    if (tvSort==='amount-low') return Number(a.projected_amount)-Number(b.projected_amount);
    return 0;
  });
  const itemsTravelHtml = sortedItems.map(item => {
    const subs = (state.travel.subItems || []).filter(s => s.item_id === item.id);
    const isOpen = localStorage.getItem('sn-trv-'+item.id) === '1';
    const paidTotal = subs.filter(s=>s.is_paid).reduce((n,s)=>n+Number(s.amount),0);
    const subBadge = subs.length > 0 ? '<span style="font-size:.6rem;color:var(--muted);margin-left:.3rem;">'+subs.filter(s=>s.is_paid).length+'/'+subs.length+' paid</span>' : '';
    const rowOpacity = item.is_logged ? 'opacity:.45;' : '';
    const strikeLabel = item.is_logged ? 'text-decoration:line-through;' : '';
    const amtColor = item.is_estimate ? 'var(--amber)' : 'var(--text)';
    const estBg = item.is_estimate ? 'var(--ambersoft, #fff8e1)' : 'none';
    const estBorder = item.is_estimate ? 'var(--amber)' : 'var(--border)';
    const estColor = item.is_estimate ? 'var(--amber)' : 'var(--dim)';
    const estWeight = item.is_estimate ? '700' : '400';
    const logBg = item.is_logged ? 'var(--gsoft)' : 'none';
    const logBorder = item.is_logged ? 'var(--accent)' : 'var(--border)';
    const logColor = item.is_logged ? 'var(--accent)' : 'var(--dim)';
    const logIcon = item.is_logged ? '✓' : '○';
    let subsHtml = '';
    if (isOpen) {
      const subRows = subs.map(s => {
        const sPaid = s.is_paid;
        const sRowOp = sPaid ? 'opacity:.5;' : '';
        const sStrike = sPaid ? 'text-decoration:line-through;' : '';
        const sBg = sPaid ? 'var(--gsoft)' : 'none';
        const sBorder = sPaid ? 'var(--accent)' : 'var(--border)';
        const sColor = sPaid ? 'var(--accent)' : 'var(--dim)';
        const sIcon = sPaid ? '✓' : '○';
        return '<div style="display:grid;grid-template-columns:1fr 80px 28px 28px;gap:.25rem;align-items:center;padding:.2rem 0;'+sRowOp+'">'
          + '<input type="text" value="'+esc(s.label)+'" placeholder="note (optional)" style="font-size:.75rem;background:transparent;border:none;border-bottom:1px solid transparent;padding:.05rem .2rem;color:var(--text);outline:none;font-family:\'DM Sans\',sans-serif;width:100%;'+sStrike+'" onfocus="this.style.borderBottomColor=\'var(--accent)\'" onblur="this.style.borderBottomColor=\'transparent\'" onchange="updateTravelSub(\''+s.id+'\',\'label\',this.value)">'
          + '<input type="number" value="'+(s.amount||'')+'" placeholder="₪" min="0" step="1" style="font-size:.75rem;font-family:\'DM Mono\',monospace;background:transparent;border:none;border-bottom:1px solid transparent;padding:.05rem .1rem;color:var(--text);outline:none;text-align:right;width:100%;-moz-appearance:textfield;'+sStrike+'" onfocus="this.style.borderBottomColor=\'var(--accent)\'" onblur="this.style.borderBottomColor=\'transparent\'" onchange="updateTravelSub(\''+s.id+'\',\'amount\',this.value)">'
          + '<button onclick="updateTravelSub(\''+s.id+'\',\'is_paid\','+(!s.is_paid)+')" title="'+(sPaid?'Mark as unpaid':'Mark as paid')+'" style="background:'+sBg+';border:1px solid '+sBorder+';border-radius:4px;color:'+sColor+';cursor:pointer;font-size:.75rem;padding:.1rem .2rem;line-height:1;font-weight:700;">'+sIcon+'</button>'

      subsHtml = '<div style="padding:.3rem .5rem .5rem 1.5rem;background:var(--surface2);border-radius:0 0 6px 6px;">'

        + '</div>';

    return '<div style="border-bottom:1px solid var(--border);">'
      + '<div style="display:grid;grid-template-columns:16px 1fr 90px 42px 28px 28px;gap:.25rem;align-items:center;padding:.3rem .1rem;'+rowOpacity+'">'

      </div>

        <div style="font-family:'DM Mono',monospace;font-size:1.4rem;font-weight:500;">${fmtA(totalSpent)}</div>
        <div style="font-size:.68rem;color:var(--dim);margin-top:.2rem;">paid so far</div>

        <div style="font-family:'DM Mono',monospace;font-size:1.4rem;font-weight:500;color:var(--accent);">${fmtA(remaining)}</div>
        <div style="font-size:.68rem;color:var(--dim);margin-top:.2rem;">budget − spent</div>
      </div>

    <div style="display:grid;grid-template-columns:1.1fr 1fr;gap:1.25rem;align-items:start;">

      <!-- LEFT: Yearly Items -->
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:1.25rem;box-shadow:var(--shadow);">

          <div style="display:flex;gap:.25rem;">${sortBtnsHtml}</div>

          <span>Item</span><span style="text-align:right;">Projected</span><span style="text-align:center;">~est</span><span></span><span style="text-align:center;">✓</span>
        </div>
        ${itemsTravelHtml}
        <button onclick="addTravelItem()" style="margin-top:.6rem;background:none;border:none;color:var(--accent);font-size:.78rem;cursor:pointer;font-family:'DM Sans',sans-serif;padding:.2rem 0;">+ add item</button>
        <div style="margin-top:.6rem;padding-top:.6rem;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;">

        <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:1.25rem;box-shadow:var(--shadow);">

          <div style="display:grid;grid-template-columns:70px 1fr 1fr 80px 28px;gap:.35rem;align-items:end;margin-bottom:.8rem;padding-bottom:.8rem;border-bottom:1px solid var(--border);">
