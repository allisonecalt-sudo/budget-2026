<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget 2026</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f4f0;
  --surface: #fff;
  --surface2: #f0efeb;
  --surface3: #e8e7e2;
  --border: #dddbd4;
  --text: #1a1915;
  --muted: #6b6960;
  --dim: #a09e96;
  --accent: #2d6a4f;
  --abright: #40916c;
  --asoft: rgba(45,106,79,.10);
  --green: #2d6a4f;
  --gsoft: rgba(45,106,79,.12);
  --amber: #b5621a;
  --ambersoft: rgba(181,98,26,.12);
  --red: #c0392b;
  --rsoft: rgba(192,57,43,.12);
  --shadow: 0 2px 8px rgba(26,25,21,.08);
  --shadowlg: 0 8px 32px rgba(26,25,21,.12);
  --r: 10px;
  --rl: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; -webkit-font-smoothing: antialiased; }

/* Header */
.hdr { background: var(--surface); border-bottom: 1px solid var(--border); padding: .9rem 1.5rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow); }
.hdr h1 { font-size: 1rem; font-weight: 700; }
.month-tabs { display: flex; gap: .2rem; flex-wrap: wrap; }
.mtab { padding: .35rem .75rem; border: none; background: none; cursor: pointer; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: .78rem; font-weight: 500; color: var(--muted); transition: all .15s; }
.mtab:hover { background: var(--surface2); color: var(--text); }
.mtab.active { background: var(--asoft); color: var(--accent); font-weight: 600; }

/* Layout */
.main { padding: 1.5rem; max-width: 900px; margin: 0 auto; }

/* Top stats */
.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: .75rem; margin-bottom: 1.25rem; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--rl); padding: 1.25rem; box-shadow: var(--shadow); }
.stat-label { font-size: .65rem; font-weight: 700; text-transform: uppercase; letter-spacing: .09em; color: var(--muted); margin-bottom: .5rem; }
.stat-val { font-family: 'DM Mono', monospace; font-size: 1.7rem; font-weight: 500; line-height: 1; }
.stat-val.green { color: var(--green); }
.stat-val.red { color: var(--red); }
.stat-sub { font-size: .68rem; color: var(--dim); margin-top: .4rem; }

/* Income card */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--rl); padding: 1.25rem 1.5rem; margin-bottom: 1rem; box-shadow: var(--shadow); }
.card-title { font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .09em; color: var(--muted); margin-bottom: 1rem; display: flex; align-items: center; justify-content: space-between; }
.income-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: .5rem; }
.income-row { display: flex; justify-content: space-between; align-items: center; padding: .5rem .75rem; background: var(--surface2); border-radius: 8px; }
.income-source { font-size: .82rem; font-weight: 500; }
.income-amt { font-family: 'DM Mono', monospace; font-size: .88rem; font-weight: 500; }
.income-input { font-family: 'DM Mono', monospace; font-size: .88rem; font-weight: 500; width: 110px; padding: .3rem .5rem; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); color: var(--text); text-align: right; outline: none; }
.income-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--asoft); }

/* Category bars */
.categories { display: flex; flex-direction: column; gap: .5rem; margin-bottom: 1rem; }
.cat-row { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: .85rem 1rem; box-shadow: var(--shadow); }
.cat-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: .5rem; cursor: pointer; }
.cat-name { font-size: .84rem; font-weight: 600; display: flex; align-items: center; gap: .5rem; }
.cat-emoji { font-size: 1rem; }
.cat-amounts { font-size: .75rem; color: var(--muted); font-family: 'DM Mono', monospace; }
.cat-spent-bold { font-weight: 700; color: var(--text); }
.progress-bar { height: 6px; background: var(--surface3); border-radius: 99px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 99px; transition: width .3s ease; }
.progress-fill.ok { background: var(--green); }
.progress-fill.warn { background: var(--amber); }
.progress-fill.over { background: var(--red); }
.cat-remaining { font-size: .7rem; margin-top: .35rem; }
.cat-remaining.ok { color: var(--green); }
.cat-remaining.warn { color: var(--amber); }
.cat-remaining.over { color: var(--red); }

/* Transactions */
.tx-list { display: none; border-top: 1px solid var(--border); margin-top: .75rem; padding-top: .75rem; }
.cat-row.open .tx-list { display: block; }
.tx-item { display: flex; align-items: center; justify-content: space-between; padding: .4rem 0; border-bottom: 1px solid var(--border); font-size: .8rem; }
.tx-item:last-child { border-bottom: none; }
.tx-left { display: flex; flex-direction: column; gap: .1rem; }
.tx-store { font-weight: 500; }
.tx-item-name { color: var(--muted); font-size: .73rem; }
.tx-amt { font-family: 'DM Mono', monospace; font-weight: 500; }
.no-tx { color: var(--dim); font-size: .78rem; padding: .5rem 0; }

/* Add transaction */
.add-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--rl); padding: 1.25rem 1.5rem; margin-bottom: 1rem; box-shadow: var(--shadow); }
.add-title { font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .09em; color: var(--muted); margin-bottom: 1rem; }
.form-row { display: flex; gap: .6rem; flex-wrap: wrap; align-items: flex-end; }
.fg { display: flex; flex-direction: column; gap: .3rem; flex: 1; min-width: 120px; }
.fg label { font-size: .68rem; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); }
select, input[type="text"], input[type="number"], input[type="date"] { padding: .55rem .8rem; border: 1px solid var(--border); border-radius: var(--r); font-family: 'DM Sans', sans-serif; font-size: .875rem; background: var(--surface2); color: var(--text); outline: none; transition: border-color .2s; width: 100%; }
select:focus, input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--asoft); }
.btn { padding: .6rem 1.2rem; border: none; border-radius: var(--r); cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: .84rem; transition: all .15s; white-space: nowrap; }
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: var(--abright); }
.btn:disabled { opacity: .4; cursor: not-allowed; }

/* Setup screen */
.setup { max-width: 500px; margin: 3rem auto; text-align: center; }
.setup h2 { font-size: 1.3rem; font-weight: 700; margin-bottom: .5rem; }
.setup p { color: var(--muted); margin-bottom: 1.5rem; font-size: .9rem; }
.setup-form { text-align: left; display: flex; flex-direction: column; gap: .75rem; }

/* Page tabs (Budget / Biz) */
.page-tabs { display: flex; gap: .25rem; background: var(--surface2); border-radius: 10px; padding: .25rem; }
.ptab { padding: .35rem .9rem; border: none; background: none; cursor: pointer; border-radius: 7px; font-family: 'DM Sans', sans-serif; font-size: .82rem; font-weight: 600; color: var(--muted); transition: all .15s; }
.ptab.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow); }

/* Biz tab */
.biz-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--rl); padding: 1.25rem 1.5rem; margin-bottom: 1rem; box-shadow: var(--shadow); }
.biz-section-title { font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .09em; color: var(--muted); margin-bottom: .75rem; }
.biz-row { display: flex; justify-content: space-between; align-items: center; padding: .5rem .75rem; background: var(--surface2); border-radius: 8px; margin-bottom: .4rem; }
.biz-row:last-child { margin-bottom: 0; }
.biz-label { font-size: .82rem; font-weight: 500; }
.biz-val { font-family: 'DM Mono', monospace; font-size: .88rem; font-weight: 500; }
.biz-val.green { color: var(--green); }
.biz-val.amber { color: var(--amber); }
.biz-input { font-family: 'DM Mono', monospace; font-size: .88rem; font-weight: 500; width: 110px; padding: .3rem .5rem; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); color: var(--text); text-align: right; outline: none; }
.biz-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--asoft); }
.biz-net { background: var(--gsoft); border: 1px solid var(--accent); border-radius: var(--r); padding: 1rem 1.25rem; display: flex; justify-content: space-between; align-items: center; margin-top: .75rem; }
.biz-net-label { font-size: .84rem; font-weight: 700; color: var(--accent); }
.biz-net-val { font-family: 'DM Mono', monospace; font-size: 1.4rem; font-weight: 600; color: var(--accent); }
.biz-session-item { display: flex; justify-content: space-between; align-items: center; padding: .35rem 0; border-bottom: 1px solid var(--border); font-size: .8rem; }
.biz-session-item:last-child { border-bottom: none; }
.biz-sync-btn { font-size: .7rem; font-weight: 600; color: var(--accent); background: var(--asoft); border: none; border-radius: 6px; padding: .25rem .6rem; cursor: pointer; margin-left: .5rem; }

/* Toast */
.toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: var(--text); color: var(--bg); padding: .65rem 1.25rem; border-radius: 99px; font-size: .82rem; font-weight: 500; z-index: 999; opacity: 0; transition: opacity .2s; pointer-events: none; }
.toast.show { opacity: 1; }

/* Loading */
.loading { text-align: center; padding: 3rem; color: var(--muted); font-size: .9rem; }

@media (max-width: 600px) {
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  .income-grid { grid-template-columns: 1fr; }
  .hdr { flex-direction: column; gap: .75rem; align-items: flex-start; }
  .month-tabs { width: 100%; overflow-x: auto; flex-wrap: nowrap; padding-bottom: .25rem; }
}
</style>
</head>
<body>

</div>

<script>
const SB_URL = 'https://hpiyvnfhoqnnnotrmwaz.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhwaXl2bmZob3Fubm5vdHJtd2F6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NzIwNDEsImV4cCI6MjA4ODA0ODA0MX0.AsGhYitkSnyVMwpJII05UseS_gICaXiCy7d8iHsr6Qw';
const PT_URL = 'https://fxpaacqnsbnbzbcabpvi.supabase.co';
const PT_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ4cGFhY3Fuc2JuYnpiY2FicHZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxMjM0MzgsImV4cCI6MjA4NzY5OTQzOH0.cLIEMR4ZpH3buhMjC8nwHu8h9p-WfHPfNZpHQXua3Oc';

const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const CATEGORIES = [
  { key: 'groceries',    label: 'Groceries',           emoji: '🛒', hasStore: true },
  { key: 'takeout',      label: 'Take Out',             emoji: '🥡', hasStore: false },
  { key: 'entertainment',label: 'Entertainment',        emoji: '🎬', hasStore: false },
  { key: 'retail',       label: 'Retail & Shopping',    emoji: '🛍️', hasStore: true },
  { key: 'transport',    label: 'Transportation',       emoji: '🚗', hasStore: false },
  { key: 'health',       label: 'Health & Therapy',     emoji: '🏥', hasStore: false },
  { key: 'housing',      label: 'Housing',              emoji: '🏠', hasStore: false },
  { key: 'recurring',    label: 'Recurring Payments',   emoji: '🔄', hasStore: false },
  { key: 'charity',      label: 'Charity',              emoji: '💚', hasStore: false },
  { key: 'travel',       label: 'Travel',               emoji: '✈️', hasStore: false },
  { key: 'admin',        label: 'Admin & Professional', emoji: '📋', hasStore: false },
  { key: 'gifts',        label: 'Gifts',                emoji: '🎁', hasStore: false },
  { key: 'holiday',      label: 'Holiday',              emoji: '🎉', hasStore: false },
];

const sb = window.supabase.createClient(SB_URL, SB_KEY);
const pt = window.supabase.createClient(PT_URL, PT_KEY);

let state = {
  months: [],
  currentMonthId: null,
  transactions: [],
  budgets: {},
  loading: true,
  activeTab: 'budget', // 'budget' or 'biz'
  biz: null,           // biz_months row for current month
  ptClients: [],       // private tracker clients
  ptSessions: [],      // private tracker sessions
};

// ── Helpers ──────────────────────────────────────────────────────────
const fmt = n => '₪' + Number(n || 0).toLocaleString('he-IL', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
const pct = (spent, budget) => budget > 0 ? Math.min((spent / budget) * 100, 100) : 0;
const status = (spent, budget) => {
  if (budget === 0) return 'ok';
  const p = spent / budget;
  if (p >= 1) return 'over';
  if (p >= 0.85) return 'warn';
  return 'ok';
};

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function today() {
  return new Date().toISOString().split('T')[0];
}

// ── Data loading ──────────────────────────────────────────────────────
async function loadMonths() {
  const { data } = await sb.from('months').select('*').eq('year', 2026).order('month_num');
  state.months = data || [];
}

async function loadTransactions(monthId) {
  const { data } = await sb.from('transactions').select('*').eq('month_id', monthId).order('created_at', { ascending: false });
  state.transactions = data || [];
}

async function loadBudgets(monthId) {
  const { data } = await sb.from('budgets').select('*').eq('month_id', monthId);
  state.budgets = {};
  (data || []).forEach(b => state.budgets[b.category] = b.amount);
}

async function switchMonth(monthId) {
  state.currentMonthId = monthId;
  state.loading = true;
  renderApp();
  const loads = [loadTransactions(monthId), loadBudgets(monthId)];
  if (state.activeTab === 'biz') loads.push(loadBizData());
  await Promise.all(loads);
  state.loading = false;
  renderApp();
}

// ── Spent per category ────────────────────────────────────────────────
function spentByCategory() {
  const totals = {};
  CATEGORIES.forEach(c => totals[c.key] = 0);
  state.transactions.forEach(tx => {
    if (totals[tx.category] !== undefined) totals[tx.category] += Number(tx.amount);
  });
  return totals;
}

function totalIncome(month) {
  return (Number(month.income_petachya) || 0)
    + (Number(month.income_clalit) || 0)
    + (Number(month.income_private) || 0)
    + (Number(month.income_other) || 0);
}

// ── Add transaction ───────────────────────────────────────────────────
async function addTransaction() {
  const cat = document.getElementById('tx-cat').value;
  const store = document.getElementById('tx-store').value.trim();
  const item = document.getElementById('tx-item').value.trim();
  const amount = parseFloat(document.getElementById('tx-amount').value);
  const date = document.getElementById('tx-date').value;

  if (!cat || !amount || isNaN(amount)) { toast('Fill in category and amount'); return; }

  const btn = document.getElementById('tx-btn');
  btn.disabled = true;

  const { error } = await sb.from('transactions').insert({
    month_id: state.currentMonthId,
    category: cat,
    store: store || null,
    item: item || null,
    amount,
    date: date || null,
  });

  if (error) { toast('Error saving — try again'); btn.disabled = false; return; }

  // Clear form
  document.getElementById('tx-store').value = '';
  document.getElementById('tx-item').value = '';
  document.getElementById('tx-amount').value = '';
  document.getElementById('tx-date').value = today();
  btn.disabled = false;

  await loadTransactions(state.currentMonthId);
  renderApp();
  toast('Transaction saved ✓');
}

// ── Setup: create month ───────────────────────────────────────────────
async function createMonth(num) {
  const { data, error } = await sb.from('months').insert({
    month_name: MONTHS[num - 1],
    month_num: num,
    year: 2026,
  }).select().single();
  if (error) { toast('Error creating month'); return; }
  state.months.push(data);
  state.months.sort((a, b) => a.month_num - b.month_num);
  await switchMonth(data.id);
}

// ── Render ────────────────────────────────────────────────────────────
function renderApp() {
  const root = document.getElementById('root');

  if (state.months.length === 0) {
    root.innerHTML = `
      <div class="main">
        <div class="setup">
          <h2>Welcome to Budget 2026 👋</h2>
          <p>Which month do you want to start with?</p>
          <div class="setup-form">
            <div class="fg">
              <label>Month</label>
              <select id="setup-month">
                ${MONTHS.map((m,i) => `<option value="${i+1}" ${i===1?'selected':''}>${m}</option>`).join('')}
              </select>
            </div>
            <button class="btn btn-primary" onclick="createMonth(parseInt(document.getElementById('setup-month').value))">
              Start this month →
            </button>
          </div>
        </div>
      </div>`;
    return;
  }

  const current = state.months.find(m => m.id === state.currentMonthId) || state.months[state.months.length - 1];
  if (!state.currentMonthId) state.currentMonthId = current.id;

  const income = totalIncome(current);
  const spent = spentByCategory();
  const totalSpent = Object.values(spent).reduce((a, b) => a + b, 0)
    + (Number(current.savings_bank) || 0)
    + (Number(current.savings_invested) || 0);
  const remaining = income - totalSpent;
  const totalBudgeted = Object.values(state.budgets).reduce((a, b) => a + b, 0);

  root.innerHTML = `
    <div class="hdr">
      <h1>Budget 2026</h1>
      <div style="display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;">
        <div class="page-tabs">
          <button class="ptab ${state.activeTab === 'budget' ? 'active' : ''}" onclick="switchTab('budget')">Budget</button>
          <button class="ptab ${state.activeTab === 'biz' ? 'active' : ''}" onclick="switchTab('biz')">Biz 💼</button>
        </div>
        <div class="month-tabs">
          ${state.months.map(m => `
            <button class="mtab ${m.id === state.currentMonthId ? 'active' : ''}" onclick="switchMonth('${m.id}')">
              ${m.month_name.slice(0,3)}
            </button>`).join('')}
        </div>
      </div>
    </div>

    <div class="main">
      ${state.loading ? '<div class="loading">Loading...</div>' : state.activeTab === 'biz' ? renderBizTab(current) : `

      <!-- Top stats -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-label">Income</div>
          <div class="stat-val">${fmt(income)}</div>
          <div class="stat-sub">This month</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Spent</div>
          <div class="stat-val">${fmt(totalSpent)}</div>
          <div class="stat-sub">Including savings</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Left to Spend</div>
          <div class="stat-val ${remaining >= 0 ? 'green' : 'red'}">${fmt(remaining)}</div>
          <div class="stat-sub">${remaining >= 0 ? 'Looking good' : 'Over budget'}</div>
        </div>
      </div>

      <!-- Income breakdown -->
      <div class="card">
        <div class="card-title">Income Breakdown</div>
        <div class="income-grid">
          <div class="income-row"><span class="income-source">Petachya</span><input class="income-input" type="number" id="inc-petachya" value="${current.income_petachya || ''}" placeholder="0" onchange="saveIncomeField('income_petachya', this.value)" min="0" step="1"></div>
          <div class="income-row"><span class="income-source">Clalit</span><input class="income-input" type="number" id="inc-clalit" value="${current.income_clalit || ''}" placeholder="0" onchange="saveIncomeField('income_clalit', this.value)" min="0" step="1"></div>
          <div class="income-row"><span class="income-source">Private (Vivi)</span><input class="income-input" type="number" id="inc-private" value="${current.income_private || ''}" placeholder="0" onchange="saveIncomeField('income_private', this.value)" min="0" step="1"></div>
          <div class="income-row"><span class="income-source">Other</span><input class="income-input" type="number" id="inc-other" value="${current.income_other || ''}" placeholder="0" onchange="saveIncomeField('income_other', this.value)" min="0" step="1"></div>
        </div>
      </div>

      <!-- Add transaction -->
      <div class="add-section">
        <div class="add-title">Add Transaction</div>
        <div class="form-row">
          <div class="fg" style="min-width:140px;flex:1.5;">
            <label>Category</label>
            <select id="tx-cat">
              <option value="">Select...</option>
              ${CATEGORIES.map(c => `<option value="${c.key}">${c.emoji} ${c.label}</option>`).join('')}
            </select>
          </div>
          <div class="fg">
            <label>Store</label>
            <input type="text" id="tx-store" placeholder="Makolet, Wolt...">
          </div>
          <div class="fg">
            <label>Item</label>
            <input type="text" id="tx-item" placeholder="Yogurt, rent...">
          </div>
          <div class="fg" style="max-width:110px;">
            <label>Amount ₪</label>
            <input type="number" id="tx-amount" placeholder="0" min="0" step="0.01">
          </div>
          <div class="fg" style="max-width:140px;">
            <label>Date</label>
            <input type="date" id="tx-date" value="${today()}">
          </div>
          <button class="btn btn-primary" id="tx-btn" onclick="addTransaction()">Save</button>
        </div>
      </div>

      <!-- Category bars -->
      <div class="card-title" style="padding:.5rem 0 .75rem;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);">
        Spending by Category — click to see transactions
      </div>
      <div class="categories">
        ${CATEGORIES.map(c => {
          const s = spent[c.key] || 0;
          const b = state.budgets[c.key] || 0;
          const st = status(s, b);
          const p = pct(s, b);
          const txs = state.transactions.filter(tx => tx.category === c.key);
          return `
            <div class="cat-row" id="cat-${c.key}">
              <div class="cat-top" onclick="toggleCat('${c.key}')">
                <div class="cat-name">
                  <span class="cat-emoji">${c.emoji}</span>
                  ${c.label}
                </div>
                <div class="cat-amounts">
                  <span class="cat-spent-bold">${fmt(s)}</span>
                  ${b > 0 ? ` / ${fmt(b)}` : ' <span style="color:var(--dim)">no budget set</span>'}
                </div>
              </div>
              ${b > 0 ? `
                <div class="progress-bar">
                  <div class="progress-fill ${st}" style="width:${p}%"></div>
                </div>
                <div class="cat-remaining ${st}">
                  ${st === 'over' ? `₪${fmt(s - b).replace('₪','')} over budget` : `₪${fmt(b - s).replace('₪','')} remaining`}
                </div>` : ''}
              <div class="tx-list">
                ${txs.length === 0
                  ? '<div class="no-tx">No transactions yet</div>'
                  : txs.map(tx => `
                    <div class="tx-item">
                      <div class="tx-left">
                        <span class="tx-store">${tx.store || tx.item || '—'}</span>
                        ${tx.store && tx.item ? `<span class="tx-item-name">${tx.item}</span>` : ''}
                      </div>
                      <span class="tx-amt">${fmt(tx.amount)}</span>
                    </div>`).join('')}
              </div>
            </div>`;
        }).join('')}
      </div>
      `}
    </div>

    <!-- Edit income modal (budget tab only) -->
    <div id="income-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;display:none;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(4px);">
      <div style="background:var(--surface);border-radius:var(--rl);padding:1.75rem;max-width:380px;width:100%;box-shadow:var(--shadowlg);">
        <h3 style="font-size:1rem;font-weight:700;margin-bottom:1.25rem;">Edit Income — ${current.month_name}</h3>
        <div style="display:flex;flex-direction:column;gap:.65rem;">
          <div class="fg"><label>Petachya</label><input type="number" id="inc-petachya" value="${current.income_petachya || ''}" placeholder="0"></div>
          <div class="fg"><label>Clalit</label><input type="number" id="inc-clalit" value="${current.income_clalit || ''}" placeholder="0"></div>
          <div class="fg"><label>Private (Vivi)</label><input type="number" id="inc-private" value="${current.income_private || ''}" placeholder="0"></div>
          <div class="fg"><label>Other (parents, Marom, etc.)</label><input type="number" id="inc-other" value="${current.income_other || ''}" placeholder="0"></div>
          <div class="fg"><label>Savings to Bank</label><input type="number" id="inc-savings" value="${current.savings_bank || ''}" placeholder="0"></div>
        </div>
        <div style="display:flex;gap:.5rem;justify-content:flex-end;margin-top:1.25rem;">
          <button class="btn" style="background:var(--surface2);color:var(--muted);" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" onclick="saveIncome()">Save</button>
        </div>
      </div>
    </div>
  `;

  // Set store field visibility based on category
  const catSel = document.getElementById('tx-cat');
  if (catSel) {
    catSel.addEventListener('change', () => {
      const cat = CATEGORIES.find(c => c.key === catSel.value);
      const storeField = document.getElementById('tx-store');
      if (storeField) storeField.placeholder = cat?.hasStore ? 'Makolet, Yochananof...' : 'Optional';
    });
  }
}

function toggleCat(key) {
  const el = document.getElementById('cat-' + key);
  if (el) el.classList.toggle('open');
}

async function saveIncomeField(field, value) {
  const num = parseFloat(value) || 0;
  const { error } = await sb.from('months').update({ [field]: num }).eq('id', state.currentMonthId);
  if (error) { toast('Error saving'); return; }
  const month = state.months.find(m => m.id === state.currentMonthId);
  if (month) month[field] = num;
  // Re-render stats only
  renderApp();
  toast('Saved ✓');
}

function showEditIncome() {
  const modal = document.getElementById('income-modal');
  if (modal) { modal.style.display = 'flex'; }
}

function closeModal() {
  const modal = document.getElementById('income-modal');
  if (modal) modal.style.display = 'none';
}

async function saveIncome() {
  const updates = {
    income_petachya: parseFloat(document.getElementById('inc-petachya').value) || 0,
    income_clalit: parseFloat(document.getElementById('inc-clalit').value) || 0,
    income_private: parseFloat(document.getElementById('inc-private').value) || 0,
    income_other: parseFloat(document.getElementById('inc-other').value) || 0,
    savings_bank: parseFloat(document.getElementById('inc-savings').value) || 0,
  };
  const { error } = await sb.from('months').update(updates).eq('id', state.currentMonthId);
  if (error) { toast('Error saving'); return; }
  await loadMonths();
  state.currentMonthId = state.currentMonthId; // keep current
  closeModal();
  renderApp();
  toast('Income saved ✓');
}

function showAddMonth() {
  const existing = state.months.map(m => m.month_num);
  const available = MONTHS.map((m,i) => ({name: m, num: i+1})).filter(m => !existing.includes(m.num));
  if (available.length === 0) { toast('All months already added'); return; }
  const num = available[0].num;
  if (confirm(`Add ${MONTHS[num-1]}?`)) createMonth(num);
}

// ── Tab switching ─────────────────────────────────────────────────────
async function switchTab(tab) {
  state.activeTab = tab;
  if (tab === 'biz') {
    state.loading = true;
    renderApp();
    await loadBizData();
    state.loading = false;
  }
  renderApp();
}

// ── Biz data loading ──────────────────────────────────────────────────
async function loadBizData() {
  const current = state.months.find(m => m.id === state.currentMonthId);
  if (!current) return;

  // Load or create biz_months row
  const { data: bizRows } = await sb.from('biz_months').select('*').eq('month_id', state.currentMonthId);
  if (bizRows && bizRows.length > 0) {
    state.biz = bizRows[0];
  } else {
    const { data: newBiz } = await sb.from('biz_months').insert({ month_id: state.currentMonthId, accountant_fee: 200, spending: 0, confirmed_amount: 0 }).select().single();
    state.biz = newBiz;
  }

  // Load clients from private tracker
  const { data: clients } = await pt.from('clients').select('*');
  state.ptClients = clients || [];

  // Load sessions from previous month (that's when money is earned)
  const prevMonthNum = current.month_num - 1;
  const prevYear = prevMonthNum === 0 ? 2025 : 2026;
  const actualPrevMonthNum = prevMonthNum === 0 ? 12 : prevMonthNum;
  const monthStart = `${prevYear}-${String(actualPrevMonthNum).padStart(2,'0')}-01`;
  const monthEnd = `${current.year}-${String(current.month_num).padStart(2,'0')}-01`;

  // Earned = happened sessions from previous month
  const { data: earned } = await pt.from('sessions').select('*').eq('status','happened').gte('date', monthStart).lt('date', monthEnd);
  // Scheduled = upcoming sessions this month
  const thisMonthStart = `${current.year}-${String(current.month_num).padStart(2,'0')}-01`;
  const nextMonthNum = current.month_num === 12 ? 1 : current.month_num + 1;
  const nextYear = current.month_num === 12 ? current.year + 1 : current.year;
  const thisMonthEnd = `${nextYear}-${String(nextMonthNum).padStart(2,'0')}-01`;
  const { data: scheduled } = await pt.from('sessions').select('*').eq('status','scheduled').gte('date', thisMonthStart).lt('date', thisMonthEnd);

  state.ptSessions = { earned: earned || [], scheduled: scheduled || [] };

  // Load all biz_months for accountant fee tracking
  const monthIds = state.months.map(m => m.id);
  const { data: allBiz } = await sb.from('biz_months').select('*').in('month_id', monthIds);
  state.allBiz = allBiz || [];
}

// ── Biz tab render ────────────────────────────────────────────────────
function renderBizTab(current) {
  const biz = state.biz || { accountant_fee: 200, spending: 0, confirmed_amount: 0 };
  const clients = state.ptClients;
  const { earned, scheduled } = state.ptSessions || { earned: [], scheduled: [] };

  const clientName = id => clients.find(c => c.id === id)?.name || '?';
  const clientRate = id => clients.find(c => c.id === id)?.rate || 0;

  // Group earned sessions by client
  const earnedByClient = {};
  earned.forEach(s => {
    if (!earnedByClient[s.client_id]) earnedByClient[s.client_id] = [];
    earnedByClient[s.client_id].push(s);
  });
  const trackerTotal = earned.reduce((sum, s) => sum + clientRate(s.client_id), 0);

  // Group scheduled sessions by client
  const scheduledByClient = {};
  scheduled.forEach(s => {
    if (!scheduledByClient[s.client_id]) scheduledByClient[s.client_id] = [];
    scheduledByClient[s.client_id].push(s);
  });
  const scheduledTotal = scheduled.reduce((sum, s) => sum + clientRate(s.client_id), 0);

  const afterVV = (biz.confirmed_amount || 0) * 0.85;
  const net = afterVV - (biz.accountant_fee || 0) - (biz.spending || 0);
  const prevMonthName = current.month_num > 1 ? MONTHS[current.month_num - 2] : 'December';

  return `
    <div class="biz-card">
      <div class="biz-section-title">
        Money Earned — ${prevMonthName} sessions
        <button class="biz-sync-btn" onclick="refreshBiz()">↻ Sync</button>
      </div>
      ${Object.keys(earnedByClient).length === 0
        ? `<div style="color:var(--dim);font-size:.8rem;padding:.5rem 0">No sessions found for ${prevMonthName}</div>`
        : Object.entries(earnedByClient).map(([cid, sessions]) => `
          <div class="biz-session-item">
            <span>${clientName(cid)} × ${sessions.length}</span>
            <span class="biz-val green">${fmt(sessions.length * clientRate(cid))}</span>
          </div>`).join('')}
      <div class="biz-row" style="margin-top:.5rem;background:var(--gsoft);">
        <span class="biz-label" style="font-weight:700;">Tracker total</span>
        <span class="biz-val green">${fmt(trackerTotal)}</span>
      </div>
    </div>

    <div class="biz-card">
      <div class="biz-section-title">Money to be Earned — ${current.month_name} scheduled</div>
      ${Object.keys(scheduledByClient).length === 0
        ? `<div style="color:var(--dim);font-size:.8rem;padding:.5rem 0">No sessions scheduled for ${current.month_name}</div>`
        : Object.entries(scheduledByClient).map(([cid, sessions]) => `
          <div class="biz-session-item">
            <span>${clientName(cid)} × ${sessions.length}</span>
            <span class="biz-val amber">${fmt(sessions.length * clientRate(cid))}</span>
          </div>`).join('')}
      <div class="biz-row" style="background:var(--ambersoft);">
        <span class="biz-label" style="font-weight:700;">Scheduled total</span>
        <span class="biz-val amber">${fmt(scheduledTotal)}</span>
      </div>
    </div>

    <div class="biz-card">
      <div class="biz-section-title">Confirmed Income (VV)</div>
      <div class="biz-row">
        <span class="biz-label">Confirmed amount</span>
        <input class="biz-input" type="number" value="${biz.confirmed_amount || ''}" placeholder="0"
          onchange="saveBizField('confirmed_amount', this.value)">
      </div>
      <div class="biz-row" style="background:var(--rsoft);">
        <span class="biz-label">VV tax (15%)</span>
        <span class="biz-val" style="color:var(--red)">−${fmt((biz.confirmed_amount || 0) * 0.15)}</span>
      </div>
      <div class="biz-row" style="background:var(--gsoft);">
        <span class="biz-label">After VV</span>
        <span class="biz-val green">${fmt(afterVV)}</span>
      </div>
      <div class="biz-row">
        <span class="biz-label">Accountant fee</span>
        <input class="biz-input" type="number" value="${biz.accountant_fee ?? 200}" placeholder="200"
          onchange="saveBizField('accountant_fee', this.value)">
      </div>
      <div class="biz-row">
        <span class="biz-label">Biz spending</span>
        <input class="biz-input" type="number" value="${biz.spending || ''}" placeholder="0"
          onchange="saveBizField('spending', this.value)">
      </div>
      <div class="biz-net">
        <span class="biz-net-label">Net → Private (Vivi)</span>
        <span class="biz-net-val">${fmt(net)}</span>
      </div>
    </div>

    ${renderAccountantTracker(current)}
  `;
}

function renderAccountantTracker(current) {
  const allBiz = state.allBiz || [];
  const totalPaid = allBiz.reduce((sum, b) => sum + (b.accountant_fee || 0), 0);
  const shouldBe = current.month_num * 200;
  const diff = totalPaid - shouldBe;
  const diffLabel = diff === 0 ? 'on track' : diff > 0 ? `₪${diff} ahead` : `₪${Math.abs(diff)} behind`;
  const diffColor = diff === 0 ? 'var(--green)' : diff > 0 ? 'var(--amber)' : 'var(--red)';

  return `
    <div class="biz-card">
      <div class="biz-section-title">Accountant Fee Tracker — ₪200/month</div>
      <div class="biz-row">
        <span class="biz-label">Should have paid by ${current.month_name}</span>
        <span class="biz-val">${fmt(shouldBe)}</span>
      </div>
      <div class="biz-row">
        <span class="biz-label">Actually paid (all months)</span>
        <span class="biz-val">${fmt(totalPaid)}</span>
      </div>
      <div class="biz-row" style="background:var(--surface3);">
        <span class="biz-label" style="font-weight:700;">Status</span>
        <span style="font-family:'DM Mono',monospace;font-size:.88rem;font-weight:700;color:${diffColor};">${diffLabel}</span>
      </div>
    </div>
  `;
}

async function saveBizField(field, value) {
  const num = parseFloat(value) || 0;
  const { error } = await sb.from('biz_months').update({ [field]: num }).eq('id', state.biz.id);
  if (error) { toast('Error saving'); return; }
  state.biz[field] = num;

  // If confirmed_amount changes, also update income_private in main months table
  if (field === 'confirmed_amount') {
    const net = num * 0.85 - (state.biz.accountant_fee || 0) - (state.biz.spending || 0);
    await sb.from('months').update({ income_private: net }).eq('id', state.currentMonthId);
    const month = state.months.find(m => m.id === state.currentMonthId);
    if (month) month.income_private = net;
  }
  if (field === 'accountant_fee' || field === 'spending') {
    const net = (state.biz.confirmed_amount || 0) * 0.85 - (state.biz.accountant_fee || 0) - (state.biz.spending || 0);
    await sb.from('months').update({ income_private: net }).eq('id', state.currentMonthId);
    const month = state.months.find(m => m.id === state.currentMonthId);
    if (month) month.income_private = net;
  }

  renderApp();
  toast('Saved ✓');
}

async function refreshBiz() {
  state.loading = true;
  renderApp();
  await loadBizData();
  state.loading = false;
  renderApp();
}

// ── Init ──────────────────────────────────────────────────────────────
async function init() {
  await loadMonths();
  if (state.months.length > 0) {
    // Default to current month or latest
    const now = new Date();
    const currentMonth = state.months.find(m => m.month_num === now.getMonth() + 1) || state.months[state.months.length - 1];
    await switchMonth(currentMonth.id);
  } else {
    state.loading = false;
    renderApp();
  }
}

init();
</script>
</body>
</html>
