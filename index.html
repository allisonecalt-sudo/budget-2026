// ── Charity tab render ────────────────────────────────────────────────
function renderCharityTab() {
  const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const items = state.charity.items || [];
  const allocs = state.charity.allocations || {};
  const currentMonthObj = state.months.find(m => m.id === state.currentMonthId);
  const currentMonthNum = currentMonthObj ? currentMonthObj.month_num : null;
  const payments = state.charity.payments || [];

  const budget = items.reduce((s, i) => s + Number(i.projected_amount), 0);
  const totalAlloc = Object.values(allocs).reduce((s, a) => s + Number(a.amount), 0);
  const gap = budget - totalAlloc;
  const totalSpent = payments.reduce((s, p) => s + Number(p.amount), 0);
  const remaining = budget - totalSpent;

  const fmtA = n => '₪' + Number(n||0).toLocaleString('he-IL',{minimumFractionDigits:2,maximumFractionDigits:2});
  const esc = s => (s||'').replace(/"/g,'&quot;');

  // Pre-compute sort buttons HTML
  const ciSort = localStorage.getItem('charityItemSort') || 'created';
  const sortBtnsHtml = [['created','Added'],['alpha','A→Z'],['alpha-desc','Z→A'],['amount-high','High'],['amount-low','Low']].map(([k,lbl]) => {
    const active = ciSort === k;
    return '<button onclick="localStorage.setItem(\'charityItemSort\',\''+k+'\');renderApp()" style="font-size:.6rem;padding:.1rem .35rem;border:1px solid '+(active?'var(--accent)':'var(--border)')+';border-radius:4px;background:'+(active?'var(--gsoft)':'none')+';color:'+(active?'var(--accent)':'var(--dim)')+';cursor:pointer;font-family:\'DM Sans\',sans-serif;">'+lbl+'</button>';
  }).join('');

  // Pre-compute items HTML
  const sortedItems = [...items].sort((a,b) => {
    if (ciSort==='alpha') return (a.label||'').localeCompare(b.label||'');
    if (ciSort==='alpha-desc') return (b.label||'').localeCompare(a.label||'');
    if (ciSort==='amount-high') return Number(b.projected_amount)-Number(a.projected_amount);
    if (ciSort==='amount-low') return Number(a.projected_amount)-Number(b.projected_amount);
    return 0;
  });
  const itemsCharityHtml = sortedItems.map(item => {
    const subs = (state.charity.subItems || []).filter(s => s.item_id === item.id);
    const isOpen = localStorage.getItem('sn-chr-'+item.id) === '1';
    const paidTotal = subs.filter(s=>s.is_paid).reduce((n,s)=>n+Number(s.amount),0);
    const subBadge = subs.length > 0 ? '<span style="font-size:.6rem;color:var(--muted);margin-left:.3rem;">'+subs.filter(s=>s.is_paid).length+'/'+subs.length+' paid</span>' : '';
    const rowOpacity = item.is_logged ? 'opacity:.45;' : '';
    const strikeLabel = item.is_logged ? 'text-decoration:line-through;' : '';
    const amtColor = item.is_estimate ? 'var(--amber)' : 'var(--text)';
    const estBg = item.is_estimate ? 'var(--ambersoft, #fff8e1)' : 'none';
    const estBorder = item.is_estimate ? 'var(--amber)' : 'var(--border)';
    const estColor = item.is_estimate ? 'var(--amber)' : 'var(--dim)';
    const estWeight = item.is_estimate ? '700' : '400';
    const logBg = item.is_logged ? 'var(--gsoft)' : 'none';
    const logBorder = item.is_logged ? 'var(--accent)' : 'var(--border)';
    const logColor = item.is_logged ? 'var(--accent)' : 'var(--dim)';
    const logIcon = item.is_logged ? '✓' : '○';
    let subsHtml = '';
    if (isOpen) {
      const subRows = subs.map(s => {
        const sPaid = s.is_paid;
        const sRowOp = sPaid ? 'opacity:.5;' : '';
        const sStrike = sPaid ? 'text-decoration:line-through;' : '';
        const sBg = sPaid ? 'var(--gsoft)' : 'none';
        const sBorder = sPaid ? 'var(--accent)' : 'var(--border)';
        const sColor = sPaid ? 'var(--accent)' : 'var(--dim)';
        const sIcon = sPaid ? '✓' : '○';
        return '<div style="display:grid;grid-template-columns:1fr 80px 28px 28px;gap:.25rem;align-items:center;padding:.2rem 0;'+sRowOp+'">'
          + '<input type="text" value="'+esc(s.label)+'" placeholder="note (optional)" style="font-size:.75rem;background:transparent;border:none;border-bottom:1px solid transparent;padding:.05rem .2rem;color:var(--text);outline:none;font-family:\'DM Sans\',sans-serif;width:100%;'+sStrike+'" onfocus="this.style.borderBottomColor=\'var(--accent)\'" onblur="this.style.borderBottomColor=\'transparent\'" onchange="updateCharitySub(\''+s.id+'\',\'label\',this.value)">'
          + '<input type="number" value="'+(s.amount||'')+'" placeholder="₪" min="0" step="1" style="font-size:.75rem;font-family:\'DM Mono\',monospace;background:transparent;border:none;border-bottom:1px solid transparent;padding:.05rem .1rem;color:var(--text);outline:none;text-align:right;width:100%;-moz-appearance:textfield;'+sStrike+'" onfocus="this.style.borderBottomColor=\'var(--accent)\'" onblur="this.style.borderBottomColor=\'transparent\'" onchange="updateCharitySub(\''+s.id+'\',\'amount\',this.value)">'
          + '<button onclick="updateCharitySub(\''+s.id+'\',\'is_paid\','+(!s.is_paid)+')" title="'+(sPaid?'Mark as unpaid':'Mark as paid')+'" style="background:'+sBg+';border:1px solid '+sBorder+';border-radius:4px;color:'+sColor+';cursor:pointer;font-size:.75rem;padding:.1rem .2rem;line-height:1;font-weight:700;">'+sIcon+'</button>'
          + '<button onclick="deleteCharitySub(\''+s.id+'\')" title="Delete" style="background:none;border:1px solid var(--border);border-radius:4px;color:var(--dim);cursor:pointer;font-size:.8rem;padding:.1rem .2rem;line-height:1;">×</button>'
          + '</div>';
      }).join('');
      const paidSummary = subs.length > 0 ? '<div style="font-size:.68rem;color:var(--muted);margin-top:.2rem;font-family:\'DM Mono\',monospace;">paid '+fmtA(paidTotal)+' of '+fmtA(Number(item.projected_amount||0))+'</div>' : '';
      subsHtml = '<div style="padding:.3rem .5rem .5rem 1.5rem;background:var(--surface2);border-radius:0 0 6px 6px;">'
        + subRows
        + '<button onclick="addCharitySub(\''+item.id+'\')" style="margin-top:.3rem;background:none;border:none;color:var(--accent);font-size:.72rem;cursor:pointer;font-family:\'DM Sans\',sans-serif;padding:.1rem 0;">+ add payment</button>'
        + paidSummary
        + '</div>';
    }
    return '<div style="border-bottom:1px solid var(--border);">'
      + '<div style="display:grid;grid-template-columns:16px 1fr 90px 42px 28px 28px;gap:.25rem;align-items:center;padding:.3rem .1rem;'+rowOpacity+'">'
      + '<button onclick="var k=\'sn-chr-'+item.id+'\';localStorage.setItem(k,localStorage.getItem(k)===\'1\'?\'0\':\'1\');renderApp()" style="background:none;border:none;cursor:pointer;color:var(--dim);font-size:.7rem;padding:0;line-height:1;text-align:center;" title="Show/hide sub-payments">'+(isOpen?'▾':'▸')+'</button>'
      + '<div style="display:flex;align-items:baseline;min-width:0;"><input type="text" value="'+esc(item.label)+'" placeholder="Item name" style="font-size:.82rem;background:transparent;border:none;border-bottom:1px solid transparent;padding:.1rem .2rem;color:var(--text);outline:none;font-family:\'DM Sans\',sans-serif;width:100%;'+strikeLabel+'" onmouseover="this.style.borderBottomColor=\'var(--border)\'" onmouseout="if(document.activeElement!==this)this.style.borderBottomColor=\'transparent\'" onfocus="this.style.borderBottomColor=\'var(--accent)\'" onblur="this.style.borderBottomColor=\'transparent\'" onchange="saveCharityItem(\''+item.id+'\',\'label\',this.value)">'+subBadge+'</div>'
      + '<input type="number" value="'+(item.projected_amount||'')+'" placeholder="0" min="0" step="1" style="font-size:.82rem;font-family:\'DM Mono\',monospace;background:transparent;border:none;border-bottom:1px solid transparent;padding:.1rem .2rem;color:'+amtColor+';outline:none;text-align:right;width:100%;-moz-appearance:textfield;'+strikeLabel+'" onmouseover="this.style.borderBottomColor=\'var(--border)\'" onmouseout="if(document.activeElement!==this)this.style.borderBottomColor=\'transparent\'" onfocus="this.style.borderBottomColor=\'var(--accent)\'" onblur="this.style.borderBottomColor=\'transparent\'" onchange="saveCharityItem(\''+item.id+'\',\'projected_amount\',this.value)">'
      + '<button onclick="saveCharityItem(\''+item.id+'\',\'is_estimate\','+(!item.is_estimate)+')" title="'+(item.is_estimate?'Marked as estimate — click to confirm exact':'Mark as estimate')+'" style="background:'+estBg+';border:1px solid '+estBorder+';border-radius:4px;color:'+estColor+';cursor:pointer;font-size:.65rem;padding:.1rem .2rem;font-weight:'+estWeight+';font-family:\'DM Sans\',sans-serif;width:100%;">~est</button>'
      + '<button onclick="deleteCharityItem(\''+item.id+'\')" title="Delete" style="background:none;border:1px solid var(--border);border-radius:4px;color:var(--dim);cursor:pointer;font-size:.85rem;padding:.1rem .2rem;line-height:1;">×</button>'
      + '<button onclick="saveCharityItem(\''+item.id+'\',\'is_logged\','+(!item.is_logged)+')" title="'+(item.is_logged?'Mark as not logged':'Mark as logged/done')+'" style="background:'+logBg+';border:1px solid '+logBorder+';border-radius:4px;color:'+logColor+';cursor:pointer;font-size:.8rem;padding:.1rem .2rem;line-height:1;font-weight:700;">'+logIcon+'</button>'
      + '</div>'
      + subsHtml
      + '</div>';
  }).join('');

  // Pre-compute payment log HTML
  let payLogHtml = '';
  if (payments.length === 0) {
    payLogHtml = '<div style="color:var(--dim);font-size:.78rem;padding:.3rem 0;">No payments yet</div>';
  } else {
    const ps = localStorage.getItem('charityPaySort') || 'month';
    const sorted = [...payments].sort((a,b) => {
      if (ps==='month') return a.month_num - b.month_num;
      if (ps==='month-desc') return b.month_num - a.month_num;
      if (ps==='high') return Number(b.amount) - Number(a.amount);
      if (ps==='low') return Number(a.amount) - Number(b.amount);
      return 0;
    });
    const sb2 = (key, label) => '<button onclick="localStorage.setItem(\'charityPaySort\',\''+key+'\');renderApp()" style="background:none;border:1px solid '+(ps===key?'var(--accent)':'var(--border)')+';border-radius:4px;font-size:.64rem;padding:.1rem .3rem;cursor:pointer;color:'+(ps===key?'var(--accent)':'var(--muted)')+';font-family:\'DM Sans\',sans-serif;font-weight:'+(ps===key?'600':'400')+';">'+label+'</button>';
    const payRows = sorted.map(p => {
      const estBgP = p.is_estimate ? 'background:var(--ambersoft,#fffbf0);' : '';
      const amtColorP = p.is_estimate ? 'var(--amber)' : 'var(--text)';
      const amtWeightP = p.is_estimate ? '700' : '400';
      const estBtnBg = p.is_estimate ? 'var(--ambersoft,#fff3cd)' : 'none';
      const estBtnBorder = p.is_estimate ? 'var(--amber)' : 'var(--border)';
      const estBtnColor = p.is_estimate ? 'var(--amber)' : 'var(--dim)';
      const estBtnWeight = p.is_estimate ? '700' : '400';
      return '<div style="display:grid;grid-template-columns:45px 1fr 90px 80px 28px 28px 38px 26px;gap:.25rem;align-items:center;padding:.28rem .1rem;border-bottom:1px solid var(--border);font-size:.8rem;'+estBgP+'">'
        + '<span style="font-size:.7rem;color:var(--muted);font-family:\'DM Mono\',monospace;">'+MONTH_NAMES[p.month_num-1]+'</span>'
        + '<input type="text" value="'+esc(p.label)+'" placeholder="Charity" style="font-size:.8rem;background:transparent;border:none;border-bottom:1px solid transparent;padding:.1rem .15rem;color:var(--text);outline:none;font-family:\'DM Sans\',sans-serif;width:100%;" onmouseover="this.style.borderBottomColor=\'var(--border)\'" onmouseout="if(document.activeElement!==this)this.style.borderBottomColor=\'transparent\'" onfocus="this.style.borderBottomColor=\'var(--accent)\'" onblur="this.style.borderBottomColor=\'transparent\'" onchange="updateCharityPayment(\''+p.id+'\',\'label\',this.value)">'
        + '<input type="date" value="'+(p.payment_date||'')+'" style="font-size:.74rem;background:transparent;border:none;border-bottom:1px solid transparent;padding:.1rem .1rem;color:var(--text);outline:none;font-family:\'DM Sans\',sans-serif;width:100%;" onmouseover="this.style.borderBottomColor=\'var(--border)\'" onmouseout="if(document.activeElement!==this)this.style.borderBottomColor=\'transparent\'" onfocus="this.style.borderBottomColor=\'var(--accent)\'" onblur="this.style.borderBottomColor=\'transparent\'" onchange="updateCharityPayment(\''+p.id+'\',\'payment_date\',this.value)">'
        + '<input type="number" value="'+p.amount+'" min="0" step="0.01" style="font-size:.8rem;font-family:\'DM Mono\',monospace;background:transparent;border:none;border-bottom:1px solid transparent;padding:.1rem .1rem;color:'+amtColorP+';font-weight:'+amtWeightP+';outline:none;text-align:right;width:100%;-moz-appearance:textfield;" onmouseover="this.style.borderBottomColor=\'var(--border)\'" onmouseout="if(document.activeElement!==this)this.style.borderBottomColor=\'transparent\'" onfocus="this.style.borderBottomColor=\'var(--accent)\'" onblur="this.style.borderBottomColor=\'transparent\'" onchange="updateCharityPayment(\''+p.id+'\',\'amount\',this.value)">'
        + '<button onclick="updateCharityPayment(\''+p.id+'\',\'has_receipt\','+(!(p.has_receipt))+')" title="Has receipt" style="background:'+(p.has_receipt?'var(--gsoft)':'none')+';border:1px solid '+(p.has_receipt?'var(--accent)':'var(--border)')+';border-radius:4px;color:'+(p.has_receipt?'var(--accent)':'var(--dim)')+';cursor:pointer;font-size:.75rem;padding:.1rem .2rem;line-height:1;">'+(p.has_receipt?'🧾':'□')+'</button>'
        + '<button onclick="updateCharityPayment(\''+p.id+'\',\'is_given\','+(!(p.is_given))+')" title="Mark as given" style="background:'+(p.is_given?'var(--gsoft)':'none')+';border:1px solid '+(p.is_given?'var(--accent)':'var(--border)')+';border-radius:4px;color:'+(p.is_given?'var(--accent)':'var(--dim)')+';cursor:pointer;font-size:.8rem;padding:.1rem .2rem;line-height:1;font-weight:700;">'+(p.is_given?'✓':'○')+'</button>'
        + '<button onclick="updateCharityPayment(\''+p.id+'\',\'is_estimate\','+(!(p.is_estimate))+')" title="'+(p.is_estimate?'Marked as estimate — click to confirm':'Mark as estimate')+'" style="background:'+estBtnBg+';border:1px solid '+estBtnBorder+';border-radius:4px;color:'+estBtnColor+';cursor:pointer;font-size:.62rem;padding:.1rem .15rem;font-weight:'+estBtnWeight+';font-family:\'DM Sans\',sans-serif;width:100%;">~est</button>'
        + '<button onclick="deleteCharityPayment(\''+p.id+'\')" title="Delete" style="background:none;border:1px solid var(--border);border-radius:4px;color:var(--dim);cursor:pointer;font-size:.85rem;padding:.1rem .25rem;line-height:1;">×</button>'
        + '</div>';
    }).join('');
    payLogHtml = '<div style="display:flex;align-items:center;gap:.3rem;padding-bottom:.4rem;">'
      + '<span style="font-size:.62rem;color:var(--dim);font-weight:700;text-transform:uppercase;letter-spacing:.04em;">Sort:</span>'
      + sb2('month','Mo ↑') + sb2('month-desc','Mo ↓') + sb2('high','Highest') + sb2('low','Lowest')
      + '</div>'
      + '<div style="overflow-x:auto;"><div style="min-width:400px;">'
      + '<div style="display:grid;grid-template-columns:45px 1fr 90px 80px 28px 28px 38px 26px;gap:.25rem;font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--dim);padding:.1rem .1rem .35rem;border-bottom:1px solid var(--border);">'
      + '<span>Mo</span><span>Charity</span><span>Date</span><span style="text-align:right">Amount</span><span style="text-align:center">🧾</span><span style="text-align:center">✓</span><span style="text-align:center">~est</span><span></span>'
      + '</div>'
      + payRows
      + '</div></div>'
      + '<div style="margin-top:.5rem;padding-top:.5rem;border-top:1px solid var(--border);display:flex;justify-content:space-between;">'
      + '<span style="font-size:.72rem;font-weight:700;color:var(--muted);">Total given</span>'
      + '<span style="font-family:\'DM Mono\',monospace;font-size:.85rem;font-weight:600;">'+fmtA(totalSpent)+'</span>'
      + '</div>';
  }

  // Pre-compute allocation grid HTML
  const allocGridHtml = MONTH_NAMES.map((mn, i) => {
    const mnum = i + 1;
    const val = allocs[mnum] ? allocs[mnum].amount : '';
    const isCurrent = mnum === currentMonthNum;
    const rowBg = isCurrent ? 'var(--gsoft)' : 'var(--surface2)';
    const rowBorder = isCurrent ? 'var(--accent)' : 'transparent';
    const labelColor = isCurrent ? 'var(--accent)' : 'var(--muted)';
    const labelWeight = isCurrent ? '700' : '600';
    const inputColor = isCurrent ? 'var(--accent)' : 'var(--text)';
    const inputWeight = isCurrent ? '600' : '400';
    return '<div style="display:flex;justify-content:space-between;align-items:center;padding:.25rem .4rem;background:'+rowBg+';border-radius:6px;border:1px solid '+rowBorder+';">'
      + '<span style="font-size:.72rem;color:'+labelColor+';font-weight:'+labelWeight+';">'+mn+'</span>'
      + '<span style="width:60px;font-size:.78rem;font-family:\'DM Mono\',monospace;text-align:right;color:'+inputColor+';font-weight:'+inputWeight+';display:inline-block;" title="Set from Budget page">'+(val ? fmtA(val) : '₪0')+'</span>'
      + '</div>';
  }).join('');

  const gapColorC = gap > 0 ? 'var(--red)' : 'var(--green)';
  const gapTextC = gap > 0 ? '(−'+fmtA(gap)+' gap)' : '✓';
  const allocTotalColorC = gap > 0 ? 'var(--red)' : 'var(--green)';
  const monthSelectHtml = MONTH_NAMES.map((mn,i) => '<option value="'+(i+1)+'"'+(i+1===currentMonthNum?' selected':'')+'>'+mn+'</option>').join('');

  return `
  <div style="max-width:1100px;margin:0 auto;padding:1.5rem 1rem;">
    <!-- Summary Bar -->
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:.75rem;margin-bottom:1.5rem;">
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:1rem;box-shadow:var(--shadow);">
        <div style="font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:.4rem;">Allocated</div>
        <div style="font-family:'DM Mono',monospace;font-size:1.4rem;font-weight:500;">${fmtA(totalAlloc)}</div>
        <div style="font-size:.68rem;color:var(--dim);margin-top:.2rem;">set aside so far</div>
      </div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:1rem;box-shadow:var(--shadow);">
        <div style="font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:.4rem;">Given</div>
        <div style="font-family:'DM Mono',monospace;font-size:1.4rem;font-weight:500;">${fmtA(totalSpent)}</div>
        <div style="font-size:.68rem;color:var(--dim);margin-top:.2rem;">paid so far (incl. estimates)</div>
      </div>
      <div style="background:var(--surface);border:1px solid var(--accent);border-radius:var(--rl);padding:1rem;box-shadow:var(--shadow);">
        <div style="font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);margin-bottom:.4rem;">Remaining to Give</div>
        <div style="font-family:'DM Mono',monospace;font-size:1.4rem;font-weight:500;color:var(--accent);">${fmtA(totalAlloc - totalSpent)}</div>
        <div style="font-size:.68rem;color:var(--dim);margin-top:.2rem;">allocated − given</div>
      </div>
    </div>

    <div style="display:flex;flex-direction:column;gap:1.25rem;">

      <!-- Allocations + Payments -->
      <div style="display:flex;flex-direction:column;gap:1rem;">

        <!-- Monthly Allocations -->
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:1.25rem;box-shadow:var(--shadow);">
          <div style="font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:.9rem;">Monthly Allocation</div>
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:.4rem;">${allocGridHtml}</div>
          <div style="margin-top:.7rem;padding-top:.6rem;border-top:1px solid var(--border);display:flex;justify-content:space-between;">
            <span style="font-size:.72rem;font-weight:700;color:var(--muted);">Total allocated</span>
            <span style="font-family:'DM Mono',monospace;font-size:.85rem;font-weight:600;color:${allocTotalColorC};">${fmtA(totalAlloc)} ${gapTextC}</span>
          </div>
        </div>

        <!-- Payment Log -->
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:1.25rem;box-shadow:var(--shadow);">
          <div style="font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:.9rem;">Payment Log</div>

          <!-- Add payment form -->
          <div style="display:grid;grid-template-columns:70px 1fr 90px 80px 28px;gap:.35rem;align-items:end;margin-bottom:.8rem;padding-bottom:.8rem;border-bottom:1px solid var(--border);">
            <select id="cp-month" style="font-size:.74rem;padding:.3rem .3rem;border:1px solid var(--border);border-radius:var(--r);background:var(--surface2);color:var(--text);font-family:'DM Sans',sans-serif;outline:none;">${monthSelectHtml}</select>
            <input type="text" id="cp-label" placeholder="Charity name" style="font-size:.74rem;padding:.3rem .4rem;border:1px solid var(--border);border-radius:var(--r);background:var(--surface2);color:var(--text);font-family:'DM Sans',sans-serif;outline:none;"
              onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'"
              onkeydown="if(event.key==='Enter')addCharityPayment()">
            <input type="date" id="cp-date" style="font-size:.74rem;padding:.3rem .4rem;border:1px solid var(--border);border-radius:var(--r);background:var(--surface2);color:var(--text);font-family:'DM Sans',sans-serif;outline:none;"
              onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'">
            <input type="number" id="cp-amount" placeholder="₪" min="0" step="0.01" style="font-size:.74rem;padding:.3rem .4rem;border:1px solid var(--border);border-radius:var(--r);background:var(--surface2);color:var(--text);font-family:'DM Mono',monospace;outline:none;-moz-appearance:textfield;"
              onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'"
              onkeydown="if(event.key==='Enter')addCharityPayment()">
            <button onclick="addCharityPayment()" style="padding:.3rem .4rem;background:var(--accent);color:white;border:none;border-radius:var(--r);font-size:.8rem;cursor:pointer;font-weight:600;">+</button>
          </div>

          ${payLogHtml}
        </div>
      </div>
    </div>
  </div>`;
}

// ── Admin tab render ──────────────────────────────────────────────────
function renderAdminTab() {
  const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const items = state.admin.items || [];
  const allocs = state.admin.allocations || {};
  const currentMonthObj = state.months.find(m => m.id === state.currentMonthId);
  const currentMonthNum = currentMonthObj ? currentMonthObj.month_num : null;
  const payments = state.admin.payments || [];

  const budget = items.reduce((s, i) => s + Number(i.projected_amount), 0);
  const totalAlloc = Object.values(allocs).reduce((s, a) => s + Number(a.amount), 0);
  const gap = budget - totalAlloc;
  const totalSpent = payments.reduce((s, p) => s + Number(p.amount), 0);
  const remaining = budget - totalSpent;

  const fmtA = n => '₪' + Number(n||0).toLocaleString('he-IL',{minimumFractionDigits:2,maximumFractionDigits:2});
  const esc = s => (s||'').replace(/"/g,'&quot;');

  // Pre-compute sort buttons HTML
  const aiSort = localStorage.getItem('adminItemSort') || 'created';
  const sortBtnsHtml = [['created','Added'],['alpha','A→Z'],['alpha-desc','Z→A'],['amount-high','High'],['amount-low','Low']].map(([k,lbl]) => {
    const active = aiSort === k;
    return '<button onclick="localStorage.setItem(\'adminItemSort\',\''+k+'\');renderApp()" style="font-size:.6rem;padding:.1rem .35rem;border:1px solid '+(active?'var(--accent)':'var(--border)')+';border-radius:4px;background:'+(active?'var(--gsoft)':'none')+';color:'+(active?'var(--accent)':'var(--dim)')+';cursor:pointer;font-family:\'DM Sans\',sans-serif;">'+lbl+'</button>';
  }).join('');

  // Pre-compute items HTML
  const sortedItems = [...items].sort((a,b) => {
    if (aiSort==='alpha') return (a.label||'').localeCompare(b.label||'');
    if (aiSort==='alpha-desc') return (b.label||'').localeCompare(a.label||'');
    if (aiSort==='amount-high') return Number(b.projected_amount)-Number(a.projected_amount);
    if (aiSort==='amount-low') return Number(a.projected_amount)-Number(b.projected_amount);
    return 0;
  });
  const itemsHtml = sortedItems.map(item => {
    const subs = (state.admin.subItems || []).filter(s => s.item_id === item.id);
    const isOpen = localStorage.getItem('sn-adm-'+item.id) === '1';
    const paidTotal = subs.filter(s=>s.is_paid).reduce((n,s)=>n+Number(s.amount),0);
    const remaining = Number(item.projected_amount||0) - paidTotal;
    const subBadge = paidTotal > 0 ? '<span style="font-size:.6rem;color:var(--accent);margin-left:.3rem;">'+fmtA(paidTotal)+' paid</span>'+(remaining > 0 ? '<span style="font-size:.6rem;color:var(--muted);margin-left:.3rem;">'+fmtA(remaining)+' left</span>' : '') : '';
    const rowOpacity = item.is_logged ? 'opacity:.45;' : '';
    const strikeLabel = item.is_logged ? 'text-decoration:line-through;' : '';
    const amtColor = paidTotal > 0 ? 'var(--muted)' : (item.is_estimate ? 'var(--amber)' : 'var(--text)');
    const estBg = item.is_estimate ? 'var(--ambersoft, #fff8e1)' : 'none';
    const estBorder = item.is_estimate ? 'var(--amber)' : 'var(--border)';
    const estColor = item.is_estimate ? 'var(--amber)' : 'var(--dim)';
    const estWeight = item.is_estimate ? '700' : '400';
    const logBg = item.is_logged ? 'var(--gsoft)' : 'none';
    const logBorder = item.is_logged ? 'var(--accent)' : 'var(--border)';
    const logColor = item.is_logged ? 'var(--accent)' : 'var(--dim)';
    const logIcon = item.is_logged ? '✓' : '○';
    let subsHtml = '';
    if (isOpen) {
      const subRows = subs.map(s => {
        const sPaid = s.is_paid;
        const sRowOp = sPaid ? 'opacity:.5;' : '';
        const sStrike = sPaid ? 'text-decoration:line-through;' : '';
        const sBg = sPaid ? 'var(--gsoft)' : 'none';
        const sBorder = sPaid ? 'var(--accent)' : 'var(--border)';
        const sColor = sPaid ? 'var(--accent)' : 'var(--dim)';
        const sIcon = sPaid ? '✓' : '○';
        return '<div style="display:grid;grid-template-columns:1fr 80px 28px 28px;gap:.25rem;align-items:center;padding:.2rem 0;'+sRowOp+'">'
          + '<input type="text" value="'+esc(s.label)+'" placeholder="note (optional)" style="font-size:.75rem;background:transparent;border:none;border-bottom:1px solid transparent;padding:.05rem .2rem;color:var(--text);outline:none;font-family:\'DM Sans\',sans-serif;width:100%;'+sStrike+'" onfocus="this.style.borderBottomColor=\'var(--accent)\'" onblur="this.style.borderBottomColor=\'transparent\'" onchange="updateAdminSub(\''+s.id+'\',\'label\',this.value)">'
          + '<input type="number" value="'+(s.amount||'')+'" placeholder="₪" min="0" step="1" style="font-size:.75rem;font-family:\'DM Mono\',monospace;background:transparent;border:none;border-bottom:1px solid transparent;padding:.05rem .1rem;color:var(--text);outline:none;text-align:right;width:100%;-moz-appearance:textfield;'+sStrike+'" onfocus="this.style.borderBottomColor=\'var(--accent)\'" onblur="this.style.borderBottomColor=\'transparent\'" onchange="updateAdminSub(\''+s.id+'\',\'amount\',this.value)">'
          + '<button onclick="updateAdminSub(\''+s.id+'\',\'is_paid\','+(!s.is_paid)+')" title="'+(sPaid?'Mark as unpaid':'Mark as paid')+'" style="background:'+sBg+';border:1px solid '+sBorder+';border-radius:4px;color:'+sColor+';cursor:pointer;font-size:.75rem;padding:.1rem .2rem;line-height:1;font-weight:700;">'+sIcon+'</button>'
          + '<button onclick="deleteAdminSub(\''+s.id+'\')" title="Delete" style="background:none;border:1px solid var(--border);border-radius:4px;color:var(--dim);cursor:pointer;font-size:.8rem;padding:.1rem .2rem;line-height:1;">×</button>'
          + '</div>';
      }).join('');
      const paidSummary = subs.length > 0 ? '<div style="font-size:.68rem;color:var(--muted);margin-top:.2rem;font-family:\'DM Mono\',monospace;">paid '+fmtA(paidTotal)+' of '+fmtA(Number(item.projected_amount||0))+'</div>' : '';
      subsHtml = '<div style="padding:.3rem .5rem .5rem 1.5rem;background:var(--surface2);border-radius:0 0 6px 6px;">'
        + subRows
        + '<button onclick="addAdminSub(\''+item.id+'\')" style="margin-top:.3rem;background:none;border:none;color:var(--accent);font-size:.72rem;cursor:pointer;font-family:\'DM Sans\',sans-serif;padding:.1rem 0;">+ add payment</button>'
        + paidSummary
        + '</div>';
    }
    return '<div style="border-bottom:1px solid var(--border);">'
      + '<div style="display:grid;grid-template-columns:16px 1fr 90px 42px 28px 28px;gap:.25rem;align-items:center;padding:.3rem .1rem;'+rowOpacity+'">'
      + '<button onclick="var k=\'sn-adm-'+item.id+'\';localStorage.setItem(k,localStorage.getItem(k)===\'1\'?\'0\':\'1\');renderApp()" style="background:none;border:none;cursor:pointer;color:var(--dim);font-size:.7rem;padding:0;line-height:1;text-align:center;" title="Show/hide sub-payments">'+(isOpen?'▾':'▸')+'</button>'

// ── Admin CRUD ────────────────────────────────────────────────────────
async function addAdminItem() {
  const { data, error } = await sb.from('admin_items').insert({ year: 2026, label: 'New item', projected_amount: 0 }).select().single();
  if (error) { toast('Error adding item'); return; }
  state.admin.items.push(data);
  renderApp();
}

async function saveAdminItem(id, field, value) {
  const item = state.admin.items.find(i => i.id === id);
  if (!item) return;
  const oldVal = item[field];
  const val = field === 'projected_amount' ? (parseFloat(value) || 0) : (field === 'is_estimate' || field === 'is_logged') ? Boolean(value) : value;
  await sb.from('admin_items').update({ [field]: val }).eq('id', id);
  item[field] = val;
  pushUndo({
    label: 'edit ' + field,
    undo: async () => { await sb.from('admin_items').update({ [field]: oldVal }).eq('id', id); item[field] = oldVal; renderApp(); },
    redo: async () => { await sb.from('admin_items').update({ [field]: val }).eq('id', id); item[field] = val; renderApp(); }
  });
  renderApp();
}

async function deleteAdminItem(id) {
  const snap = state.admin.items.find(i => i.id === id);
  if (!snap) return;
  await sb.from('admin_items').delete().eq('id', id);
  state.admin.items = state.admin.items.filter(i => i.id !== id);
  pushUndo({
    label: 'delete admin item',
    undo: async () => { const { data } = await sb.from('admin_items').insert(snap).select().single(); if (data) { state.admin.items.push(data); } renderApp(); },
    redo: async () => { await sb.from('admin_items').delete().eq('id', id); state.admin.items = state.admin.items.filter(i => i.id !== id); renderApp(); }
  });
  renderApp();
}

async function addAdminSub(itemId) {
  const { data, error } = await sb.from('admin_sub_items').insert({ item_id: itemId, label: '', amount: 0 }).select().single();
  if (error) { toast('Error'); return; }
  state.admin.subItems.push(data);
  localStorage.setItem('sn-adm-'+itemId, '1');
  renderApp();
}

async function updateAdminSub(id, field, value) {
  const s = state.admin.subItems.find(s => s.id === id);
  if (!s) return;
  const val = field === 'amount' ? (parseFloat(value) || 0) : field === 'is_paid' ? Boolean(value) : value;
  await sb.from('admin_sub_items').update({ [field]: val }).eq('id', id);
  s[field] = val;
  renderApp();
}

async function deleteAdminSub(id) {
  await sb.from('admin_sub_items').delete().eq('id', id);
  state.admin.subItems = state.admin.subItems.filter(s => s.id !== id);
  renderApp();
}

async function saveAdminAllocation(monthNum, value) {
  const num = parseFloat(value) || 0;
  const existing = state.admin.allocations[monthNum];
  const oldNum = existing ? Number(existing.amount) : 0;
  if (existing) {
    await sb.from('admin_allocations').update({ amount: num }).eq('id', existing.id);
    existing.amount = num;
  } else {
    const { data } = await sb.from('admin_allocations').insert({ year: 2026, month_num: monthNum, amount: num }).select().single();
    if (data) state.admin.allocations[monthNum] = data;
  }
  // Also sync to budgets table so main page stays in sync
  const month = state.months.find(m => m.month_num === monthNum);
  if (month) {
    await sb.from('budgets').upsert({ month_id: month.id, category: 'admin', amount: num }, { onConflict: 'month_id,category' });
    state.budgets['admin'] = num;
  }
  pushUndo({
    label: 'edit allocation',
    undo: async () => { const ex = state.admin.allocations[monthNum]; if (ex) { await sb.from('admin_allocations').update({ amount: oldNum }).eq('id', ex.id); ex.amount = oldNum; } renderApp(); },
    redo: async () => { const ex = state.admin.allocations[monthNum]; if (ex) { await sb.from('admin_allocations').update({ amount: num }).eq('id', ex.id); ex.amount = num; } renderApp(); }
  });
  renderApp();
}

async function addAdminPayment() {
  const monthNum = parseInt(document.getElementById('ap-month').value);
  const label = document.getElementById('ap-label').value.trim();
  const amount = parseFloat(document.getElementById('ap-amount').value);
  if (!label || !amount || isNaN(amount)) { toast('Fill in what and amount'); return; }
  const { data, error } = await sb.from('admin_payments').insert({ year: 2026, month_num: monthNum, label, amount }).select().single();
  if (error) { toast('Error saving'); return; }
  state.admin.payments.push(data);
  state.admin.payments.sort((a,b) => a.month_num - b.month_num);
  document.getElementById('ap-label').value = '';
  document.getElementById('ap-amount').value = '';
  renderApp();
  toast('Payment logged ✓');
}

async function deleteAdminPayment(id) {
  const snap = {...state.admin.payments.find(p => p.id === id)};
  await sb.from('admin_payments').delete().eq('id', id);
  state.admin.payments = state.admin.payments.filter(p => p.id !== id);
  pushUndo({
    label: 'delete payment',
    undo: async () => { const { data } = await sb.from('admin_payments').insert(snap).select().single(); if (data) { state.admin.payments.push(data); state.admin.payments.sort((a,b)=>a.month_num-b.month_num); } renderApp(); },
    redo: async () => { await sb.from('admin_payments').delete().eq('id', id); state.admin.payments = state.admin.payments.filter(p => p.id !== id); renderApp(); }
  });
  renderApp();
}

async function updateAdminPayment(id, field, value) {
  const p = state.admin.payments.find(p => p.id === id);
  if (!p) return;
  const oldVal = p[field];
  const val = field === 'amount' ? (parseFloat(value) || 0) : field === 'is_estimate' ? Boolean(value) : value;
  await sb.from('admin_payments').update({ [field]: val }).eq('id', id);
  p[field] = val;
  pushUndo({
    label: 'edit payment',
    undo: async () => { await sb.from('admin_payments').update({ [field]: oldVal }).eq('id', id); p[field] = oldVal; renderApp(); },
    redo: async () => { await sb.from('admin_payments').update({ [field]: val }).eq('id', id); p[field] = val; renderApp(); }
  });
  renderApp();
}

// ── Biz tab render ────────────────────────────────────────────────────
function renderBizTab(current) {
  const biz = state.biz || { accountant_fee: 0, spending: 0, confirmed_amount: 0 };
  const clients = state.ptClients;
  const { earned, scheduled } = state.ptSessions || { earned: [], scheduled: [] };

  const clientName = id => clients.find(c => c.id === id)?.name || '?';
  const clientRate = id => clients.find(c => c.id === id)?.rate || 0;

  // Group earned sessions by client
  const earnedByClient = {};
  earned.forEach(s => {
    if (!earnedByClient[s.client_id]) earnedByClient[s.client_id] = [];
    earnedByClient[s.client_id].push(s);
  });
  const trackerTotal = earned.reduce((sum, s) => sum + clientRate(s.client_id) * 0.85, 0);

  // Group scheduled sessions by client
  const scheduledByClient = {};
  scheduled.forEach(s => {
    if (!scheduledByClient[s.client_id]) scheduledByClient[s.client_id] = [];
    scheduledByClient[s.client_id].push(s);
  });
  const scheduledTotal = scheduled.reduce((sum, s) => sum + clientRate(s.client_id) * 0.85, 0);

  const net = (biz.confirmed_amount || 0) - (biz.accountant_fee || 0) - (biz.spending || 0);
  const prevMonthName = current.month_num > 1 ? MONTHS[current.month_num - 2] : 'December';

  return `
    <div class="biz-card">
      <div class="biz-section-title">
        Sessions Happened — ${prevMonthName}
        <button class="biz-sync-btn" onclick="refreshBiz()">↻ Sync</button>
      </div>
      ${Object.keys(earnedByClient).length === 0
        ? `<div style="color:var(--dim);font-size:.8rem;padding:.5rem 0">No sessions found for ${prevMonthName}</div>`
        : Object.entries(earnedByClient).map(([cid, sessions]) => `
          <div class="biz-session-item">
            <span>${clientName(cid)} × ${sessions.length}</span>
            <span class="biz-val green">${fmt(sessions.length * clientRate(cid) * 0.85)}</span>
          </div>`).join('')}
      <div class="biz-row" style="margin-top:.5rem;background:var(--gsoft);">
        <span class="biz-label" style="font-weight:700;">Tracker total</span>
        <span class="biz-val green">${fmt(trackerTotal)}</span>
      </div>
    </div>

    <div class="biz-card">
      <div class="biz-section-title">Scheduled — ${prevMonthName} (not happened)</div>
      ${Object.keys(scheduledByClient).length === 0
        ? `<div style="color:var(--dim);font-size:.8rem;padding:.5rem 0">No sessions scheduled for ${current.month_name}</div>`
        : Object.entries(scheduledByClient).map(([cid, sessions]) => `
          <div class="biz-session-item">
            <span>${clientName(cid)} × ${sessions.length}</span>
            <span class="biz-val amber">${fmt(sessions.length * clientRate(cid) * 0.85)}</span>
          </div>`).join('')}
      <div class="biz-row" style="background:var(--ambersoft);">
        <span class="biz-label" style="font-weight:700;">Scheduled total</span>
        <span class="biz-val amber">${fmt(scheduledTotal)}</span>
      </div>
    </div>

    <div class="biz-card">
      <div class="biz-section-title">Confirmed Income (VV)</div>
      <div class="biz-row">
        <span class="biz-label">Confirmed amount</span>
        <input class="biz-input" type="number" value="${biz.confirmed_amount || ''}" placeholder="0"
          onchange="saveBizField('confirmed_amount', this.value)">
      </div>
      <div class="biz-row">
        <span class="biz-label">Accountant fee</span>
        <input class="biz-input" type="number" value="${biz.accountant_fee ?? 200}" placeholder="200"
          onchange="saveBizField('accountant_fee', this.value)">
      </div>
      <div class="biz-row">
        <span class="biz-label">Biz spending</span>
        <input class="biz-input" type="number" value="${biz.spending || ''}" placeholder="0"
          onchange="saveBizField('spending', this.value)">
      </div>
      <div class="biz-net">
        <span class="biz-net-label">Net → Private (Vivi)</span>
        <span class="biz-net-val">${fmt(net)}</span>
      </div>
    </div>

    ${renderAccountantTracker(current)}
  `;
}

function renderAccountantTracker(current) {
  const allBiz = state.allBiz || [];
  const todayMonth = new Date().getMonth() + 1;
  const upToMonth = Math.min(current.month_num, todayMonth);
  // Sum fees for all months up to the tab month
  const paidUpTo = allBiz.filter(b => {
    const m = state.months.find(mo => mo.id === b.month_id);
    return m && m.month_num <= upToMonth;
  }).reduce((sum, b) => sum + (b.accountant_fee || 0), 0);
  const shouldBe = upToMonth * 200;
  const diffColor = paidUpTo >= shouldBe ? 'var(--green)' : 'var(--red)';

  return `
    <div class="biz-card">
      <div class="biz-section-title">Accountant Fee Tracker — ₪200/month</div>
      <div class="biz-row">
        <span class="biz-label">Should have paid until ${current.month_num <= todayMonth ? current.month_name : 'now'}</span>
        <span class="biz-val">${fmt(shouldBe)}</span>
      </div>
      <div class="biz-row">
        <span class="biz-label">Actually paid until ${current.month_num <= todayMonth ? current.month_name : 'now'}</span>
        <span class="biz-val" style="color:${diffColor}">${fmt(paidUpTo)}</span>
      </div>
    </div>
  `;
}

async function saveBizField(field, value) {
  const num = parseFloat(value) || 0;
  const oldVal = state.biz ? state.biz[field] : 0;
  const { error } = await sb.from('biz_months').update({ [field]: num }).eq('id', state.biz.id);
  if (error) { toast('Error saving'); return; }
  state.biz[field] = num;
  pushUndo({ label: 'biz '+field, undo: async()=>{ await sb.from('biz_months').update({[field]:oldVal}).eq('id',state.biz.id); state.biz[field]=oldVal; }, redo: async()=>{ await sb.from('biz_months').update({[field]:num}).eq('id',state.biz.id); state.biz[field]=num; } });

  // If confirmed_amount changes, also update income_private in main months table
  if (field === 'confirmed_amount') {
    const net = num - (state.biz.accountant_fee || 0) - (state.biz.spending || 0);
    await sb.from('months').update({ income_private: net }).eq('id', state.currentMonthId);
    const month = state.months.find(m => m.id === state.currentMonthId);
    if (month) month.income_private = net;
  }
  if (field === 'accountant_fee' || field === 'spending') {
    const net = (state.biz.confirmed_amount || 0) - (state.biz.accountant_fee || 0) - (state.biz.spending || 0);
    await sb.from('months').update({ income_private: net }).eq('id', state.currentMonthId);
    const month = state.months.find(m => m.id === state.currentMonthId);
    if (month) month.income_private = net;
  }

  renderApp();
  toast('Saved ✓');
}

function toggleGroup(key) {
  const el = document.getElementById('group-' + key);
  if (el) el.classList.toggle('collapsed');
}

function jumpTo(id) {
  const el = document.getElementById(id);
  if (!el) return;
  if (el.classList.contains('collapsed')) el.classList.remove('collapsed');
  const hdrH = (document.querySelector('.hdr')?.offsetHeight || 57) + (document.querySelector('.ribbon-panel')?.offsetHeight || 0) + 12;
  const top = el.getBoundingClientRect().top + window.scrollY - hdrH;
  window.scrollTo({ top, behavior: 'smooth' });
}

// Highlight active sidebar item on scroll
window.addEventListener('scroll', () => {
  const items = document.querySelectorAll('.sidenav-item');
  if (!items.length) return;
  const offset = (document.querySelector('.hdr')?.offsetHeight || 57) + (document.querySelector('.ribbon-panel')?.offsetHeight || 0) + 40;
  let active = null;
  items.forEach(item => {
    const fn = item.getAttribute('onclick') || '';
    const m = fn.match(/jumpTo\('(.+?)'\)/);
    if (!m) return;
    const el = document.getElementById(m[1]);
    if (el && el.getBoundingClientRect().top <= offset) active = item;
  });
  items.forEach(i => i.classList.remove('active'));
  if (active) active.classList.add('active');
}, { passive: true });

function startRibbonDrag(e) {
  e.preventDefault();
  const panel = document.querySelector('.ribbon-panel');
  if (!panel) return;
  const startY = e.clientY;
  const startH = panel.offsetHeight;
  const minH = 40;
  function onMove(ev) {
    const newH = Math.max(minH, startH + (ev.clientY - startY));
    panel.style.maxHeight = newH + 'px';
    panel.style.overflow = 'hidden auto';
    localStorage.setItem('ribbonHeight', newH);
  }
  function onUp() {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  }
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

function applyRibbonHeight() {
  const h = localStorage.getItem('ribbonHeight');
  if (h) {
    const panel = document.querySelector('.ribbon-panel');
    if (panel) { panel.style.maxHeight = h + 'px'; panel.style.overflow = 'hidden auto'; }
  }
}

function collapseAll() {
  state.openCats.clear();
  localStorage.setItem('openCats', '[]');
  localStorage.setItem('ribbonHidden', 'true');
  localStorage.removeItem('ribbonExpanded');
  renderApp();
}

function toggleRibbon() {
  const hidden = localStorage.getItem('ribbonHidden') === 'true';
  localStorage.setItem('ribbonHidden', !hidden);
  if (!hidden) localStorage.removeItem('ribbonExpanded');
  renderApp();
}
function toggleRibbonExpand() {
  const expanded = localStorage.getItem('ribbonExpanded') === 'true';
  localStorage.setItem('ribbonExpanded', !expanded);
  renderApp();
}

function snToggle(gid) {
  var rows = document.querySelectorAll('.' + gid);
  var hdr = document.getElementById(gid + '-hdr');
  var chev = hdr && hdr.querySelector('.sn-chev');
  var isCollapsed = rows[0] && rows[0].classList.contains('collapsed');
  rows.forEach(function(r) { r.classList.toggle('collapsed'); });
  if (chev) chev.textContent = isCollapsed ? '▼' : '▶';
}

// -- Year Snapshot ------------------------------------------------------
async function loadYearData() {
  if (state.yearData) return;
  const monthIds = state.months.map(m => m.id);
  const [txRes, biRes, budgetRes] = await Promise.all([
    sb.from('transactions').select('*').in('month_id', monthIds),
    sb.from('budget_items').select('*').in('month_id', monthIds),
    sb.from('budgets').select('*').in('month_id', monthIds),
  ]);
  if (!state.admin.items.length) await loadAdminData();
  state.yearData = { txns: txRes.data || [], budgetItems: biRes.data || [], allBudgets: budgetRes.data || [] };
}

function renderYearSnapshot() {
  if (!state.yearData) return '<div style="text-align:center;padding:3rem;color:var(--dim)">Loading...</div>';
  const { txns, budgetItems, allBudgets } = state.yearData;
  const months = [...state.months].sort((a,b) => a.month_num - b.month_num);
  const todayMonth = new Date().getMonth() + 1;
  const showProjected = localStorage.getItem('yearViewMode') !== 'actual';
  const LEISURE = ['takeout','eatingout','entertainment','retail','holiday','gifts'];

  const txSum  = (mid, cats) => txns.filter(t => t.month_id===mid && cats.includes(t.category)).reduce((s,t)=>s+(Number(t.amount)||0),0);
  const biSum  = (mid, cats) => budgetItems.filter(b => b.month_id===mid && cats.includes(b.category)).reduce((s,b)=>s+(Number(b.amount)||0),0);

  // Budget lookup from budgets table: { month_id: { category: amount } }
  const budgetMap = {};
  (allBudgets || []).forEach(b => { if (!budgetMap[b.month_id]) budgetMap[b.month_id] = {}; budgetMap[b.month_id][b.category] = b.amount; });
  const budgetV = (mid, cats) => cats.reduce((s, cat) => s + (budgetMap[mid]?.[cat] || 0), 0);

  const spendV = (m, cats, future) => {
    if (future && !showProjected) return 0;
    if (future) return budgetV(m.id, cats) || biSum(m.id, cats);
    return txSum(m.id, cats);
  };
  const charityV = (mn, future) => {
    if (!showProjected && future) return 0;
    const m = months.find(mo => mo.month_num === mn);
    return m ? (budgetMap[m.id]?.['charity'] || 0) : 0;
  };
  const adminV   = (mn, future) => (!showProjected && future) ? 0 : Number(state.admin.allocations?.[mn]?.amount || 0);
  const travelV  = (mn, future) => {
    if (!showProjected && future) return 0;
    const m = months.find(mo => mo.month_num === mn);
    return m ? (budgetMap[m.id]?.['travel'] || 0) : 0;
  };
  const incFor   = m  => (Number(m.income_petachya)||0)+(Number(m.income_clalit)||0)+(Number(m.income_private)||0)+(Number(m.income_other)||0);

  const fmtY   = n => !n ? '\u2014' : '\u20aa'+Math.round(n).toLocaleString('en-US');
  const fmtPct = n => n ? Math.round(n*100)+'%' : '';

  const ROWS = [
    { type:'section', label:'\u{1F4C8} Income' },
    { type:'row', bold:true, label:'Total Income',            valFn: m      => incFor(m) },
    { type:'sub',            label:'\u2937 Petachya',         valFn: m      => Number(m.income_petachya)||0 },
    { type:'sub',            label:'\u2937 Clalit',           valFn: m      => Number(m.income_clalit)||0 },
    { type:'sub',            label:'\u2937 Private',          valFn: m      => Number(m.income_private)||0 },
    { type:'sub',            label:'\u2937 Other',            valFn: m      => Number(m.income_other)||0 },
    { type:'section', label:'\u{1F4B0} Savings' },
    { type:'row',            label:'\u{1F3E6} Saved (Bank)',  valFn: (m,f)  => (!showProjected && f) ? 0 : (Number(m.savings_bank)||0) },
    { type:'section', label:'\u{1F4CA} Spending' },
    { type:'row',            label:'\u{1F6D2} Groceries',     valFn: (m,f)  => spendV(m,['groceries'],f) },
    { type:'row',            label:'\u{1F3E0} Housing',       valFn: (m,f)  => biSum(m.id,['housing'])+(f?biSum(m.id,['household']):txSum(m.id,['household'])) },
    { type:'row',            label:'\u{1F697} Transport',     valFn: (m,f)  => spendV(m,['transport'],f) },
    { type:'row',            label:'\u{1F3E5} Health & Therapy', valFn: (m,f) => spendV(m,['health','therapy'],f) },
    { type:'row',            label:'\u{1F504} Recurring',     valFn: m      => biSum(m.id,['recurring']) },
    { type:'row',            label:'\u{1F389} Leisure',       valFn: (m,f)  => spendV(m,LEISURE,f) },
    { type:'row',            label:'\u{1F49A} Charity',       valFn: (m,f)  => charityV(m.month_num, f) },
    { type:'row',            label:'\u2708\uFE0F Travel',     valFn: (m,f)  => travelV(m.month_num, f) },
    { type:'row',            label:'\u{1F4CB} Admin',         valFn: (m,f)  => adminV(m.month_num, f) },
    { type:'section', label:'\u2696\uFE0F Balance' },
  ];

  const computed = ROWS.map(row => {
    if (row.type==='section') return { row, values:null, total:0, avg:0 };
    const values = months.map(m => (row.valFn(m, m.month_num >= todayMonth))||0);
    const total  = values.reduce((s,v)=>s+v,0);
    return { row, values, total, avg: total/12 };
  });

  const totalAnnInc = months.reduce((s,m)=>s+incFor(m),0);
  const pastMs      = months.filter(m => m.month_num<=todayMonth);
  const ytdIncome   = pastMs.reduce((s,m)=>s+incFor(m),0);
  const ytdSavings  = pastMs.reduce((s,m)=>s+(Number(m.savings_bank)||0),0);
  const projSavings = months.reduce((s,m)=>s+(Number(m.savings_bank)||0),0);

  const summaryHtml = '<div class="year-summary">'
    + '<div class="year-sum-card"><div class="year-sum-label">YTD Income</div><div class="year-sum-val">'+fmtY(ytdIncome)+'</div></div>'
    + '<div class="year-sum-card"><div class="year-sum-label">Year Projected</div><div class="year-sum-val">'+fmtY(totalAnnInc)+'</div></div>'
    + '<div class="year-sum-card"><div class="year-sum-label">Avg / Month</div><div class="year-sum-val">'+fmtY(totalAnnInc/12)+'</div></div>'
    + '<div class="year-sum-card"><div class="year-sum-label">Saved So Far</div><div class="year-sum-val green">'+fmtY(ytdSavings)+'</div></div>'
    + '<div class="year-sum-card"><div class="year-sum-label">Year Savings</div><div class="year-sum-val">'+fmtY(projSavings)+'</div></div>'
    + '</div>';

  const thead = '<thead><tr><th class="year-th-label">Category</th>'
    + months.map(m => {
        const cls = m.month_num===todayMonth ? 'year-th-month current-month' : m.month_num>todayMonth ? 'year-th-month future-month' : 'year-th-month';
        return '<th class="'+cls+'">'+m.month_name.slice(0,3)+(m.month_num===todayMonth?' \u25C9':'')+'</th>';
      }).join('')
    + '<th class="year-th-extra">Total</th><th class="year-th-extra">Avg/mo</th><th class="year-th-extra">% Inc</th>'
    + '</tr></thead>';

  const tbody = computed.map(function(item) {
    const row = item.row, values = item.values, total = item.total, avg = item.avg;
    if (row.type==='section') return '<tr class="year-row-section"><td colspan="'+(months.length+4)+'">'+row.label+'</td></tr>';
    const rowCls = row.type==='sub' ? 'year-row-sub' : row.type==='net' ? 'year-row-net' : row.bold ? 'year-row-bold' : 'year-row';
    const cells = months.map(function(m,i) {
      const v = values[i];
      let cls = 'year-cell';
      if (m.month_num > todayMonth) cls += ' future';
      if (m.month_num === todayMonth) cls += ' current-col';
      if (row.type === 'net') cls += v > 0 ? ' net-pos' : v < 0 ? ' net-neg' : '';
      return '<td class="'+cls+'">'+(v ? fmtY(v) : '\u2014')+'</td>';
    }).join('');
    const totCls = 'year-cell-extra' + (row.type==='net' ? (total>0 ? ' net-pos' : total<0 ? ' net-neg' : '') : '');
    const showPct = row.type !== 'section' && row.label !== 'Total Income';
    const pct = (showPct && totalAnnInc) ? fmtPct(total/totalAnnInc) : '';
    return '<tr class="'+rowCls+'"><td class="year-col-label">'+row.label+'</td>'+cells+'<td class="'+totCls+'">'+(total ? fmtY(total) : '\u2014')+'</td><td class="year-cell-avg">'+(avg ? fmtY(avg) : '\u2014')+'</td><td class="year-cell-pct">'+pct+'</td></tr>';
  }).join('');

  const toggleHtml = '<div style="display:flex;align-items:center;gap:.5rem;margin-bottom:1rem;">'
    + '<span style="font-size:.72rem;color:var(--dim);">View:</span>'
    + '<button onclick="localStorage.setItem(\'yearViewMode\',\'projected\');renderApp()" style="font-size:.72rem;padding:.25rem .65rem;border-radius:20px;border:1px solid '+(showProjected?'var(--accent)':'var(--border)')+';background:'+(showProjected?'var(--accent)':'none')+';color:'+(showProjected?'#fff':'var(--dim)')+';cursor:pointer;font-family:\'DM Sans\',sans-serif;">Full Year (Projected)</button>'
    + '<button onclick="localStorage.setItem(\'yearViewMode\',\'actual\');renderApp()" style="font-size:.72rem;padding:.25rem .65rem;border-radius:20px;border:1px solid '+(!showProjected?'var(--accent)':'var(--border)')+';background:'+(!showProjected?'var(--accent)':'none')+';color:'+(!showProjected?'#fff':'var(--dim)')+';cursor:pointer;font-family:\'DM Sans\',sans-serif;">Actual Only</button>'
    + '</div>';
  return '<div class="year-tab-wrap">'+toggleHtml+summaryHtml+'<div class="year-table-wrap"><table class="year-table">'+thead+'<tbody>'+tbody+'</tbody></table></div><div style="margin-top:.6rem;font-size:.62rem;color:var(--dim);text-align:center;">\u25C9 = current month &nbsp;|&nbsp; italics = projected</div></div>';
}

  const totalBudgeted = Object.values(state.budgets).reduce((a,b) => a+b, 0);
  const leftToBudget = income - totalBudgeted;
  const remainingInBudget = totalBudgeted - totalSpent;

  const n = v => v == null || v === '' ? '' : Number(v).toLocaleString('en-IL', {minimumFractionDigits:0, maximumFractionDigits:2});

  const groupRows = CATEGORY_GROUPS.map(group => {
    const cats = group.keys.map(k => CATEGORIES.find(c => c.key === k)).filter(Boolean);
    const gs = cats.reduce((sum,c) => sum + (spent[c.key]||0), 0);

        <tr class="sn-cat"><td>🏦 In Bank</td><td>${n(state.budgets['savings_bank']||0)}</td><td>${n(Number(current.savings_bank)||0)}</td><td>${n((state.budgets['savings_bank']||0)-(Number(current.savings_bank)||0))}</td></tr>
        <tr class="sn-cat"><td>📈 Invested</td><td>${n(state.budgets['savings_invested']||0)}</td><td>${n(Number(current.savings_invested)||0)}</td><td>${n((state.budgets['savings_invested']||0)-(Number(current.savings_invested)||0))}</td></tr>
        ${groupRows}
      </tbody>
    </table>`;
}

async function refreshBiz() {
  state.loading = true;
  renderApp();
  await loadBizData();
  state.loading = false;
  renderApp();
}

// ── Init ──────────────────────────────────────────────────────────────
// MIGRATION REQUIRED (run once in Supabase SQL editor):
//   ALTER TABLE budget_items ADD COLUMN IF NOT EXISTS subcategory TEXT;
async function init() {
  // Load all store names used across all months for autocomplete
  sb.from('transactions').select('category,store').not('store','is',null).then(({data}) => {
    if (data) state.allStores = data;
  });
  await loadMonths();
  if (state.months.length > 0) {
    // Restore last visited month, else default to current calendar month
    const savedId = localStorage.getItem('activeMonthId');
    const now = new Date();
    const currentMonth = (savedId && state.months.find(m => m.id === savedId))
      || state.months.find(m => m.month_num === now.getMonth() + 1)
      || state.months[state.months.length - 1];
    await switchMonth(currentMonth.id);
    const tab = state.activeTab;
    if (tab === 'biz') await loadBizData();
    else if (tab === 'admin') await loadAdminData();
    else if (tab === 'travel') await loadTravelData();
    else if (tab === 'charity') await loadCharityData();
    else if (tab === 'year') await loadYearData();
    renderApp();
  } else {
    state.loading = false;
    renderApp();
  }
}

document.addEventListener('keydown', e => {
  if ((e.ctrlKey||e.metaKey) && e.key==='z' && !e.shiftKey) { e.preventDefault(); doUndo(); }
  if ((e.ctrlKey||e.metaKey) && (e.key==='y' || (e.key==='z'&&e.shiftKey))) { e.preventDefault(); doRedo(); }
});
init();
</script>
