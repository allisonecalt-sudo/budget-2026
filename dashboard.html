<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Dashboard 2026</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #232736;
  --surface3: #2c3044;
  --border: #333750;
  --text: #e8e6f0;
  --muted: #8b8fa8;
  --dim: #5d6180;
  --accent: #6c63ff;
  --accent2: #a78bfa;
  --accent-glow: rgba(108,99,255,.15);
  --green: #34d399;
  --green-soft: rgba(52,211,153,.12);
  --amber: #fbbf24;
  --amber-soft: rgba(251,191,36,.12);
  --red: #f87171;
  --red-soft: rgba(248,113,113,.12);
  --pink: #f472b6;
  --cyan: #22d3ee;
  --shadow: 0 4px 24px rgba(0,0,0,.3);
  --shadow-lg: 0 8px 40px rgba(0,0,0,.4);
  --r: 16px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(108,99,255,.06) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(167,139,250,.04) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 80%, rgba(34,211,238,.03) 0%, transparent 50%);
  animation: bgShift 20s ease-in-out infinite alternate;
  z-index: 0;
  pointer-events: none;
}

@keyframes bgShift {
  0% { transform: translate(0, 0) rotate(0deg); }
  33% { transform: translate(2%, -1%) rotate(1deg); }
  66% { transform: translate(-1%, 2%) rotate(-1deg); }
  100% { transform: translate(1%, -2%) rotate(0.5deg); }
}

@keyframes spin { to { transform: rotate(360deg); } }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to { opacity: 1; transform: translateY(0); }
}

.spinning { animation: spin .8s linear infinite; }

/* Scroll reveal */
.reveal {
  opacity: 0;
  transform: translateY(24px);
  transition: opacity .6s ease, transform .6s ease;
}
.reveal.visible {
  opacity: 1;
  transform: translateY(0);
}

/* Header */
.header {
  position: relative;
  z-index: 10;
  padding: 2rem 1.5rem 1rem;
  text-align: center;
}

.header-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  max-width: 1100px;
  margin: 0 auto 1.2rem;
}

.back-link {
  color: var(--muted);
  text-decoration: none;
  font-size: .85rem;
  font-weight: 500;
  transition: color .2s;
}
.back-link:hover { color: var(--accent2); }

.refresh-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--muted);
  width: 36px; height: 36px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 1rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .2s;
}
.refresh-btn:hover {
  background: var(--surface3);
  color: var(--text);
  border-color: var(--accent);
}

.header h1 {
  font-size: 2.4rem;
  font-weight: 700;
  background: linear-gradient(135deg, #6c63ff, #a78bfa, #22d3ee);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: .3rem;
}

.header .subtitle {
  color: var(--muted);
  font-size: .95rem;
  font-weight: 400;
  margin-bottom: 1rem;
}

.current-month-pill {
  display: inline-flex;
  align-items: center;
  gap: .5rem;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: .4rem 1rem;
  font-weight: 600;
  font-size: .9rem;
  margin-bottom: 1rem;
}

.pulse-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--green);
  animation: pulse 2s ease-in-out infinite;
}

.month-nav {
  display: flex;
  gap: .35rem;
  justify-content: center;
  flex-wrap: wrap;
  max-width: 700px;
  margin: 0 auto;
}

.month-pill {
  padding: .35rem .7rem;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--muted);
  border-radius: 12px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: .78rem;
  font-weight: 500;
  transition: all .2s;
}
.month-pill:hover {
  background: var(--surface2);
  color: var(--text);
  border-color: var(--dim);
}
.month-pill.active {
  background: var(--accent-glow);
  color: var(--accent2);
  border-color: var(--accent);
  font-weight: 600;
}

/* Main container */
.container {
  position: relative;
  z-index: 1;
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 1.5rem 3rem;
}

/* Card base */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 1.5rem;
  box-shadow: var(--shadow);
  transition: transform .2s, box-shadow .2s;
}
.card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-lg);
}

.card-title {
  font-size: 1rem;
  font-weight: 600;
  margin-bottom: 1rem;
  color: var(--text);
}

/* Grid layouts */
.grid-3 {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1rem;
  margin-bottom: 1.5rem;
}
.grid-2 {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 1rem;
  margin-bottom: 1.5rem;
}
.full-width {
  margin-bottom: 1.5rem;
}

/* Hero numbers */
.hero-num {
  font-family: 'DM Mono', monospace;
  font-size: 2rem;
  font-weight: 600;
  line-height: 1.2;
}
.hero-sub {
  font-size: .8rem;
  color: var(--muted);
  margin-top: .4rem;
}

.hero-label {
  font-size: .7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--muted);
  margin-bottom: .75rem;
}

/* Income bar */
.income-bar-container {
  height: 10px;
  border-radius: 5px;
  background: var(--surface3);
  overflow: hidden;
  display: flex;
  margin: .75rem 0 .5rem;
}
.income-bar-container div {
  height: 100%;
  transition: width .5s ease;
}

.income-legend {
  font-size: .72rem;
  color: var(--muted);
  line-height: 1.6;
}

/* Spending story */
.story-scroll {
  max-height: 350px;
  overflow-y: auto;
  padding-right: .5rem;
}
.story-scroll::-webkit-scrollbar { width: 4px; }
.story-scroll::-webkit-scrollbar-track { background: var(--surface2); border-radius: 2px; }
.story-scroll::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

.story-day {
  display: flex;
  gap: 1rem;
  padding: .6rem 0;
  border-bottom: 1px solid var(--border);
}
.story-day:last-child { border-bottom: none; }

.story-date {
  flex-shrink: 0;
  width: 52px;
  text-align: center;
}
.story-date .day-num {
  font-family: 'DM Mono', monospace;
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--accent2);
}
.story-date .day-name {
  font-size: .65rem;
  color: var(--dim);
  text-transform: uppercase;
}

.story-items {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: .25rem;
}
.story-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: .8rem;
}
.story-item .store-name {
  color: var(--text);
  font-weight: 500;
}
.story-item .item-detail {
  color: var(--dim);
  font-size: .72rem;
  margin-left: .4rem;
}
.story-item .amount {
  font-family: 'DM Mono', monospace;
  font-size: .78rem;
  color: var(--muted);
  flex-shrink: 0;
}

/* Smart vs convenience */
.split-bar-container {
  display: flex;
  align-items: center;
  gap: .75rem;
  padding: .75rem 0;
}
.split-bar {
  flex: 1;
  height: 8px;
  border-radius: 4px;
  background: var(--surface3);
  overflow: hidden;
  display: flex;
}
.split-bar .planned-fill { background: var(--green); height: 100%; }
.split-bar .conv-fill { background: var(--amber); height: 100%; }
.split-label {
  font-size: .75rem;
  font-weight: 600;
}

.store-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: .35rem 0;
  font-size: .82rem;
  border-bottom: 1px solid rgba(51,55,80,.5);
}
.store-row:last-child { border-bottom: none; }
.store-row .name { color: var(--text); }
.store-row .val {
  font-family: 'DM Mono', monospace;
  color: var(--muted);
  font-size: .78rem;
}

/* Rhythm pills */
.rhythm-grid {
  display: flex;
  flex-wrap: wrap;
  gap: .75rem;
  margin-bottom: 1rem;
}
.rhythm-pill {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: .75rem 1rem;
  display: flex;
  align-items: center;
  gap: .6rem;
  flex: 1;
  min-width: 180px;
}
.rhythm-emoji { font-size: 1.3rem; }
.rhythm-info .rh-name {
  font-size: .78rem;
  font-weight: 600;
  color: var(--text);
}
.rhythm-info .rh-amount {
  font-family: 'DM Mono', monospace;
  font-size: .82rem;
  color: var(--accent2);
}
.rhythm-info .rh-freq {
  font-size: .68rem;
  color: var(--dim);
}

.rhythm-total {
  font-size: .85rem;
  color: var(--muted);
  padding-top: .5rem;
  border-top: 1px solid var(--border);
}
.rhythm-total strong {
  color: var(--text);
  font-family: 'DM Mono', monospace;
}

/* People section */
.person-block {
  padding: .75rem 0;
  border-bottom: 1px solid var(--border);
}
.person-block:last-child { border-bottom: none; }
.person-name {
  font-weight: 600;
  font-size: .88rem;
  color: var(--pink);
  margin-bottom: .3rem;
}
.person-item {
  font-size: .78rem;
  color: var(--muted);
  padding: .15rem 0;
  display: flex;
  justify-content: space-between;
}
.person-item .pi-desc { color: var(--text); }
.person-item .pi-amt {
  font-family: 'DM Mono', monospace;
  color: var(--dim);
}

/* Volatility chart */
.vol-chart {
  display: flex;
  align-items: flex-end;
  gap: 4px;
  height: 140px;
  padding: .5rem 0;
}
.vol-bar-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  height: 100%;
  justify-content: flex-end;
}
.vol-bar {
  width: 100%;
  max-width: 48px;
  border-radius: 4px 4px 0 0;
  transition: height .5s ease;
  position: relative;
}
.vol-bar.current { box-shadow: 0 0 12px rgba(108,99,255,.4); }
.vol-label {
  font-size: .6rem;
  color: var(--dim);
  margin-top: .3rem;
  text-align: center;
}
.vol-stats {
  font-size: .8rem;
  color: var(--muted);
  margin-top: .75rem;
}
.vol-stats span { font-family: 'DM Mono', monospace; color: var(--text); font-weight: 500; }

.petachya-line {
  position: relative;
  margin-bottom: .5rem;
}

/* Progress bars */
.progress-bar-bg {
  height: 8px;
  border-radius: 4px;
  background: var(--surface3);
  overflow: hidden;
  margin: .5rem 0;
}
.progress-bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width .5s ease;
}

/* SVG ring */
.ring-container {
  display: flex;
  align-items: center;
  gap: 1rem;
}
.ring-label {
  font-size: .8rem;
  color: var(--muted);
}

/* Heatmap */
.heatmap-grid {
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.heatmap-week {
  display: flex;
  gap: 3px;
}
.heatmap-cell {
  width: 28px;
  height: 28px;
  border-radius: 4px;
  position: relative;
  cursor: default;
  transition: transform .15s;
}
.heatmap-cell:hover { transform: scale(1.2); z-index: 2; }
.heatmap-cell .tooltip {
  display: none;
  position: absolute;
  bottom: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--surface3);
  border: 1px solid var(--border);
  padding: .3rem .5rem;
  border-radius: 6px;
  font-size: .7rem;
  color: var(--text);
  white-space: nowrap;
  z-index: 10;
  pointer-events: none;
}
.heatmap-cell:hover .tooltip { display: block; }

.heatmap-legend {
  display: flex;
  align-items: center;
  gap: .4rem;
  margin-top: .75rem;
  font-size: .68rem;
  color: var(--dim);
}
.legend-box {
  width: 14px;
  height: 14px;
  border-radius: 3px;
}

/* Top stores / category */
.rank-row {
  display: flex;
  align-items: center;
  gap: .6rem;
  padding: .4rem 0;
  border-bottom: 1px solid rgba(51,55,80,.4);
  font-size: .82rem;
}
.rank-row:last-child { border-bottom: none; }
.rank-num {
  font-family: 'DM Mono', monospace;
  color: var(--dim);
  font-size: .72rem;
  width: 20px;
  text-align: center;
}
.rank-name { flex: 1; color: var(--text); font-weight: 500; }
.rank-val {
  font-family: 'DM Mono', monospace;
  color: var(--muted);
  font-size: .78rem;
}
.rank-visits {
  font-size: .68rem;
  color: var(--dim);
  margin-left: .3rem;
}

/* Footer */
.footer {
  text-align: center;
  padding: 2rem 1rem;
  color: var(--dim);
  font-size: .8rem;
}
.footer a {
  color: var(--muted);
  text-decoration: none;
}
.footer a:hover { color: var(--accent2); }

/* Loading */
.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 3rem;
  color: var(--dim);
  font-size: .85rem;
}
.loading::after {
  content: '';
  width: 20px; height: 20px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .8s linear infinite;
  margin-left: .75rem;
}

/* Empty state */
.empty-state {
  color: var(--dim);
  font-size: .85rem;
  text-align: center;
  padding: 1.5rem;
}

/* Responsive */
@media (max-width: 900px) {
  .grid-3 { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 640px) {
  .grid-3 { grid-template-columns: 1fr; }
  .grid-2 { grid-template-columns: 1fr; }
  .header h1 { font-size: 1.8rem; }
  .container { padding: 0 1rem 2rem; }
  .hero-num { font-size: 1.6rem; }
  .rhythm-pill { min-width: 140px; }
  .heatmap-cell { width: 22px; height: 22px; }
  .vol-chart { height: 100px; }
}

/* Category emojis */
</style>
</head>

function fmt(n) {
  if (n === null || n === undefined || isNaN(n)) return '\u20AA0';
  var sign = n < 0 ? '-' : '';
  return sign + '\u20AA' + Math.abs(Math.round(n)).toLocaleString('en-US');

function isPlanned(t) {

function getMonthIncome(m) {
  if (!m) return 0;
  return (m.income_petachya || 0) + (m.income_clalit || 0) + (m.income_private || 0) + (m.income_other || 0);
}

function getMonthSavings(m) {
  if (!m) return 0;
  return (m.savings_bank || 0) + (m.savings_invested || 0);
}

function daysInMonth(month, year) {
  return new Date(year, month, 0).getDate();
}

function daysRemaining(monthNum) {
  var now = new Date();
  var currMonth = now.getMonth() + 1;
  if (monthNum !== currMonth) return 0;
  var total = daysInMonth(monthNum, 2026);
  var dayOfMonth = now.getDate();
  return Math.max(0, total - dayOfMonth);
}

async function loadData() {
  var results = await Promise.all([
    sb.from('months').select('*').order('month_num'),
    sb.from('transactions').select('*'),
    sb.from('budget_items').select('*'),
    sb.from('budgets').select('*')
  ]);
  allMonths = results[0].data || [];
  allTransactions = results[1].data || [];
  allBudgetItems = results[2].data || [];
  allBudgets = results[3].data || [];
  renderAll();
}

function renderAll() {
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('dashboardContent').style.display = 'block';
  renderMonthNav();
  renderPulse();
  renderStory();
  renderSmartVsConvenience();
  renderRhythm();
  renderPeople();
  renderVolatility();
  renderValues();
  renderHeatmap();
  renderStoresAndCategories();
  initReveal();
}

function renderMonthNav() {
  var nav = document.getElementById('monthNav');
  var html = '';
  for (var i = 0; i < 12; i++) {
    var num = i + 1;
    var cls = num === currentMonth ? 'month-pill active' : 'month-pill';
    html += '<button class="' + cls + '" onclick="switchMonth(' + num + ')">' + MONTHS[i] + '</button>';
  }
  nav.innerHTML = html;
  document.getElementById('currentMonthName').textContent = MONTH_FULL[currentMonth - 1] + ' 2026';
}

function switchMonth(num) {
  currentMonth = num;
  renderAll();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function refreshData(btn) {
  btn.classList.add('spinning');
  loadData().then(function() {
    setTimeout(function() { btn.classList.remove('spinning'); }, 600);
  });
}

/* ===== SECTION 1: FINANCIAL PULSE ===== */
function renderPulse() {
  var m = getMonthData(currentMonth);
  var txns = getMonthTransactions(currentMonth);
  var income = getMonthIncome(m);
  var savings = getMonthSavings(m);
  var spent = 0;
  for (var i = 0; i < txns.length; i++) {
    if (txns[i].amount > 0) spent += txns[i].amount;
  }
  var liquid = income - spent - savings;
  var remaining = daysRemaining(currentMonth);
  var perDay = remaining > 0 ? liquid / remaining : 0;
  var colorClass = liquid >= 0 ? 'color:var(--green)' : 'color:var(--red)';

  // Card 1: Where I Stand
  var standHtml = '<div class="hero-label">Where I Stand</div>';
  standHtml += '<div class="hero-num" style="' + colorClass + '">' + fmt(liquid) + '</div>';
  if (remaining > 0) {
    standHtml += '<div class="hero-sub">' + fmt(perDay) + '/day for ' + remaining + ' remaining days</div>';
  } else if (currentMonth === new Date().getMonth() + 1) {
    standHtml += '<div class="hero-sub">Last day of the month</div>';
  } else {
    standHtml += '<div class="hero-sub">Month complete</div>';
  }
  standHtml += '<div style="margin-top:.6rem;font-size:.72rem;color:var(--dim)">Income ' + fmt(income) + ' &minus; Spent ' + fmt(spent) + ' &minus; Saved ' + fmt(savings) + '</div>';
  document.getElementById('cardStand').innerHTML = standHtml;

  // Card 2: Savings Progress
  var cumSavings = 0;
  for (var j = 0; j < allMonths.length; j++) {
    if (allMonths[j].month_num <= currentMonth) {
      cumSavings += getMonthSavings(allMonths[j]);
    }
  }
  var savingsGoal = 35000;
  var savingsPct = savingsGoal > 0 ? Math.min(100, (cumSavings / savingsGoal) * 100) : 0;
  var ringRadius = 36;
  var ringCirc = 2 * Math.PI * ringRadius;
  var ringOffset = ringCirc - (ringCirc * savingsPct / 100);

  var savHtml = '<div class="hero-label">Savings Progress</div>';
  savHtml += '<div class="ring-container">';
  savHtml += '<svg width="90" height="90" viewBox="0 0 90 90">';
  savHtml += '<circle cx="45" cy="45" r="' + ringRadius + '" fill="none" stroke="var(--surface3)" stroke-width="6"/>';
  savHtml += '<circle cx="45" cy="45" r="' + ringRadius + '" fill="none" stroke="var(--accent)" stroke-width="6" stroke-linecap="round" stroke-dasharray="' + ringCirc + '" stroke-dashoffset="' + ringOffset + '" transform="rotate(-90 45 45)" style="transition:stroke-dashoffset .8s ease"/>';
  savHtml += '<text x="45" y="49" text-anchor="middle" fill="var(--text)" font-family="DM Mono, monospace" font-size="13" font-weight="600">' + pct(savingsPct) + '</text>';
  savHtml += '</svg>';
  savHtml += '<div>';
  savHtml += '<div style="font-family:DM Mono,monospace;font-size:1.1rem;font-weight:600;color:var(--accent2)">' + fmt(cumSavings) + '</div>';
  savHtml += '<div style="font-size:.75rem;color:var(--dim)">of ' + fmt(savingsGoal) + ' goal</div>';
  savHtml += '</div>';
  savHtml += '</div>';
  document.getElementById('cardSavings').innerHTML = savHtml;

  // Card 3: Income Mix
  var pet = m ? (m.income_petachya || 0) : 0;
  var cla = m ? (m.income_clalit || 0) : 0;
  var pri = m ? (m.income_private || 0) : 0;
  var oth = m ? (m.income_other || 0) : 0;
  var incTotal = pet + cla + pri + oth;

  var incHtml = '<div class="hero-label">Income Mix</div>';
  incHtml += '<div class="hero-num" style="color:var(--text)">' + fmt(incTotal) + '</div>';

  if (incTotal > 0) {
    var petPct = (pet / incTotal) * 100;
    var claPct = (cla / incTotal) * 100;
    var priPct = (pri / incTotal) * 100;
    var othPct = (oth / incTotal) * 100;

    incHtml += '<div class="income-bar-container">';
    if (petPct > 0) incHtml += '<div style="width:' + petPct + '%;background:#6366f1"></div>';
    if (claPct > 0) incHtml += '<div style="width:' + claPct + '%;background:var(--cyan)"></div>';
    if (priPct > 0) incHtml += '<div style="width:' + priPct + '%;background:var(--pink)"></div>';
    if (othPct > 0) incHtml += '<div style="width:' + othPct + '%;background:var(--amber)"></div>';
    incHtml += '</div>';

    incHtml += '<div class="income-legend">';
    if (pet > 0) incHtml += '<span style="color:#6366f1">\u25CF</span> Petachya: ' + pct(petPct);
    if (cla > 0) incHtml += (pet > 0 ? ' \u00B7 ' : '') + '<span style="color:var(--cyan)">\u25CF</span> Clalit: ' + pct(claPct);
    if (pri > 0) incHtml += ((pet > 0 || cla > 0) ? ' \u00B7 ' : '') + '<span style="color:var(--pink)">\u25CF</span> Private: ' + pct(priPct);
    if (oth > 0) incHtml += ((pet > 0 || cla > 0 || pri > 0) ? ' \u00B7 ' : '') + '<span style="color:var(--amber)">\u25CF</span> Other: ' + pct(othPct);
    incHtml += '</div>';
  } else {
    incHtml += '<div class="hero-sub">No income data for this month</div>';
  }
  document.getElementById('cardIncome').innerHTML = incHtml;
}

/* ===== SECTION 2: SPENDING STORY ===== */
function renderStory() {
  var txns = getMonthTransactions(currentMonth);
  var byDay = {};
  var undated = [];

  for (var i = 0; i < txns.length; i++) {
    var t = txns[i];
    if (t.date) {
      var dateKey = t.date;
      if (!byDay[dateKey]) byDay[dateKey] = [];
      byDay[dateKey].push(t);
    } else {
      undated.push(t);
    }
  }

  var dates = Object.keys(byDay).sort().reverse();

  var html = '<div class="card-title">\uD83D\uDCD6 This Month\'s Story</div>';
  if (dates.length === 0 && undated.length === 0) {
    html += '<div class="empty-state">No transactions yet this month</div>';
    document.getElementById('cardStory').innerHTML = html;
    return;
  }

  html += '<div class="story-scroll">';
  for (var d = 0; d < dates.length; d++) {
    var dt = new Date(dates[d] + 'T00:00:00');
    var dayNum = dt.getDate();
    var dayName = DAY_NAMES[dt.getDay()];
    var items = byDay[dates[d]];

    html += '<div class="story-day">';
    html += '<div class="story-date"><div class="day-num">' + dayNum + '</div><div class="day-name">' + dayName + '</div></div>';
    html += '<div class="story-items">';
    for (var j = 0; j < items.length; j++) {
      var it = items[j];
      var storePart = it.store ? it.store : (it.category || 'Unknown');
      var itemPart = it.item ? ' \u2014 ' + it.item : '';
      var amtColor = it.amount < 0 ? 'color:var(--green)' : '';
      html += '<div class="story-item">';
      html += '<div><span class="store-name">' + storePart + '</span><span class="item-detail">' + itemPart + '</span></div>';
      html += '<span class="amount" style="' + amtColor + '">' + fmt(it.amount) + '</span>';
      html += '</div>';
    }
    html += '</div></div>';
  }

  if (undated.length > 0) {
    html += '<div class="story-day">';
    html += '<div class="story-date"><div class="day-num">\u2014</div><div class="day-name">N/A</div></div>';
    html += '<div class="story-items">';
    for (var u = 0; u < undated.length; u++) {
      var ut = undated[u];
      var us = ut.store ? ut.store : (ut.category || 'Unknown');
      var ui = ut.item ? ' \u2014 ' + ut.item : '';
      html += '<div class="story-item">';
      html += '<div><span class="store-name">' + us + '</span><span class="item-detail">' + ui + '</span></div>';
      html += '<span class="amount">' + fmt(ut.amount) + '</span>';
      html += '</div>';
    }
    html += '</div></div>';
  }

  html += '</div>';
  document.getElementById('cardStory').innerHTML = html;
}

/* ===== SECTION 3: SMART VS CONVENIENCE ===== */
function renderSmartVsConvenience() {
  var txns = getMonthTransactions(currentMonth);
  var plannedTxns = [];
  var convTxns = [];
  var plannedTotal = 0;
  var convTotal = 0;
  var plannedStores = {};
  var convStores = {};

  for (var i = 0; i < txns.length; i++) {
    var t = txns[i];
    if (t.amount <= 0) continue;
    if (isPlanned(t)) {
      plannedTxns.push(t);
      plannedTotal += t.amount;
      var ps = t.store || 'Unknown';
      if (!plannedStores[ps]) plannedStores[ps] = 0;
      plannedStores[ps] += t.amount;
    } else if (isConvenience(t)) {
      convTxns.push(t);
      convTotal += t.amount;
      var cs = t.store || 'Unknown';
      if (!convStores[cs]) convStores[cs] = 0;
      convStores[cs] += t.amount;
    }
  }

  var grandTotal = plannedTotal + convTotal;
  var plannedPct = grandTotal > 0 ? (plannedTotal / grandTotal) * 100 : 50;
  var convPct = grandTotal > 0 ? (convTotal / grandTotal) * 100 : 50;

  // Split comparison bar
  var splitHtml = '<div class="split-bar-container" style="padding:0 1.5rem;">';
  splitHtml += '<span class="split-label" style="color:var(--green)">Planned ' + pct(plannedPct) + '</span>';
  splitHtml += '<div class="split-bar"><div class="planned-fill" style="width:' + plannedPct + '%"></div><div class="conv-fill" style="width:' + convPct + '%"></div></div>';
  splitHtml += '<span class="split-label" style="color:var(--amber)">Quick ' + pct(convPct) + '</span>';
  splitHtml += '</div>';
  document.getElementById('splitComparison').innerHTML = splitHtml;

  // Planned card
  var plHtml = '<div class="card-title">\uD83E\uDDE0 Planned Shopping</div>';
  plHtml += '<div style="font-family:DM Mono,monospace;font-size:1.3rem;font-weight:600;color:var(--green)">' + fmt(plannedTotal) + '</div>';
  plHtml += '<div style="font-size:.75rem;color:var(--dim);margin-bottom:.75rem">' + plannedTxns.length + ' visits</div>';
  var pKeys = Object.keys(plannedStores).sort(function(a, b) { return plannedStores[b] - plannedStores[a]; });
  for (var p = 0; p < pKeys.length; p++) {
    plHtml += '<div class="store-row"><span class="name">' + pKeys[p] + '</span><span class="val">' + fmt(plannedStores[pKeys[p]]) + '</span></div>';
  }
  if (pKeys.length === 0) plHtml += '<div class="empty-state">No planned shopping this month</div>';
  document.getElementById('cardPlanned').innerHTML = plHtml;

  // Convenience card
  var cvHtml = '<div class="card-title">\u26A1 Quick Grabs</div>';
  cvHtml += '<div style="font-family:DM Mono,monospace;font-size:1.3rem;font-weight:600;color:var(--amber)">' + fmt(convTotal) + '</div>';
  cvHtml += '<div style="font-size:.75rem;color:var(--dim);margin-bottom:.75rem">' + convTxns.length + ' visits</div>';
  var cKeys = Object.keys(convStores).sort(function(a, b) { return convStores[b] - convStores[a]; });
  for (var c = 0; c < cKeys.length; c++) {
    cvHtml += '<div class="store-row"><span class="name">' + cKeys[c] + '</span><span class="val">' + fmt(convStores[cKeys[c]]) + '</span></div>';
  }
  if (cKeys.length === 0) cvHtml += '<div class="empty-state">No quick grabs this month</div>';
  document.getElementById('cardConvenience').innerHTML = cvHtml;
}

/* ===== SECTION 4: THE RHYTHM ===== */
function renderRhythm() {
  var txns = getMonthTransactions(currentMonth);
  var m = getMonthData(currentMonth);
  var income = getMonthIncome(m);

  // Therapy count
  var therapyCount = 0;
  for (var i = 0; i < txns.length; i++) {
    if (txns[i].category === 'therapy' && txns[i].amount > 0) therapyCount++;
  }
  var therapyCost = therapyCount * 500;

  // Gas (Paz transport)
  var gasTotal = 0;
  var gasCount = 0;
  for (var g = 0; g < txns.length; g++) {
    var gt = txns[g];
    if (gt.category === 'transport' && gt.store && gt.store.toLowerCase().indexOf('paz') !== -1 && gt.amount > 0) {
      gasTotal += gt.amount;
      gasCount++;
    }
  }
  var gasAvg = gasCount > 0 ? gasTotal / gasCount : 0;

  // Wegovy / health meds
  var wegovyCost = 0;
  for (var w = 0; w < txns.length; w++) {
    var wt = txns[w];
    if (wt.category === 'health' && wt.amount > 0) {
      var itemLow = (wt.item || '').toLowerCase();
      var storeLow = (wt.store || '').toLowerCase();
      if (itemLow.indexOf('wegovy') !== -1 || itemLow.indexOf('clalit') !== -1 || storeLow.indexOf('wegovy') !== -1 || storeLow.indexOf('clalit') !== -1) {
        wegovyCost += wt.amount;
      }
    }
  }

  // Rent
  var rentCost = 2125;

  // Recurring
  var recurringTotal = 0;
  for (var r = 0; r < txns.length; r++) {
    if (txns[r].category === 'recurring' && txns[r].amount > 0) recurringTotal += txns[r].amount;
  }

  var totalRhythm = therapyCost + gasTotal + wegovyCost + rentCost + recurringTotal;
  var rhythmPct = income > 0 ? (totalRhythm / income) * 100 : 0;

  var html = '<div class="card-title">\uD83D\uDD04 Your Rhythm \u2014 Locked Expenses</div>';
  html += '<div class="rhythm-grid">';

  // Therapy
  html += '<div class="rhythm-pill"><span class="rhythm-emoji">\uD83E\uDDE0</span><div class="rhythm-info">';
  html += '<div class="rh-name">Therapy</div>';
  html += '<div class="rh-amount">' + fmt(therapyCost) + '</div>';
  html += '<div class="rh-freq">' + therapyCount + ' sessions this month</div>';
  html += '</div></div>';

  // Gas
  html += '<div class="rhythm-pill"><span class="rhythm-emoji">\u26FD</span><div class="rhythm-info">';
  html += '<div class="rh-name">Gas</div>';
  html += '<div class="rh-amount">' + fmt(gasTotal) + '</div>';
  html += '<div class="rh-freq">' + gasCount + ' fill-ups' + (gasAvg > 0 ? ' \u00B7 ~' + fmt(gasAvg) + ' avg' : '') + '</div>';
  html += '</div></div>';

  // Wegovy
  html += '<div class="rhythm-pill"><span class="rhythm-emoji">\uD83D\uDC89</span><div class="rhythm-info">';
  html += '<div class="rh-name">Wegovy/Meds</div>';
  html += '<div class="rh-amount">' + fmt(wegovyCost) + '</div>';
  html += '<div class="rh-freq">Monthly</div>';
  html += '</div></div>';

  // Rent
  html += '<div class="rhythm-pill"><span class="rhythm-emoji">\uD83C\uDFE0</span><div class="rhythm-info">';
  html += '<div class="rh-name">Rent</div>';
  html += '<div class="rh-amount">' + fmt(rentCost) + '</div>';
  html += '<div class="rh-freq">Monthly</div>';
  html += '</div></div>';

  // Recurring
  html += '<div class="rhythm-pill"><span class="rhythm-emoji">\uD83D\uDD01</span><div class="rhythm-info">';
  html += '<div class="rh-name">Subscriptions</div>';
  html += '<div class="rh-amount">' + fmt(recurringTotal) + '</div>';
  html += '<div class="rh-freq">Monthly recurring</div>';
  html += '</div></div>';

  html += '</div>';

  html += '<div class="rhythm-total">Your rhythm costs <strong>' + fmt(totalRhythm) + '</strong>/month \u2014 that\'s <strong>' + pct(rhythmPct) + '</strong> of income. Everything else is choices.</div>';

  document.getElementById('cardRhythm').innerHTML = html;
}

/* ===== SECTION 5: MY PEOPLE ===== */
function renderPeople() {
  var txns = getMonthTransactions(currentMonth);
  var people = {};

  for (var i = 0; i < txns.length; i++) {
    var t = txns[i];
    var itemLow = (t.item || '').toLowerCase();
    var storeLow = (t.store || '').toLowerCase();
    var combined = itemLow + ' ' + storeLow;

    // Gifts category always counts
    if (t.category === 'gifts') {
      var giftPerson = 'Gifts';
      // Try to find a name in item or store
      for (var n = 0; n < KNOWN_NAMES.length; n++) {
        if (combined.indexOf(KNOWN_NAMES[n]) !== -1) {
          giftPerson = KNOWN_NAMES[n].charAt(0).toUpperCase() + KNOWN_NAMES[n].slice(1);
          break;
        }
      }
      if (!people[giftPerson]) people[giftPerson] = [];
      people[giftPerson].push({ desc: (t.item || t.store || 'Gift'), amount: t.amount });
      continue;
    }

    // Household with Avital or Ruthie
    if (t.category === 'household') {
      if (storeLow.indexOf('avital') !== -1) {
        if (!people['Avital']) people['Avital'] = [];
        people['Avital'].push({ desc: t.item || 'Household', amount: t.amount });
        continue;
      }
      if (storeLow.indexOf('ruthie') !== -1) {
        if (!people['Ruthie']) people['Ruthie'] = [];
        people['Ruthie'].push({ desc: t.item || 'Household', amount: t.amount });
        continue;
      }
    }

    // Eating out / entertainment with people
    if (t.category === 'eatingout' || t.category === 'entertainment') {
      for (var k = 0; k < KNOWN_NAMES.length; k++) {
        if (combined.indexOf(KNOWN_NAMES[k]) !== -1) {
          var pName = KNOWN_NAMES[k].charAt(0).toUpperCase() + KNOWN_NAMES[k].slice(1);
          if (!people[pName]) people[pName] = [];
          people[pName].push({ desc: (t.store || '') + (t.item ? ' \u2014 ' + t.item : ''), amount: t.amount });
          break;
        }
      }
    }
  }

  var html = '<div class="card-title">\uD83D\uDC9C The People in Your Spending</div>';
  var pNames = Object.keys(people);
  if (pNames.length === 0) {
    html += '<div class="empty-state">No people spending tracked yet this month</div>';
  } else {
    for (var pi = 0; pi < pNames.length; pi++) {
      var pn = pNames[pi];
      var entries = people[pn];
      html += '<div class="person-block">';
      html += '<div class="person-name">' + pn + '</div>';
      for (var pe = 0; pe < entries.length; pe++) {
        html += '<div class="person-item">';
        html += '<span class="pi-desc">' + entries[pe].desc + '</span>';
        html += '<span class="pi-amt">' + fmt(entries[pe].amount) + '</span>';
        html += '</div>';
      }
      html += '</div>';
    }
  }

  document.getElementById('cardPeople').innerHTML = html;
}

/* ===== SECTION 6: INCOME VOLATILITY ===== */
function renderVolatility() {
  var clalitVals = [];
  var petachyaVal = 0;
  var maxVal = 0;
  var minClalit = Infinity;
  var maxClalit = 0;
  var totalClalit = 0;
  var clalitCount = 0;

  for (var i = 0; i < 12; i++) {
    var m = getMonthData(i + 1);
    var cVal = m ? (m.income_clalit || 0) : 0;
    clalitVals.push(cVal);
    if (cVal > maxVal) maxVal = cVal;
    if (m && m.income_petachya > 0) petachyaVal = m.income_petachya;
    if (cVal > 0) {
      if (cVal < minClalit) minClalit = cVal;
      if (cVal > maxClalit) maxClalit = cVal;
      totalClalit += cVal;
      clalitCount++;
    }
  }

  if (petachyaVal > maxVal) maxVal = petachyaVal;
  if (maxVal === 0) maxVal = 1;
  var avgClalit = clalitCount > 0 ? totalClalit / clalitCount : 0;

  var html = '<div class="card-title">\uD83D\uDCCA Clalit Volatility \u2014 The Wild Card</div>';

  // Petachya reference line
  var petPct = (petachyaVal / maxVal) * 100;
  html += '<div class="petachya-line" style="position:relative;height:0">';
  html += '<div style="position:absolute;bottom:0;left:0;right:0;border-top:2px dashed rgba(99,102,241,.4);height:0;margin-bottom:' + (140 * petachyaVal / maxVal) + 'px"></div>';
  html += '<div style="position:absolute;right:4px;font-size:.6rem;color:#6366f1;bottom:' + (140 * petachyaVal / maxVal + 4) + 'px">Petachya ' + fmt(petachyaVal) + '</div>';
  html += '</div>';

  html += '<div class="vol-chart">';
  for (var v = 0; v < 12; v++) {
    var barH = maxVal > 0 ? (clalitVals[v] / maxVal) * 100 : 0;
    var isCurrent = (v + 1) === currentMonth;
    var barColor = isCurrent ? 'var(--accent)' : 'var(--cyan)';
    var barCls = isCurrent ? 'vol-bar current' : 'vol-bar';
    html += '<div class="vol-bar-wrap">';
    html += '<div class="' + barCls + '" style="height:' + Math.max(barH, 2) + '%;background:' + barColor + ';opacity:' + (clalitVals[v] > 0 ? '1' : '.2') + '"></div>';
    html += '<div class="vol-label">' + MONTHS[v] + '</div>';
    html += '</div>';
  }
  html += '</div>';

  html += '<div class="vol-stats">';
  if (clalitCount > 0) {
    html += 'Range: <span>' + fmt(minClalit) + '</span> \u2013 <span>' + fmt(maxClalit) + '</span> \u00B7 Average: <span>' + fmt(avgClalit) + '</span>';
  } else {
    html += 'No Clalit income data yet';
  }
  html += '</div>';

  document.getElementById('cardVolatility').innerHTML = html;
}

/* ===== SECTION 7: VALUES CHECK ===== */
function renderValues() {
  var txns = getMonthTransactions(currentMonth);
  var m = getMonthData(currentMonth);
  var income = getMonthIncome(m);

  // Tzedakah
  var charityTotal = 0;
  for (var i = 0; i < txns.length; i++) {
    var t = txns[i];
    if ((t.category === 'charity' || t.category === 'holiday') && t.amount > 0) {
      charityTotal += t.amount;
    }
  }
  var charityTarget = income * 0.10;
  var charityPct = charityTarget > 0 ? (charityTotal / charityTarget) * 100 : 0;
  var charityColor = charityPct >= 80 ? 'var(--green)' : (charityPct >= 50 ? 'var(--amber)' : 'var(--red)');

  var tzHtml = '<div class="card-title">\uD83D\uDC9A Tzedakah Tracker</div>';
  tzHtml += '<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.25rem">';
  tzHtml += '<span style="font-size:.8rem;color:var(--muted)">Given: <strong style="color:var(--text);font-family:DM Mono,monospace">' + fmt(charityTotal) + '</strong></span>';
  tzHtml += '<span style="font-size:.8rem;color:var(--muted)">Target (10%): <strong style="color:var(--dim);font-family:DM Mono,monospace">' + fmt(charityTarget) + '</strong></span>';
  tzHtml += '</div>';
  tzHtml += '<div class="progress-bar-bg"><div class="progress-bar-fill" style="width:' + Math.min(charityPct, 100) + '%;background:' + charityColor + '"></div></div>';
  tzHtml += '<div style="text-align:center;font-size:.78rem;color:var(--muted);margin-top:.3rem">On track: <strong style="color:' + charityColor + '">' + pct(charityPct) + '</strong></div>';
  document.getElementById('cardTzedakah').innerHTML = tzHtml;

  // Savings Rate
  var savings = getMonthSavings(m);
  var savingsBank = m ? (m.savings_bank || 0) : 0;
  var savingsInvested = m ? (m.savings_invested || 0) : 0;
  var savingsRate = income > 0 ? (savings / income) * 100 : 0;
  var srRadius = 36;
  var srCirc = 2 * Math.PI * srRadius;
  var srOffset = srCirc - (srCirc * Math.min(savingsRate, 100) / 100);
  var srColor = savingsRate >= 19 ? 'var(--green)' : (savingsRate >= 10 ? 'var(--amber)' : 'var(--red)');

  var srHtml = '<div class="card-title">\uD83C\uDFE6 Savings Rate</div>';
  srHtml += '<div class="ring-container">';
  srHtml += '<svg width="90" height="90" viewBox="0 0 90 90">';
  srHtml += '<circle cx="45" cy="45" r="' + srRadius + '" fill="none" stroke="var(--surface3)" stroke-width="6"/>';
  srHtml += '<circle cx="45" cy="45" r="' + srRadius + '" fill="none" stroke="' + srColor + '" stroke-width="6" stroke-linecap="round" stroke-dasharray="' + srCirc + '" stroke-dashoffset="' + srOffset + '" transform="rotate(-90 45 45)" style="transition:stroke-dashoffset .8s ease"/>';
  srHtml += '<text x="45" y="49" text-anchor="middle" fill="var(--text)" font-family="DM Mono, monospace" font-size="13" font-weight="600">' + pct(savingsRate) + '</text>';
  srHtml += '</svg>';
  srHtml += '<div>';
  srHtml += '<div style="font-size:.8rem;color:var(--muted)">Target: 19%</div>';
  srHtml += '<div style="font-size:.78rem;color:var(--dim);margin-top:.3rem">Bank: ' + fmt(savingsBank) + '</div>';
  srHtml += '<div style="font-size:.78rem;color:var(--dim)">Invested: ' + fmt(savingsInvested) + '</div>';
  srHtml += '</div>';
  srHtml += '</div>';
  document.getElementById('cardSavingsRate').innerHTML = srHtml;
}

/* ===== SECTION 8: SPENDING HEATMAP ===== */
function renderHeatmap() {
  var txns = getMonthTransactions(currentMonth);
  var year = 2026;
  var totalDays = daysInMonth(currentMonth, year);
  var firstDayOfWeek = new Date(year, currentMonth - 1, 1).getDay(); // 0=Sun

  // Sum spending by day
  var daySpend = {};
  var maxSpend = 0;
  for (var i = 0; i < txns.length; i++) {
    var t = txns[i];
    if (t.date && t.amount > 0) {
      var dt = new Date(t.date + 'T00:00:00');
      var dayOfMonth = dt.getDate();
      if (!daySpend[dayOfMonth]) daySpend[dayOfMonth] = 0;
      daySpend[dayOfMonth] += t.amount;
      if (daySpend[dayOfMonth] > maxSpend) maxSpend = daySpend[dayOfMonth];
    }
  }

  var today = new Date();
  var currentDayOfMonth = (today.getMonth() + 1 === currentMonth) ? today.getDate() : totalDays;

  function cellColor(amount) {
    if (!amount || amount === 0) return 'var(--surface2)';
    var ratio = maxSpend > 0 ? amount / maxSpend : 0;
    if (ratio < 0.25) return 'rgba(52,211,153,.3)';
    if (ratio < 0.5) return 'rgba(52,211,153,.6)';
    if (ratio < 0.75) return 'rgba(251,191,36,.5)';
    return 'rgba(248,113,113,.5)';
  }

  var html = '<div class="card-title">\uD83D\uDDD3\uFE0F When You Spend</div>';

  // Day headers
  html += '<div style="display:flex;gap:3px;margin-bottom:3px;padding-left:0">';
  for (var dh = 0; dh < 7; dh++) {
    html += '<div style="width:28px;text-align:center;font-size:.6rem;color:var(--dim)">' + DAY_NAMES[dh] + '</div>';
  }
  html += '</div>';

  html += '<div class="heatmap-grid">';

  var day = 1;
  var weekCount = Math.ceil((totalDays + firstDayOfWeek) / 7);
  for (var week = 0; week < weekCount; week++) {
    html += '<div class="heatmap-week">';
    for (var dow = 0; dow < 7; dow++) {
      if ((week === 0 && dow < firstDayOfWeek) || day > totalDays) {
        html += '<div class="heatmap-cell" style="background:transparent;border:1px solid rgba(51,55,80,.2)"></div>';
      } else {
        var spend = daySpend[day] || 0;
        var isFuture = day > currentDayOfMonth;
        var bg = isFuture ? 'transparent' : cellColor(spend);
        var border = isFuture ? 'border:1px dashed rgba(51,55,80,.3)' : 'border:1px solid rgba(51,55,80,.3)';
        html += '<div class="heatmap-cell" style="background:' + bg + ';' + border + '">';
        html += '<span class="tooltip">' + MONTHS[currentMonth - 1] + ' ' + day + ': ' + (spend > 0 ? fmt(spend) : 'No spending') + '</span>';
        html += '</div>';
        day++;
      }
    }
    html += '</div>';
  }
  html += '</div>';

  // Legend
  html += '<div class="heatmap-legend">';
  html += '<span>Less</span>';
  html += '<div class="legend-box" style="background:var(--surface2)"></div>';
  html += '<div class="legend-box" style="background:rgba(52,211,153,.3)"></div>';
  html += '<div class="legend-box" style="background:rgba(52,211,153,.6)"></div>';
  html += '<div class="legend-box" style="background:rgba(251,191,36,.5)"></div>';
  html += '<div class="legend-box" style="background:rgba(248,113,113,.5)"></div>';
  html += '<span>More</span>';
  html += '</div>';

  document.getElementById('cardHeatmap').innerHTML = html;
}

/* ===== SECTION 9: TOP STORES + CATEGORIES ===== */
function renderStoresAndCategories() {
  var txns = getMonthTransactions(currentMonth);

  // Top Stores
  var stores = {};
  var storeVisits = {};
  for (var i = 0; i < txns.length; i++) {
    var t = txns[i];
    if (t.amount > 0 && t.store) {
      if (!stores[t.store]) { stores[t.store] = 0; storeVisits[t.store] = 0; }
      stores[t.store] += t.amount;
      storeVisits[t.store]++;
    }
  }

  var storeKeys = Object.keys(stores).sort(function(a, b) { return stores[b] - stores[a]; });
  var topStores = storeKeys.slice(0, 8);

  var stHtml = '<div class="card-title">\uD83C\uDFEA Where You Shop</div>';
  if (topStores.length === 0) {
    stHtml += '<div class="empty-state">No store data this month</div>';
  } else {
    for (var s = 0; s < topStores.length; s++) {
      var sn = topStores[s];
      stHtml += '<div class="rank-row">';
      stHtml += '<span class="rank-num">' + (s + 1) + '</span>';
      stHtml += '<span class="rank-name">' + sn + '</span>';
      stHtml += '<span class="rank-val">' + fmt(stores[sn]) + '</span>';
      stHtml += '<span class="rank-visits">' + storeVisits[sn] + 'x</span>';
      stHtml += '</div>';
    }
  }
  document.getElementById('cardStores').innerHTML = stHtml;

  // Category Totals
  var cats = {};
  for (var c = 0; c < txns.length; c++) {
    var ct = txns[c];
    if (ct.amount > 0 && ct.category) {
      if (!cats[ct.category]) cats[ct.category] = 0;
      cats[ct.category] += ct.amount;
    }
  }

  var catKeys = Object.keys(cats).sort(function(a, b) { return cats[b] - cats[a]; });

  var catHtml = '<div class="card-title">\uD83D\uDCCA Category Totals</div>';
  if (catKeys.length === 0) {
    catHtml += '<div class="empty-state">No spending data this month</div>';
  } else {
    for (var ck = 0; ck < catKeys.length; ck++) {
      var catName = catKeys[ck];
      var emoji = CATEGORY_EMOJI[catName] || '\uD83D\uDCCB';
      catHtml += '<div class="rank-row">';
      catHtml += '<span class="rank-num">' + emoji + '</span>';
      catHtml += '<span class="rank-name">' + catName.charAt(0).toUpperCase() + catName.slice(1) + '</span>';
      catHtml += '<span class="rank-val">' + fmt(cats[catName]) + '</span>';
      catHtml += '</div>';
    }
  }
  document.getElementById('cardCategories').innerHTML = catHtml;
}

/* ===== SCROLL REVEAL ===== */
function initReveal() {
  var reveals = document.querySelectorAll('.reveal');
  if (!reveals.length) return;

  var observer = new IntersectionObserver(function(entries) {
    for (var i = 0; i < entries.length; i++) {
      if (entries[i].isIntersecting) {
        entries[i].target.classList.add('visible');
      }
    }
  }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });

  for (var j = 0; j < reveals.length; j++) {
    observer.observe(reveals[j]);
  }
}

/* ===== INIT ===== */
loadData();
</script>
